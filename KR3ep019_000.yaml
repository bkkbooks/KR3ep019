front:
  text: 劉序新安程子杏軒深於醫著有醫案一書發明其理甚悉予因思醫書惟靈樞素問最古雖未敢必為神農氏以後之書然其為戰國時神於是術者之所為無疑也由是推之春秋左氏傳醫和醫緩諸論說更推之周官醫師食醫瘍醫諸職守所云陰陽風雨晦明之生疾九竅九臟之變動辭約義備醫之理盡矣後世著書者代作短長往往互見程子去其短集其長蓋尤有心得醫案一書謂與靈樞素問並傳可也嘉慶十年孟夏月長沙劉權之鮑序軒埃綿藐岐風閴寥素靈之書遼乎遠矣杏軒程子高悟絕世精思邁倫擅潘陸之詩名工俞扁之道術平生療疾多著奇效或蹈背而出血或舉水而灌頭矚垣一方騰譽千里僕嘗遘危候賴君獲全爰契洽夫蘭金實感深於肉骨暇日造膝示我成編攬要則象綱之挈元珠鉤沉則紀昌之貫輪蝨生枯起朽能事匪一視色察毫殊績累奏雖葛仙金匱之作孫氏龍宮之秘隱居本草之錄宣公集驗之書方茲蔑矣懣然心服退而弁言洵堪拯夫膏肓請以授之剞劂嘉慶庚申長夏愚弟鮑桂星程序子華子有言醫者理也意也蓋理明則意得意得則審脈處方無所施而不中於以稱國工不難吾宗杏軒先生其人也先生性穎悟工詩隱於醫為人療疾應手輒奏效余同年鮑覺生嘗遘危疾賴先生起之母稱道不去口一日出先生所著醫案屬余弁言余受而讀之見其審脈處方深得古人四然二反之理而神明其意以是嘆先生之藝之精非尋常執經方習針石者所能望其項背也然則是書其桐君之別錄越人之逸篇也夫嘉慶十年歲在構蒙赤奮若余月中澣鶴樵國仁拜書自序醫之有案也昉於漢之倉公繼倉公而作者代有其人若明之薛氏立齋喻氏嘉言其尤著矣余自慚顓陋安敢步諸賢之後塵雖然莊生不云乎輪扁之斫輪也得之於心而應之於手余亦自道其得心應手者而已矣且夫醫之為術也蔑古則失之縱泥古又失之拘余自業醫以來以古為師亦或間出新意以濟古法所未及雖未能發皆中鵠而鄭重不苟之心固有可自信者故凡應手之處往往錄而存之以自驗學力之淺深太史鮑君覺生見之稱善勸付剞劂余遲疑者久之迄今所存之案日益多友人江君晉三復促梓行竊不自揆竟徇其請因即其信於心而應於手者聊錄一二尚乞海內高明君子進而教之歲在閼逢困敦嘉平月既望程文囿自序侯序家弟瑞生昔遊新安適遘痁瘧觀泉先生為之蠲疴歸述盛名越數年予始得見豐頤藹度信為有道者既乃讀所刻古近體稿多隱居沖澹及壯遊奇麗之作既又讀所著醫案益肅然於先生之為通儒也夫醫者意也必有與天地同流之意而後能誦古人方藥之書又必一空膠窒方藥之言而後能伸其用當通神之意醫果可以意為案果可以臆說哉先生尚有未刻之書曰醫述蓋博覽靈素以後歷代諸家之論採其精當者萃為一集卷帙盈尺其精勤過於海錄他日刊布讀者參考互證當益知通儒之所闡揚不僅功侔良相也道光六年子月上汗白下侯云松拜識朱序內傳稱良醫者再醫緩視晉侯疾曰在肓之上膏之下攻之不可達之不及數語即案也又醫和視晉侯疾曰是謂近女室疾如蠱非鬼非食惑以喪志後及六氣六淫不節不時並括內經運氣諸篇精義所言亦案也醫案如讞案根源洞澈治法精嚴均系乎此顧非博物君子深於醫理未足語此杏軒先生於嘉慶九年刊有醫案初集隨證處方靈心獨運足度後學金針矣嗣後所聞見益擴所全活益眾又匯記治驗若干條定為二集出以示盅反復讀之彌嘆先生之才大心細師古而不泥於古也虛實判之病寒燠審之時南北燥濕因乎地弱壯貧富視乎人批卻導窾有指與物化而不以心稽之妙因亟請付梓以善世其初集藏版不戒干火今乃一併補刊以著雙玉為珏鍾蓋於道光丁亥冬日訪道至岩鎮親見先生勤求醫奧手不釋卷積數十年博覽之功年彌高而學彌篤真所謂博物君子深於醫理者也吾願先生自今以往日記所治由周甲而晉期頤靈丹救世無盡而新編傳世亦無盡三刻四刻鍾且不揣檮昧自訂續為序言以期附名於驥尾也虹橋朱鍾謹序吳序曩余在都門知鮑覺生侍讀少遘奇疾賴程君杏軒獲全越二十年覺生視學中州復病如前杏軒又起之心奇其人以不得一見為恨嘉慶丁卯春余攖疾南歸遇杏軒於大梁使院乞刀圭焉十數年來殆不知其疾之在體也丁丑夏余再至新安杏軒亦倦遊歸相見甚喜晤語浹旬盡出其所著書數種示余上溯軒岐旁及越人仲景下逮河間東垣丹溪諸家靡不究其精微擴其旨趣就中醫案續錄一編說理精當視前刻初集尤佳余勸其付梓杏軒讓未遑余曰子無然也余見世所為醫者多矣讀湯頭歌括一冊誦藥性賦一篇遂榜於門曰醫室號於人曰醫師病者不察從而求診乞方焉幸而得資財愈益肆其欺謾乘堅車策怒馬馳騁以耀於衢人尊信之者日益眾殺人日益多其不忍為此態者又或達心而懦訥於言語拙於文詞為世所輕而醫理卒以不明於天下今先生立盧扁之幟入孫葛之壘使是書不脛而走風行海內天下望而爭趨登蒼生於仁壽甚盛事也縱山川修阻針砭莫及世醫即可奉為準繩以奏效於旦夕其善養生者得領緒餘亦足以卻病駐年所全不已多乎夫士君子之託業國家之設官皆為養人計也先生少業儒術長習方書常自恨不得用於世以竟其學余觀斯編所載審是非於毫釐察虛實於微渺其良有司之矜慎以折獄乎補養以培元氣和解使無郁湮其良有司之和煦以愛民乎法當攻伐如厲鷹鸇以逐鳥雀法當清涼如沃淵泉以救燎原其良有司之鋤暴安良不事姑息乎吾願與先生同業者皆以先生之學為學其不與先生同業者皆以先生之心為心則郡邑之呻吟皆起矣先生斯編顧可秘而不宣乎哉杏軒曰唯唯然猶藏之篋笥自是又增入數十條今年春郵寄是書問序於余披閱之下猶記曩在新安與吾杏軒晤言一室時也爰追述之以為序道光四年歲次甲申季春月桐城吳庚枚序嘉慶九年歲在閼逢困敦先生既成醫案初集一編壽諸世矣原版不戒於火其續錄尚藏巾笥中今年春又成醫述十六卷集諸家之大成垂不刊之定論誠醫宗之成軌也既乃合醫案前後集付剞劂氏而先生行蹤所至與凡所施治隨筆扎記及榜等錄存者歷時既久積而盈帙先生以出於一時論列詳略或殊始末未備不欲付梓榜等竊以近世葉氏一家亦臨證筆記然惜其辭多簡括而義少發明若先生斯編證必求其本治必折其衷發聾覺瞶引示迷津實有前賢屐齒所未及者昔史遷傳太倉公論證論治辭繁不殺幾及三十條豈不以活人指南端在是乎乃敦請於先生排次而梓行之因並附記數語於其後云時道光九年歲在屠維赤奪若陽月上瀚門人兒榜許樸小門人許後洪鼎彝汪有容葉光煦鄭立傳等謹識
