  - {type: 'tls:div-end', offset: 36939, content: '', id: KR3ep019_jc_000-d10d36}
  - {type: 'tls:div-start', offset: 36939, content: '', id: KR3ep019_jc_000-d10d37, level: 2, head_text: 家秀翹兄肝鬱痛傷胃氣詳論病機治法}
