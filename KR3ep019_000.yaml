  - {type: 'tls:div-start', offset: 40068, content: '', id: KR3ep019_jc_000-d10d44, level: 2, head_text: 又僕人肝風用藥大意}
  - {type: 'tls:head', offset: 40068, content: '', id: KR3ep019_jc_000-d10.d44.h1s1}
  - {type: 'tls:div-end', offset: 40282, content: '', id: KR3ep019_jc_000-d10d44}
  - {type: 'tls:div-start', offset: 40282, content: '', id: KR3ep019_jc_000-d10d45, level: 2, head_text: 許兌岩兄尊堂久痢治驗}
