body:
  text: 初集許靜亭翁夫人產後感邪重用清下治驗丹溪云產後當以大補氣血為主他證從末治之言固善矣然事竟有不可執者乾隆乙巳仲夏岩鎮許靜翁夫人病延診據述產後十二朝初起灑淅寒熱醫投溫散不解即進溫補病漸加重發熱不退口渴心煩胸悶便閉時值溽暑病人樓居閉戶塞牖診脈弦數視舌苔黃告靜翁曰夫人病候乃產後感邪醫藥姑息邪無出路鬱而為熱今日本欲即用重劑清解恐生疑畏且與一柴胡飲試之但病重藥輕不能見效明早再為進步並令移榻下樓免暑氣蒸逼詰朝視之脈證如故舌苔轉黑眾猶疑是陰證予曰不然陰陽二證舌苔皆黑陽證舌黑黑而潤滑病初即見腎水凌心也陰證舌黑黑而焦乾熱久才見薪化為炭也前方力薄不能勝任議用白虎湯加芩連飲藥周時家人報曰熱退手足微冷少頃又曰周身冷甚靜翁駭然亦謂恐系陰證服此藥必殆予曰無憂果系陰證前服溫補藥效矣否則昨服柴胡飲死矣安能延至此刻此即仲景所謂熱深厥亦深也姑待之薄暮厥回覆熱煩渴欲飲冷水令取井水一碗與飲甚快予曰揚湯止沸不若釜底抽薪竟與玉燭散下之初服不動再劑便解黑矢五六枚熱勢稍輕改用玉女煎數劑諸候悉平調養經月而愈眾尚慮其產後涼藥服多不能生育予曰無傷經云有故無殞至今廿載數生子女矣壬戍歲與訂朱陳焉予來岩鎮譚醫自靜翁始劉明府少君先天不足心脾內虧治法劉少君年近三旬春間由都來徽抱疾數月食減形倦心悸少寐浮火上升間或見血醫云肝肺火盛藥投清降屢治不效金文舫中翰薦延予診謂曰病由先天不足心脾內虧所致丹溪云虛火可補實火可瀉虛以實治宜乎無功擬黑歸脾湯合生脈散數服稍應復診令照原方再進諸恙漸平接服丸藥次春北上秋歸晤之狀貌豐腴前病如失鮑覺生宮詹郁傷心脾證類噎隔殆而復生鮑宮詹未第時遊昆陵幕抱疴半載百治不痊因買舟回里延予治之望色頰赤面青診脈虛弦細急自述數月來通宵不寐聞聲即驚畏見親朋胸膈嘈痛食粥一盂且嘔其半糞如羊矢色綠而堅平時作文頗敏今則隻字難書得無已成隔證耶予曰君質本弱兼多抑鬱心脾受傷脾不能為胃行其津液故食阻二腸無所稟受故便乾若在高年即慮成隔今方少壯猶可無虞方仿逍遙歸脾出入服至數十劑病尚未減眾憂之予曰內傷日久原無速效況病關情志當內觀靜養未可徒恃藥力續得弄璋之喜予曰喜能勝憂病可卻矣半月後果漸瘥仍勸往僧齋靜養共服煎藥百劑丸藥數斤乃瘳因更號覺生蓋幸其殆而復生也洪楚峰孝廉中臟殆證再生奇驗洪楚峰孝廉病遣使延診問其使曰何候曰中風問年幾何曰耋矣予曰殆證也辭不往使者強之將及門聞鄰人語云病將就木醫來何為若能起之其盧扁乎入視身僵若屍神昏不語目闔口張聲鼾痰鳴遺尿手撒切脈虛大歇至予曰此中臟也高年臟真已虧況見五絕之候不可為矣其弟曰固知病不可為然尚有一息之存安忍坐視求惠一七姑冀萬一勉處地黃飲子合大補元煎以為聊盡人事而已詎意服藥後痰平鼾定目開能言再劑神清食進復診更加河車鹿茸脈證大轉續訂丸方付之半載後因視他病過其家見翁矍鑠如常矣方萃岩翁公郎滑精證治萃翁公郎稟質向虧誦讀煩勞心神傷耗初病浮火上升繼則陽強不密精時自下診脈虛細無力方定六味地黃湯除茯苓澤瀉加麥冬五味遠志棗仁牡蠣芡實期以功成百日服藥數劑未應更醫病狀依然復召診視予曰此水火失濟象也豈能速效仍用前方再加龍骨蒺藜桑螵蛸蓮蕊須合乎滑者澀之之意守服兩旬虛陽漸斂精下日減但病久形羸食少究由脾胃有虧經云腎者主水受五臟六腑之精而藏之是精藏於腎非生於腎也譬諸錢糧雖貯庫中然非庫中自出須補脾胃化源欲於前方內參入脾藥嫌其雜而不專乃從脾腎分治之法早用參苓白朮散晚間仍進前藥服之益效續擬丸方調養而瘳余氏子瘧後變證余氏子八齡形瘦陰虛夏患癉瘧愈後失調值秋燥時偶作寒熱幼科泛投疏散之劑轉致躁擾搐搦危證百出余翁求視以決死生予見其兒肢掣痰鳴身熱煩躁勢頗危篤診脈神根未敗予曰疾固劇矣然尚可生翁喜叩其說予曰驚風一證時世無傳小兒受害不可勝數喻氏雖闢其謬特重外感輕內傷經曰東方青色入通於肝其病發驚駭醫昧病因用方通套偶遇強實而應者有之特此兒所患本非外因良由腎水下虛肝失所養木逢金制故作寒熱狀似外感誤投疏散津液更傷因而肝風鼓動變幻若此予尚望其生者因其脈猶未敗耳方擬六味地黃湯滋水生木更加歸芍甘草鉤藤之屬和陽熄風風熄而驚自定矣翁聞言甚悅服藥痰平熱退不搐不煩另制膏子藥與服全愈汪典揚翁外孫女體弱感邪證變抽掣典翁外孫女年三歲病經旬日發熱便瀉初服疏導藥不應忽作抽掣復請前醫視之雲系動驚更加金藥琥珀典翁邀予商酌望其兒色白神疲頭身雖熱四肢冰冷按脈沉細無力謂曰病乃質虧感邪便瀉多日脾元受傷以致肝風內動金石之品不可用也擬六君子湯加炮薑桂枝服藥熱退瀉稀再服肢溫瀉止驚亦不作方玉堂翁孫女暑風驚證詳論病機治法玉翁孫女年四齡夏間感受暑風熱發不退肢搐體僵目斜口齧予曰此暑風急驚也暑喜傷心風喜傷肝心肝為臟臟者藏也邪難入亦復難出證雖可治然非旦晚能愈且內服煎藥仍須參以外治之法令挑黃土一石捶細攤於涼地上鋪荷葉再用蒲席與兒墊臥慎勿姑息俟熱退驚定方可抱起藥用防風香薷柴胡鉤藤連翹川連石膏木通生甘草引加鮮菖蒲扁莢葉清暑疏風一切金石之類概置不用蓋病因暑風生熱熱生驚金石鎮墜錮邪最為害事依法服藥守至七朝熱退驚定渠家以為病愈恐久臥涼地不宜將兒抱置床上當晚熱復發予令仍放土上熱即退尚不之信次晚復抱起熱又發乃問所由予曰邪未淨也又問邪何日可淨予曰傷寒以十二朝為經盡大概亦需此期屆期上床安臥不復熱矣藥換養陰調和肝胃諸恙皆平惟喑啞不能言其母憂甚予曰無傷將自復閱三月果能言予按此證小兒夏間患者甚多治不如法往往不救較之尋常驚證特異考諸古訓鮮有發明惟近時吾郡許宣治先生敘有十則辨論頗詳至若臥置土上墊用荷葉一法猶未言及予治此證每用此法獲驗蓋土能吸熱荷葉清暑故耳特其驚之作必由熱盛而成然有一熱即作者有熱二三日而作者其狀悉皆昏迷搐搦肢厥咬牙輕者時昏時醒重者七日方蘇極重者至十二朝始轉若由吐瀉而起脈細質虧不能受清涼者多不可治倘不因吐瀉一熱即驚脈洪質實能受清涼者十中可救七八勿視其危而棄之也再按驚後喑啞一證諸書亦未論及每見證輕者病後多無此患重者有之然有喑至一兩月愈者有三四月愈者有終身不愈者予堂侄女驚後數載始能言又見保村族人子驚後喑啞至今十餘年竟不能愈其故總因多服金石之藥所致若未服此等藥雖包絡暫閉當自開耳方宅揆翁幼孫暑風驚證病愈之奇宅翁幼孫夏月患暑風驚證熱盛神迷肢掣齒齘目斜予照治玉翁孫女法數日證猶不轉不啼不食氣息奄奄儼如就斃翁以為殆予曰病誠可畏若在他候則無生理惟此證乃暑邪內閉心竅幸得竅開尚可挽回仍令守視勿懈一夕迅雷驟至兒臥地上忽然作聲如夢初覺此後神明漸蘇熱平驚定斯證予雖為治愈然理殊不可測豈雷氣通於心雷動則蟄啟心為邪閉得雷聲而啟耶洪荔原翁尊堂大頭時疫真熱假寒之證荔翁尊堂年屆六旬初發寒熱疏散不解越日頭顱紅腫漸及面目頤頰舌焦口渴發熱脈數予視之曰此大頭時疫證也東垣普濟消毒飲最妙翁云家慈向患腸風體質素弱苦寒之劑恐難勝耳予曰有病當之不害若恐藥峻方內不用黃連亦可市藥煎熟僅飲一杯旋覆吐出病人自覺喉冷吸氣如冰以袖掩口始快眾見其拒藥喉冷疑藥有誤促予復診商欲更方細審脈證復告翁曰此正丹溪所謂病人自覺冷者非真冷也因熱鬱於內而外反見寒象耳其飲藥旋吐者此諸逆衝上皆屬於火也如盈爐之炭有熱無焰試以杯水沃之自必煙焰上騰前治不謬無庸遲疑令將前藥飲畢喉冷漸除隨服復煎乾渴更甚頭腫舌焦如前荔翁著急無所適從予曰無他病重藥輕耳再加黃連多服自效如言服至匝旬熱退腫消諸恙盡釋可見寒熱真假之間最易惑人若非細心審察能不為所誤耶又夫人子嗽荔翁夫人懷孕數月嗽喘胸痹夜不安臥食少形羸予曰此子嗽也病由胎火上衝肺金被制相搏失職治節不行經云咳嗽上氣厥在胸中過在手陽明太陰夫嗽則周身百脈震動久嗽不已必致動胎古治子嗽有紫菀散百合湯法猶未善鄙見惟補肺阿膠湯內有甘草兜鈴杏仁牛蒡清金降火糯米阿膠潤肺安胎一方而胎病兩調至穩至當服藥兩日咳嗽雖減喘痹未舒方內加葦莖一味取其色白中空輕清宣痹再服數劑胸寬喘定逾月分娩無恙族兄奏韓挾虛傷寒因循貽誤救治原委族兄奏韓年逾四旬外腴內虧邪乘虛入寒熱咳嗽頭身疼痛脈大無力予初投溫散不解轉用補中益氣湯加薑棗輔正托邪語其侄曰令叔病候不輕慎勿泛視旁人以為病輕藥重更醫漫不為意遷延數日勢漸鴟張延同道余朗亭先生診治不肯立方既而曰程某現居比鄰胡不邀來同議乃復相招觀其病狀增劇面紅目赤舌黑唇焦神識昏亂脈息豁大空虛勢欲內陷因與余君商以壯中溫托傷六味回陽飲方法無如渠家皆系女流其侄少不諳醫理或謂煩熱若此再投姜附必致逾牆上屋故此遲疑藥不敢服又復因循病勢更劇再請余君不至闔家張皇其侄偕鮑履平兄來舍懇治並乞扎邀余君予為作書余君始至賓朋交集時金融若兄在座私謂予曰子可盡力舉方服藥之事吾能任之復與余君斟酌仍用前方融兄俟藥煎熟面督服下次日神采稍回脈象漸斂方除炮姜加枸杞山萸又服一劑熱退舌潤再將附子分兩減半加杜仲山藥繼進大補元煎兩月始康方牧夫兄尊堂寒濕內伏加感外邪嘉慶甲子初秋牧兄邀視伊母恙云家慈年逾五旬外腴內虧病經八日上熱下冷痰多汗少咳嗽作嘔昔患淋痛茲亦帶發醫為散風清暑治俱不應又以為肝火擬用龍膽瀉肝湯求為決之予曰淋證為本感證為標從本從標當觀病之緩急未可臆斷也比往診視脈細面青身熱足冷時正酷熱病人猶蓋氈被舌苔白滑胸腹脹悶不飢不渴謂牧兄曰尊堂之病乃寒濕內伏加感外邪治宜溫中逐邪淋痛無暇兼顧方用蒼白二陳湯加姜附白蔻以溫中燥濕桂枝秦艽以徹其表牧兄問服藥以何為驗何期可愈予曰傷寒以舌為憑舌苔退淨病邪自清計非二候不可初服舌苔稍退再劑已退其半服至四劑寒熱全解舌苔退淨淋痛亦止惟腹悶食少大便未行次日忽便瀉數次僉以傷寒漏底為慮予曰無妨仲聖云胃家實穢腐當去也方易六君子湯加穀芽苡仁澤瀉神麯健脾滲濕三日內共瀉二十餘行始得胸寬食進越日忽又發熱診脈浮大予曰此復感也牧兄曰病人日來俱臥帳中邪何由入予曰想因日前便瀉夜間下床恙久體虛易於感耳仍用六君子湯加姜附秦艽一服即平曹近軒翁感後食復近翁同道友也夏月患感證自用白虎湯治愈後因飲食不節病復發熱腹脹服消導藥不效再服白虎湯亦不效熱盛口渴舌黃便閉予曰此食復也投以枳實梔豉湯加大黃一劑和二劑已仲景祖方用之對證無不桴鼓相應曹肖岩翁春溫兩感危證道友曹肖岩翁故居楊村僑寓岩鎮乾隆甲寅春初病寒熱頭痛自服溫散不解又因胸膈脹悶疑夾食滯加用消導亦不效直至七朝熱發不退精神恍惚予視之曰病由冬不藏精又傷於寒邪伏少陰乘時觸發即春溫兩感證也渠慮客中不便乃歸詰朝延診勢漸加重神昏脈大面赤舌黑方仿理陰煎補中托邪渠師仇心谷先生見方稱善次早復診予告仇公曰此病全是真元內虧邪伏於裡猝難驅逐吾料其熱煩過二候始能退去熱退神自清耳復訂六味回陽飲與之越日再視熱盛舌乾煩躁脈數因易左歸飲令服兩劑期屆二候果汗出熱退守至兩旬飲食大進日啜糜粥十餘碗便猶未圊其昆季問故予曰人胃中常留水穀三斗五升每日入五升出五升緣病中全不能食胃中水穀久經告竭今雖日啜糜粥不足彌縫其闕並未有餘焉能驟便予閱方書案載一人病後納食頗多並不欲便亦無脹楚眾疑之醫曰胃津虧耗燥火用事所進之食即銷熔其渣滓須待津回燥潤方能便利如常閱月餘便始通今才兩旬何慮為後至三十餘日便通病亦全卻又三郎麻閉急證肖翁三郎心成兄幼時出麻冒風隱閉喘促煩躁鼻扇目闔肌膚枯澀不啼不食投藥莫應翁商於予見其勢已瀕危謂曰此麻閉急證藥非精銳蔑能挽救方疏麻杏石甘湯與之一服膚潤麻漸發出再服周身麻出如痱神爽躁安目開喘定繼用瀉白散清肺解毒復用養陰退陽之劑而愈予治麻閉危候每用此方獲驗蓋麻出於肺閉則火毒內攻多致喘悶而殆此方麻黃髮肺邪杏仁下肺氣甘草緩肺急石膏清肺熱藥簡功專所以效速可見仲景方不獨專治傷寒並能通治雜病也吳芳崖兄幼孫胎瘧芳兄乃孫甫生兩月即患胎瘧幼科僉用疏導和解不愈面色黃滯口鼻手足俱冷予疏六君子湯加炮姜芳兄曰襁褓即可服參耶予曰小兒如初生萌芽不慣風日攻伐宜少補益宜多況瘧久脾傷溫補脾元重扶生氣不易法也服藥色澤肢溫瘧止無恙方理豐翁中寒脫陽殆證救蘇理翁年逾五旬耽於酒色時值寒夜鄰家邀飲起身小解昏眩仆地促予往視面白肢厥口鼻氣冷神昏遺溺脈細如絲予曰陽脫矣奈何渠子弟泣求拯治倉卒市藥不及令先取艾火炙氣海關元數壯並煎薑湯灌之少頃呻吟出聲方訂參附湯因其力難辦參姑用黨參二兩附子一兩濃煎服訖四肢漸溫目開能言舁歸詰朝脈色略回惟嘔惡畏寒不思飲食將前方分兩減半參合理中湯方法與服二日轉用右歸飲溫補腎元月餘方能起簀方晉偕翁乃媳咳嗽成癆預決不治晉翁乃媳秋間咳嗽不以為意交冬漸甚午後寒熱醫云外感服藥不效遂致形倦肌瘦食少便溏予視其行動氣促診脈弦勁無胃詢其經期三月未至私謂晉翁曰此殆證也危期速矣翁驚曰是病不過咳嗽寒熱何以至此予曰經云二陽之病發心脾有不得隱曲女子不月傳為風消息賁者死不治矧脈弦勁無胃乃真臟也經又云形瘦脈大胸中多氣者死脈證如此何以得生辭不舉方逾旬而歿潘氏室女經閉成癆不治之證潘氏室女年十五歲初患腹痛馴至咳嗽寒熱形瘦食少診脈細數詢經事愆期三月予曰瘵證也辭不治未百日而歿歷見婦人咳嗽寒熱脈數經閉者多不可治若室女更無一生任用補虛清熱解鬱調經諸法總無靈效求諸古訓鮮有良法惟金匱載有大黃䗪蟲丸及百勞丸二方喻氏闡發其義竊思此證當其初起血痹不行癆瘵將成未成之際即以此藥投之祛舊生新或能圖功亦未可料倘遷延時日元氣已衰則無及矣識此質諸明哲方燦侶翁腹痛蓄瘀脫血治愈並商善後法燦翁年近七旬向患腹痛一夕忽吐下紫瘀血塊數碗頭暈自汗目闔神疲診脈芤虛謂其子曰此血脫證也書云久痛多蓄瘀蓋腹痛數年瘀蓄已久一旦傾囊而出夫氣為血之帥高年氣虛切慮暈脫古人治血脫每用獨參湯以益其氣但目下參價甚昂恐難措辦乃訂大劑黑歸脾湯資其化源固其統攝未幾獲痊次年病復雖不若前之劇亦覺困倦莫支仍守前法治愈其子憂甚恐其再發商圖善後之策予思血蓄之故必有窠囊如水之盈科而進按胃為生血之源脾為統血之臟苟脾健胃強則氣血周流何蓄之有經以六經為川腸胃為海譬諸洪水氾濫究緣江河失疏為訂二方早用歸脾丸晚用參苓白朮散每方俱加丹參乾漆二味冀其去瘀生新服藥經年其病遂絕農人某攻痞動血昏暈急證農人某久患痞積腹如抱甕偶遇方士教以外用炙法內服末藥即可刈根某信之數日後忽覺心嘈如飢吐下紫瘀成碗成盆頭暈不能起坐無力延醫舁至鎮中戚家招予往視病者倦臥榻上閉目呻吟方欲診脈又血湧出狀如豚肝遍地皆汙昏暈手戰咬牙戚家恐其脫去急欲扛回予按脈雖虛細尚未散亂戒勿驚擾姑俟之少頃暈定令先灌米飲以安其胃續灌黨參湯以益其氣再與八珍湯一劑囑盡今晚服盡明日再商詰朝人來請云昨服藥血幸止惟心慌氣墜睡臥不安思血脫之後心脾必虧乃易歸脾湯加黑姜令其扛歸多服自效後果如言王以仁翁乃郎暑病熱久傷陰以翁乃郎年五歲夏月病逾兩旬諸藥罔效發熱不退汗多口渴色白肌瘦切脈虛數無力閱前方悉皆清散之屬翁問病勢何如答曰極重又問此為何病予曰暑病也初治甚易醫不如法熱久傷陰元氣被伐猶幸肝風未動急宜養陰保金生水尚有生機方用首烏料豆皮扁豆沙參玉竹麥冬五味石斛茯苓丹皮令取稻露煎藥守服四劑汗止熱退更進麥易地黃湯神采漸轉惟飲食欠旺參用六神散餐加元復又翁自病肝鬱證似外感以翁自病寒熱脅痛口苦食少呻吟不寐已經月餘服藥不應自以為殆診脈弦急知其平日情志抑鬱肝木不舒病似外感因系內傷與加味逍遙散一服而效數服而安吳秀森翁乾腳氣秀翁年將五十體虛多勞初病足痹醫治數月不效診脈虛濡無力視其腓肉枯癟膝蓋腫大謂曰此乾腳氣也又名鶴膝風病由肝腎下虧邪乘虛伏醫者不知溫補托邪泛從標治轉致血氣耗傷無性命之虞有終身之患治仿大營煎加附子黨參河車鹿角膠初服十劑其痛已減再服十劑足能履地續服丸藥枯回槁澤行動如常洪臨川兄幼女偏廢臨兄女三歲右肢痿軟不能舉動醫作風治予曰此偏廢證也病由先天不足肝腎內虧藥當溫補若作風治誤矣臨兄曰偏廢乃老人病孩提安得患此予曰肝主筋腎主骨肝充則筋健腎充則骨強老人腎氣已衰小兒腎氣未足其理一也與右歸飲加參耆鹿角膠數十服乃愈吳禮庭兄時感腫腮消後睪丸腫痛禮兄平素體虛時感寒熱耳旁腫痛維時此證盛行俗稱豬頭瘟醫與清散藥兩劑耳旁腫消睪丸旋腫痛不可耐寒熱更甚予思耳旁部位屬少陽睪丸屬厥陰肝膽相為表裡料由少陽之邪不從表解內傳厥陰故耳仿暖肝煎加吳萸一劑而效同時族人澤瞻兄病此予診之曰得無耳旁腫消睪丸腫痛乎澤兄驚曰子何神耶亦用煎法治愈後閱會心錄載有腫腮一證云醫不知治混投表散邪乘虛陷傳入厥陰睪丸腫痛耳後全消昔賢之言洵不誣也莊炳南兄素稟火體病治與眾不同炳兄稟質多火喜涼惡熱夏月常以冷水灌汗露臥石地為快素患痰火方用生地丹皮麥冬山梔栝蔞黃芩知母等味發時服之即安乃至他病亦服此方並食肚肺餛飩湯汗出即解暇時向予道及予曰痰火藥應用涼若凡病守服一方似無其理倘屬傷寒陰證恐其誤事後當慎之一日果患陰暑感證寒熱身痛脈細肢冷予投以附子理中湯不應再強服之病反加重堅不服藥索食餛飩肚肺湯予謂葷油膩邪戒勿與食不聽食後得汗反安欲服常治痰火方家人勸阻不可竟服之病卻後亦無損予思咫尺間人病體質之殊若此則南北地土不同風氣各異其人其病又何如耶素問異法方宜論不可不玩索也柳蔭千兄令愛無故發癍嘉慶甲子秋予在鄰村偶值余朗亭先生云日前往富謁視一女子病甚奇初起無故發癍醫言是火多投涼藥漸變損怯今脈證俱敗此何故也予曰無故發癍事屬罕聞若云變怯大都清涼過劑元氣被戕耳越日蔭兄令愛兩脛癍出密密形如錦紋診脈和平詢其寢食如常別無他疾予曰勿藥蔭兄曰癍乃重候安可勿藥因以余公所云告之竟聽予言後癍退無恙設當時雜投湯藥不幾踵富謁女子之覆轍乎柳聞鶯兄挾虛傷寒並後患陰瘧誤截致變拯治始末聞兄體虛感邪兼挾內傷病起寒熱肢厥診脈沉細初投當歸四逆湯肢厥雖回身熱未退審屬少下虧邪乘虛陷更進理陰煎兩劑復診脈轉浮大舌黑麵紅奄奄欲脫貧士無力服參姑以黨參熟地各四兩熬成濃汁晝夜與漿粥間進神稍回脈稍斂尚覺心煩內熱舌枯津涸囑煮團魚湯煎藥諸候漸平又轉為瘧發時甚劇多方圖治百日始痊後數年因夏傷於暑秋髮痎瘧邪伏於陰寒熱夜作予用補中益氣湯參香紅飲數劑未止自求速愈雜服截瘧諸方氣血大傷面青形倦寢食俱廢目中時見紅光溲溺淋漓復迓予治悉屏瘧門套藥仿四明治久瘧不愈用養營湯送八味丸法十劑而止方繡文兄夫人懷孕日吐清涎數碗繡兄夫人舊冬曾患弱證今春又病肝風俱予治愈續復得一奇證口吐清涎日計數碗道經云涕唾精津汗血液七般靈物總屬陰涎亦液屬久吐真陰必傷然百計治之不止語其婦曰古有咽華池真水之法咽之不吐何如婦曰若強嚥下即憒憒欲嘔診手少陰脈微動問經事兩月未行告繡兄曰脈象似屬妊娠不卜昔年懷孕有此證否曰拙荊往年受孕原有吐證但所吐者食耳此番證絕不類況舊病體虛未復焉能受孕予曰據脈多屬重身不然斷無此等奇證今不論其孕否專意補養肝腎兼益脾胃以俟消息交夏後腹中躍動孕形漸露復邀診視繡兄笑曰拙荊累孕矣但吐涎如故奈何予曰無傷產後當自止分娩後涎竟止計自春徂冬十月之間所吐涎沫無算而津液竟無所損且胎前諸治不應產後不治自痊亦異事也曹德酬兄乃郎水腫德兄乃郎年十四歲證患水腫醫投利水諸藥無效轉致腹大如鼓足冷如冰頭身俱腫陰囊光亮欲裂行動喘促勢甚危急診脈沉細無力謂曰此脾肺腎三臟內虧之病也肺虛則氣不化精而化水脾虛則水無所制而反克腎虛則水無所主而妄行仲師金匱腎氣丸如禹之治水行所無事實為至當不易之方無如病久形羸消耗藥多真元敗壞恐難挽矣德兄固請救治仍用本方旬日而驗不月而痊方詠葭兄傷寒轉瘧並論胎瘧病因詠兄先天不足形瘦質弱夏夜貪涼醉而使內邪乘虛伏交秋病發初診脈細肢冷舌白麵青畏寒不熱腰痛無汗方訂附子理陰煎服後夜發壯熱次日復視謂其尊人曰令郎病候乃夾陰傷寒勢防內陷藥當溫中托邪冀其云蒸雨化令守原方服至六日病猶未減舉家憂甚予曰正虧邪重未易驅除日來證未變幻即為見效須過二候方望轉機方內加入參耆枸杞杜仲一意照顧真元毫不雜投標藥屆期得汗熱退渠家以為病愈是晚復發寒熱詰朝往視予曰瘧作矣詠兄曰瘧疾吾生平未曾患過恐其纏綿懇為截之予曰子病乃極重傷寒賴溫補諸劑守住三陰門戶不使內陷經言少陽為樞今未淨之邪得從少陽轉樞而出乃佳兆也烏可言截於是早進八味丸晚服補中益氣湯十數發才止予曰慎之防復旬日後瘧果復更用養營湯吞八味丸乃愈按胎瘧一證諸書鮮有言及患者多至淹纏輕則月餘重則數月治不如法或成虛勞或變腫脹即質實之人亦累成瘧母為終身之患且常瘧有不入陰胎瘧每多入陰常瘧愈後少復胎瘧愈後多復又究此病淹纏之故想由經隧路徑生疏故邪不易出耳續閱會心錄云常發瘧者邪從毛竅熟徑而出其愈易若胎瘧則隧道少疏通之機毛竅非熟由之路其愈難乃知昔賢之言先得我心矣再按其證似與痘疹相類人生皆不能免夫人稟父母之精血以成形其所以必患痘疹者蓋因淫火種於有形之先發於有生之後不識胎瘧之因果何所本耶錄中惜未詳及或謂此乃胎中感受風邪故名胎瘧是說予未之信閔方田兄初患少陰傷寒喉痹治愈後患腳氣雜治成痿方兄體素清癯證見身熱足冷喉紅腫痛脈息沉細無力診畢謂予曰賤恙似屬風熱煩君為我散之不卜喉痛可吹冰硼散否予曰不然君病乃少陰傷寒少陰之脈循喉嚨良由腎元下虛寒邪客之雷龍不安其宅是以上熱下寒其喉為痹治當溫補下元引火歸根若泛視為風熱而清散之殆矣方仿鎮陰煎一服喉痹愈再服寒熱退是日有何生者從本里吳譫泉先生遊證候相類向與喉科某善因便道托診某與清散藥一劑服後徹夜煩躁不安比曉吳公迓予至已逝矣歸告閔君駭為吐舌後數年渠又患腳氣腫痛予初為祛風滲濕因其下元素虧兼益肝腎診視數次病猶未減更醫消散過劑血氣耗傷腿膝枯癟致成痿廢足不任地閱十餘年始能出戶汪心滌兄夫人半產血暈危證汪心滌兄夫人體孱多病懷孕三月腹痛見血勢欲小產延余至時胎已下矣血來如崩昏暈汗淋面白如紙身冷脈伏予曰事急矣非參附湯莫挽僉謂用參恐阻惡露予曰人將死矣何遠慮為亟煎參附湯灌之少蘇旋覆暈去隨暈隨灌終夕漸定續用參朮耆草歸地枸杞大劑濃煎與粥飲肉汁間服旬日始安再投歸脾湯數十劑乃愈後張效伊翁夫人證同亦照此法治驗乾隆甲寅秋予室人葉孕三月胎墮血暈日進參耆十數兩乃定後仍半產數次勢皆危險均賴補劑挽回倘惑於浮議並殆矣吳立亭翁幼孫傷暑危證治驗嘉慶辛酉夏立翁幼孫傷暑發熱吐瀉不止神煩體躁唇赤舌黃口渴欲飲飲後即吐診脈沉伏手冷過肘足冷過膝料非寒厥欲投涼劑恐其吐瀉脾胃受傷擬用六君子湯除白朮加川連木瓜黃土稻花安脾胃祛暑邪服藥不效維時赤日當空暑氣正酷偶見庭前花卉枝葉枯萎童子汲水溉之因悟病機乃與生脈地黃湯一服吐瀉即止再服脈出肢溫未及旬而愈思前脈伏肢厥者乃童真未充吐瀉日頻津液頓傷脈乃血派脾主四肢脾不能為胃行其津液四肢不得稟水穀之氣故也六味大培真陰生脈保金化液小兒臟氣易為虛實是以效速梅文彩兄令堂病類噎隔奇證噎隔一病古人論之甚詳尚有似隔非隔之證猶未言及文兄令堂年屆四旬病經數月初時不能食飯後並米飲俱不能咽強之即吐隔證無疑然每日尚可啖乾麵粿數枚思古人論隔證不出胃脘枯槁四字又稱陽氣結於上陰液衰於下今既不能食飯何獨能食麵且飲湯即吐干食反安理殊不解與逍遙散數服不應考張氏醫通有飲鵝血法行之又不驗更醫多方圖治亦不效因勸勿藥兩載後可食麵湯並精豬肉今十餘年肌肉不瘦起居如常亦奇證也鄭鶴鳴挾陰傷寒鄭鶴鳴君平之流冬月適患傷寒初起寒熱身痛不以為意延挨數日陡然肢冷脈伏肌肉青紫面赤煩躁呃逆頻頻請同道曹肖岩翁診視詢知系欲事後起病以為少陰下虧寒邪乘之逼其真陽外越與六味回陽飲服之不應勢已瀕危邀予商酌予曰景岳回陽二方皆能救急其中尚有分別夫寒中陰經審其陰陽俱傷而病尚緩者則從陰陽兩回之法苟真陽飛越重陰用事須取單騎突入重圍搴旗樹幟使既散之陽望幟爭趨若加合陰藥反牽制其雄入之勢定方單用姜附參草四味煎令冷服外用蔥艾炒熱熨臍老薑附子皮煮汁蒸洗手足於是一晝夜厥始回脈始出惟呃未止每呃必至百聲知為腎氣上衝於前藥中參以熟地枸杞五味丁香攝納真元諸恙漸減改用右歸飲與服二日目辣舌燥投六味地黃湯浮陽頓平復為調理脾胃及脾腎雙補而起鄭媼便閉鄭媼年逾古稀證患便閉腹痛肛脹寢食俱廢已經兩旬諸治不應延診以下為囑切脈虛細而澀謂曰此虛閉也一補中益氣湯足矣何下為服藥兩日便仍不通自言脹痛欲死刻不可耐必欲下之予曰下法吾非不知但年高病久正氣虧虛下後恐其脫耳媼曰與其脹閉而死莫若脫之為快因憶心悟篇云病有不可下而又不可以不下下之不得其法多致誤人沉思良久於前湯內加入製大黃三錢仿古人寓攻於補之意飲後腸鳴矢氣當晚便解結糞數枚略能安臥次日少腹尚痛知其燥矢未淨仍用前方大黃分兩減半再劑便行兩次先硬後溏痛止食進而愈夫補中益氣湯原無加大黃之法此雖予之創見然醫貴變通固不容膠柱鼓瑟也吳光先翁偏中便閉光翁年逾七旬偏中臥床不起治用地黃飲子參左右二歸飲服藥半月證已守住惟大便兩旬未圊腹痛肛脹蓋由氣血俱虧不能傳送方如通幽湯補中益氣湯五仁湯濟川煎屢投不驗思用豬膽汁蜜煎導法無如燥糞已抵肛門阻不能入每一努掙魄汗淋漓頭暈欲脫無可如何偶記葉氏案中載治便閉有用挖法令病人自用中指染油探入肛內將燥糞挖碎而出奈病者肢廢自難掉動囑其孫依法行之當即挖出燥糞數塊隨後自解穢腐甚多不勞餘力病者稱快洵治便閉捷法也董千云傷寒格陽證董千云賣花為業年逾四旬外狀豐腴冬月患傷寒診脈沉細無力證見寒熱煩躁頭身疼痛面紅目赤舌吐唇外數寸病來勢暴詢因房勞感受寒邪逼其虛陽外露即格陽證也方定六味回陽飲令其煎成冷服無如飲藥旋嘔並吐蛔蟲躁擾如故甚為躊躇其母跪求救治勉取前藥半盞衝入豬膽汁數匙試服不嘔良久又與半盞夜間盡劑晨診躁象略安舌收吐止仍照原方再進次易八味地黃湯時屆九朝忽口噤不語十一二日又寒熱如瘧有從外感起見者予曰溫中即可以散邪強主正所以逐寇力排眾議堅持數日稍見轉機此後尚多枝節極力扶住正氣守至兩旬寢食雖安神采欠爽因思前病重時只圖固正未暇驅邪溫補藥多未免留邪閉竅曾記方書論傷寒時疫愈後神識不清有屬邪滯心包之語與服蠻煎兩劑神明頓清續為調理而痊許嫗傷寒疑難證治許嫗冬月病傷寒寒熱頭痛醫投疏表和解不應漸致昏譫口渴更進芩連清之亦不應便秘經旬用大黃亦不下予初望其面赤煩躁意屬陽證及切脈細澀又疑陽證陰脈思維未決因問其汗自病起至今未出捫之膚熇而枯予曰是矣且不立方姑先與藥一劑有驗再商幸彼農家不諳藥性與藥即服次日往視面紅稍退煩躁略平膚腠微潤予曰生矣疏方付之乃大青龍湯也又服一劑更見起色轉為調理而安渠族人佩之兄與予善亦知醫理問曰君治此病殆有神助不然如斯重候何藥之奇效之速也予曰仲聖云太陽病不罷面色緣緣正赤者此陽氣怫鬱在表其人躁煩不知痛處但坐以汗出不徹更發汗則愈何以知之脈澀故也子能參悟此篇自知此病之治法矣吳某時瘧變證吳某嘗富後貧體虛多郁病患時瘧堅不服藥已半月矣一夕忽發熱不退胸悶乾嘔醫投小柴胡湯不應熱盛汗多神昏體倦脈細無力囈語音低急延予診按仲師云譫語有虛有實實則譫語虛則鄭聲素問云言而微終日乃復言者此奪氣也用補元煎合生脈散兩服霍然族叔曉堂失志狂妄族叔曉堂向在吳地貿易情志不舒抑鬱成病神迷譫妄諸醫無效同人慮有不測送回里中診脈弦急搏指知其因郁生火因火生痰痰火擾其神明蒙其心竅是以語言不正舉動異常與陽明胃實狂亂之候不同故前醫用下藥不應病久正氣固虛補之又恐助其痰火爰仿服蠻煎加梨尖鐵琥珀辰砂為引初服譫妄稍定再劑寢食漸安共服十二劑神清語正舉止如常蓋此方能清心肝之熱而通神明故效速如此族人聯升休息痢證治奇驗族人聯升患休息痢淹纏兩載藥如清火固澀補中升提遍嘗無效偶遇諸塗望其色萎氣怯知為脫血之候謂曰爾病已深不治將殆渠告其故予曰吾寓有藥能愈爾病盍往取之比隨至寓付藥再服即愈渠以兩年之疾百治不瘳此藥效速如此稱為神丹方用鴉膽子一味去殼取仁外包桂圓肉捻丸每早米湯送下三十粒旋以食壓之此方初得之人傳專治休息痢並治腸風便血少則一二服多則三四服無不應驗其物不載本草無從稽考其味極苦似屬性寒後閱幼幼集成書云痢久邪附大腸屈曲之處藥力所不能到用此奇效思治虛怯沉疴參耆歸地有用數斤愈者治傷寒熱病姜附硝黃有用數兩愈者何此物每用不過二三分治積年之病其效如神物理真不可測先哲云千方易得一效難求信矣堂妹感冒暑風證治堂妹適鄰村許姓夏日浴罷忽頭暈仆地家人扶起旋即發熱夜間熱盛煩渴嘔吐譫妄不安手指掣動醫藥無效予診脈息弦數視舌尖絳苔黃謂其翁曰病由暑風相搏邪熱燔熾亟宜清解以杜痙厥之患方用川連香薷甘草半夏茯苓鉤藤防風青蒿羚羊角荷葉扁莢葉服藥兩劑熱緩神清嘔渴亦止方內除川連香薷鉤藤防風半夏加沙參麥冬石斛稻露又服兩日證減七八再除青蒿羚羊角荷葉扁莢葉加玉竹生扁豆女貞子當歸白芍調養而愈家炳然兄女肝鬱氣厥實有羸狀炳兄女在室年已及笄性躁多郁初春曾患吐血夏間陡然發厥厥回嘔吐不止汗冷肢麻言微氣短胸膈脹悶脈息細澀狀似虛象醫投補劑益劇予診之曰此郁病也經云大怒則形氣絕而血菀於上使人薄厥又云血之與氣並走於上乃為大厥議與越鞠丸加鬱金枳殼茯苓陳皮半夏兄曰女病臥床數日粒米不入脈細言微恐其虛脫奈何予曰依吾用藥則生否則難救蓋此脈乃鬱而不流非真細弱欲言而訥乃氣機阻閉故也觀其以手頻捶胸臆全屬中焦鬱而不舒且叫喊聲徹戶外豈脫證所有耶請速備藥吾守此勿遲疑也取藥煎服少頃膈間漉漉有聲噯氣數口胸次略寬再服嘔止寢食俱安轉用八味逍遙散除白朮加香附鬱金陳皮病愈血證亦泯陳某子感證體脈俱厥陳某子年十六歲夏月患感證壯熱神昏面赤煩渴唇燥舌焦口鼻牙根出血俱屬熱象惟脈息沉細四肢厥冷諸醫不效時屆九朝延予商之予曰此非陰證乃陽證也今日本應重用涼藥恐汝家畏而不服姑以小柴胡湯去半夏人參加生地花粉山梔丹皮試之無如歙俗以為吃壞熱藥有救涼藥無救因見方有涼藥果畏不服三日後勢更劇復來迓予予辭不往乃浼友人胡君景三代請予曰救病如救焚彼病已重況復遷延恐難治矣胡君曰試往一決可治則治之至診其脈前之沉細者今竟絕撫捫其肢則冷過肘膝更加腹痛拒按欲便不解驚狂不定予曰疾急矣非承氣湯下之不可疏方訖胡君私叩予曰從來傷寒陰陽二證憑脈用藥不拘浮沉大小總以有力無力分之有力為陽無力為陰今按脈全無四肢冷甚恐屬陰證奈何予曰此乃陽極似陰證載吳又可瘟疫論中所謂體脈二厥也歸檢書與閱胡君以為然竟服下劑夜間便行二次比曉厥回脈出改用甘露飲後易生脈地黃湯匝月而痊又婦憂勞傳染藥誤致變陳某子病愈後其婦憂勞傳染初起頭疼寒熱予與香蘇飲一服汗解旋又勞復發熱口苦耳聾兼值經期恐其熱入血室酌以柴芩煎加生地赤芍丹皮熱猶不退更加面赤舌黃譫語脈數予曰邪犯少陽陽明也仿生生子小白湯炒黃芩換生黃芩加竹葉燈心為引並語某曰予適有他出倘明日遲到可請胡君商之或照原方先服一渣亦可次日午刻予歸渠已著人相促數次急造其廬其泣曰病大變矣問其何狀曰昨服尊劑夜來煩熱不眠今早忽咬牙閉目昏厥遺尿已請胡君斟酌並照原方煎服一渣迄今不轉奈何予曰昨病雖重然已加增藥味即不應驗亦不至此豈更服他醫藥歟某曰小兒病承救活深為感佩今且專心倚仗曷敢易醫胡君恍然曰往日市藥吾未之閱今早閱劑內生黃芩藥店錯發生黃耆比令換去得無昨劑中誤服黃耆耶因驗昨傾之藥渣果然予曰此病受邪本重前藥悉力驅之尚不能解誤服黃耆將邪熱補住內攻心包迷塞竅隧故致變若此惟有急瀉心包之熱通竅避邪庶有生機擬導赤各半湯除人參加銀花金汁外用紫雪點舌飲藥至墓神采略回連投四劑浸有起色惟神呆耳聾時多妄語易以服蠻煎兩服神明稍清後用養陰定志之品月餘始平是役也使非胡君驗明藥誤在病家必歸咎於醫而醫亦不自知其故矣識此凡治重病所市藥劑醫須親驗不可忽也許生母傷食腹痛許生詠堂母病請治據云因食豚肝麵餅後偶觸怫鬱致患腹痛自用麥芽楂曲香砂二陳不應因其痛在少腹以為寒凝厥陰加吳萸炮姜服之益劇予問痛處可按乎曰拒按又問日來便乎曰未也切脈沉細視舌苔黃中心焦燥顧謂生曰此下證也生曰連服溫消諸劑不驗思亦及此因家母平素質虧且脈沉細故未敢下予曰痛劇脈伏此理之常質雖虛而病則實書稱腑病以通為補仲師云腹滿不減減不足言當下之又云舌黃未下者下之黃自去今痛滿拒按舌黃焦燥下證悉具夫復何疑方定大承氣湯用元明粉代芒硝仍加香砂楂曲兼行氣滯服頭煎後便行一次其痛略定隨服復煎夜半連下三次痛勢大減舌乾轉潤易以調中和胃旬後起居如常葉習方甥麻疳予甥習方稚年出麻麻後熱久不退乾咳無痰肌瘠食少糞如羊矢神形疲睏諸醫束手姊氏憂惶抱負來舍予曰此麻疳也病屬難療姊囑拯治思麻後熱久陰血必傷乾咳便難津液必涸計惟養陰保液清肺潤腸庶可望效方定麥易地黃湯加石斛沙參玉竹芝麻阿膠梨汁白蜜並令飲人乳食豬肚姊言前醫以嗽熱未清戒勿食葷予曰穀肉果菜食養盡之今病久腸胃乾枯須假物類脂膏以補人身血液古有豬膚湯豬肚丸可法也於是藥食並進熱嗽漸減便潤食加調治一月諸候均愈肌肉復生乃送歸焉族兄女痘證並婦感證瀕危救回大路族兄女三歲出痘如蠶種醫初認為麻越日始識為痘駭甚辭去更醫泛投清解套藥延至九朝色白頂陷勢欲癢塌兄商於予予曰毒盛氣虛船輕載重本屬險逆初起按法圖治尚望生機今無及矣兄懇救治勉訂保元湯用糯米鯽魚羊肉煮汁煎藥晝夜頻灌喜得漿行陷起再加熟地當歸枸杞鹿茸溫補之品僥倖收功無何婦病感證兩進逍遙散不應熱盛脈數口渴舌黃照方加生地黃芩次日證仍未減神昏舌苔乾黑予曰疾急矣非重劑莫挽乃用大劑甘露飲令其濃煎數碗盡今日夜服盡詰朝復視昏熱舌黑如故反增胸腹脹悶旁議二冬寒涼二地滋膩與脹不合予曰古人論治感證始終以存津液為主今熱熾舌涸如斯舍是別無良法兄曰固知藥好然腹脹藥勢不行奈何沉思良久令市大西瓜一枚取汁與服汁盡少頃忽作寒戰目闔昏睡汗出如雨衣被皆濡至晚始定兄問故予曰此戰汗也非此則邪不能達今無憂矣嗣此熱退神清知飢納食惟覺身輕如葉倦怠不支徐為培養血氣而安菜傭某單腹脹菜傭某初患腹脹二便不利予用胃苓之屬稍效渠欲求速功更醫目為臟寒生滿病猛進桂附姜萸脹甚腹如抱甕臍突口乾溲滴如墨揣無生理其兄同來代為懇治予謂某曰爾病由濕熱內蘊致成單脹覆被狠藥吃壞似非草木可療吾有妙藥汝勿嫌穢可乎某泣曰我今只圖愈疾焉敢嫌穢令取乾雞矢一升炒研為末分作數次每次加大黃一錢五更清酒煎服有效再商某歸依法制就初服腸鳴便瀉數行腹脹稍舒再服腹軟脹寬又服數日十愈六七更用理脾末藥而瘳眾以為奇不知此本內經方法何奇之有予治此證每服此法效者頗多視禹功神佑諸方其功相去遠矣胡某乃媳感證胡某乃媳夏月患感證延診時已七日矣切脈弦數搏指壯熱譫狂面目都赤舌黑便秘腹痛拒按診畢令先取冷水一碗與服某有難色予曰冷水即是妙藥飲之無傷蓋欲觀其飲水多寡察其熱勢之輕重耳其姑取水至雖聞予言心尚猶豫勉傾半盅與飲婦恚曰何少乃爾予令盡碗與之一飲而罄問曰飲此何如婦曰其甘如飴心地頓快吾日來原欲飲水奈諸人堅禁不與致焦煩如此予曰毋憂今令與汝飲但勿縱耳因謂某曰汝媳病乃極重感證邪踞陽明已成胃實問所服何藥某出前方乃小柴胡湯也予曰杯水能救車薪之火乎即投白虎瀉心尚是揚湯止沸耳某曰然則當用何方予疏大承氣湯與之某持方不決鄰人曰吾婦昔病此曾服此方得效於是取藥煎服夜間便行兩次次早腹痛雖止他證依然改用白虎瀉心及甘露飲三方出入石膏用至四兩芩連各用數錢佐以銀花金汁驅穢解毒數日間共計用藥數斤冷水十餘碗始得熱退病除眾皆服予膽大予曰非膽大也此等重證不得不用此重劑耳汪氏婦熱病喜飲沸湯汪氏婦患熱病壯熱不退目赤唇乾舌黑起刺便閉溲赤診脈弦數有力應用清劑無疑試問渴乎曰不甚渴惟喜飲沸湯數口稍涼即不欲思如此熱證當渴飲水何反嗜飲沸湯若以此一端而從陰治似乎不可偶憶律云二罪俱犯以重者論今脈證均屬陽熱烏可以喜飲沸湯一事為疑先與小白湯病狀彷彿知其藥不勝病乃進大劑白虎湯石膏重用四兩因其胃熱上衝嘔惡不食更加蘆根竹茹為引另取元明粉蜜拌塗舌以潤其燥如此寒涼疊進閱十四朝始得熱退神清便通舌潤使拘古法以喜熱從陰而投溫藥不幾抱薪救火乎孟子云盡信書則不如無書斯言可證矣蔣某陰暑蔣某夏月病患發熱口渴頭疼身痛醫云傷暑初用香薷飲不應因其熱盛更加青蒿連翹服之益劇診脈沉細望色舌白麵青身雖熱而反近衣口雖渴而喜熱飲謂曰此陰暑證也非姜附莫治其家人曰病者日來熱盛連服涼劑尚未見效且天時酷暑姜附恐未可用予曰夏月伏陰在內人多畏熱貪涼受寒最易若云夏月不可服熱藥則冬月不可服涼藥矣何仲景治冬月傷寒每用石膏芩連耶舍時從證自古有之乃投附子理中湯一服熱退再服病卻汪木工感證舌苔變易之奇汪木工年二旬余夏間患感證初起寒熱嘔瀉自汗頭痛他醫與疏表和中藥嘔瀉雖止發熱不退汗多口渴形倦懶言望色青白不澤舌苔黑黃而潤診脈虛細經云脈虛身熱得之傷暑因擬清暑益氣湯加減服藥一劑夜熱更甚譫狂不安次早復診其脈更細凝為陽證陰脈及視舌苔與昨大異色紫肉碎凝有血痕渴嗜冷飲予思此必內有熱邪蘊伏未透當舍脈從證改用白虎湯加生地丹皮山梔黃芩竹茹燈心下午人來請云服頭煎藥後周身汗出譫狂雖定神呆肢冷不識何故予往捫其手足果冰冷異常按脈至骨不見闔目不省人事知為熱厥命再進藥旁議以為體脈如此怕系陰證前藥恐未合宜予曰此非陰證乃陽極似陰耳若誤投熱劑則殆否則今晚勿藥明日再看何如眾然之次日神呆略回體脈如故視其舌苔又與昨異形短而厚滿舌俱起紫泡大如葡萄並有青黃黑綠雜色膩胎罩於其上予甚驚異辭以不治其母哀懇拯救予憫之揣摩再四令取紫雪蜜調塗舌於前方內加入犀角黃連元參以清熱金汁人中黃銀花綠豆以解毒另用雪水煎藥翌日再診厥回脈出觀其舌泡消退苔僅乾紫耳再劑熱淨神清舌色如常是役也予雖能審其陽證似陰於後然未能察其實證類虛於前自咎學力未到但生平歷治傷寒瘟疫諸候曾未見此舌苔之異且診視五日變幻如出五人前賢諸書亦鮮言及真匪夷所思也諺云讀盡王叔和不如臨證多洵非妄語農人某傷寒誤服涼藥舌見人字紋農人某患傷寒數日寒熱交作自汗如雨就予診治脈虛神倦視其舌苔白滑分開兩歧宛如刀劃考己任編中有陰證誤服涼藥舌見人字紋之語閱前方果然予辭不治渠懇拯救先與六味回陽飲服之有效繼進左右二歸飲數劑舌苔漸退諸恙續痊李某陰證傷寒見純紅舌李某患傷寒畏寒發熱下體如冰脈息沉細飲沸湯猶不知熱陰寒脈證悉具藥當從溫無疑然視其舌色如朱方書云舌見純紅熱蓄里與證不符因其病初起憑脈用藥先與小劑理中湯探之無礙隨用重劑六味回陽飲數服病痊舌色亦退為詳其故殆所謂腎水凌心逼其心陽外越者歟鄭氏婦肝風頭痛鄭婦年近三旬質虧多郁證患頭痛上及巔頂下連齒頰醫稱太陽風邪藥用羌防芎芷痛劇而厥嘔吐不食經脈動惕予曰此肝風也經云諸風掉眩皆屬於肝下虛上實為厥巔疾究由水虛不能涵木怒木生風勃勃欲動誤投溫散益助其威鼓舞鴟張漸變痙厥誠可慮耳方用地黃湯加菊花鉤藤白芍甘草數服稍應思陽但上冒陰不下吸熄風務用鹹寒潛陽必須介類方加阿膠雞子黃牡蠣龜板取用磁石為引使其吸引肝腎之氣歸原服之病釋汪某頭痛預見真臟脈汪某中年質薄且多斫喪頭痛時作時止夏間診脈弦急而枯囑以脈象欠佳速宜靜養多服補藥切勿因循病者以疾雖時發然寢食如常猶不為意逮冬至前二日忽目花面赤昏暈不支延予至勢已敗壞且無力服參因辭不治逾日而逝是病雖敗於冬而真臟脈早見於夏乃枝葉未害本實先撥故也方氏婦目疾誤治變證方氏婦本體血虛偶患目疾眼科認為實火初用芩連清之更用大黃下之飲藥一盞頃忽暈去舌吐唇外不能縮入肢厥脈伏時已薄暮急延予診謂曰寒下耗傷真陽陽氣暴脫勢屬可畏速投溫補希冀挽回方疏通脈四逆湯藥熟不能下咽令取艾火炙氣海關元數壯身始動舌始收忙灌藥一盅移時又厥仍令再炙厥回復進前藥守至黎明始蘇續進左歸飲及滋腎生肝諸劑病痊目亦明矣閔某心脾虛脘痛閔某處境艱難向多憂慮脘痛經歲諸治不瘳望色萎黃切脈細弱問痛喜按乎曰然得食痛緩乎曰然予曰此虛痛也古云痛無補法此特為強實者言非概論也為訂歸脾湯囑多服乃效如言服廿劑有應百劑獲痊後一丐者患同某檢方與之服數十劑亦愈許細長食厥許細長石工也病起少腹脹痛堅硬如石醫用消導藥轉致吐蛔便溺俱閉更醫目為寒凝厥陰投以姜附吳萸痛劇而厥肢冷脈伏急來延予予以手按其少腹見其眉攢難忍之狀謂其婦曰此食厥證也婦曰病果因食冷麵而起然已服過消導藥無效或藥力不及亦未可知第停食小恙何至厥逆吐蛔便溺俱閉予曰穀食下行由少腹右角後出廣腸今食積不下故大便不通直腸緊脹撐迫膀胱小溲因而不利下既不通氣反上行故為嘔吐嘔多胃逆蛔必上攻是以隨嘔而出務得大便一通通則不痛諸證自釋矣但病經多日凝冱已堅非精銳之品不能奏績旋進備急丸三錢頃之腹中雷鳴下結糞數枚再與錢半復瀉十餘行厥回脈出痛減腹軟觀者動色驚有神助後畏藥不服將息而起商人某唇衄奇證奇治唇衄之名醫書未載而予則親見之證治之奇理不可測乾隆壬子秋一商人求診據述上唇偶起一瘡擦破血出不止或直射如箭已經旬矣求與止血之藥按唇屬脾必由脾熱上蒸以故血流不止補用清劑不效因血流多恐其陰傷更用滋水養陰之劑亦不效及敷外科金瘡各種止血藥又不效挨至月餘去血無算形神羸憊自分必死忽夢其先亡語曰爾病非醫藥能治可用慄一枚連殼燒灰同硫黃等分研末和敷自愈醒後依法敷之血果止商人親向予言真咄咄怪事也汪氏婦鼻衄止衄奇法汪氏婦夏月初患齒衄衄止旋吐血血止鼻又衄大流三日諸治不應診脈弦搏知其肺胃火盛非寒涼折之不可乃用犀角地黃湯取鮮地黃絞汁和童便沖藥外用熱酒洗足獨蒜搗塗足心一晝夜衄仍不止因憶門人許生曾言人傳止衄奇法先用粗琴線數尺兩頭各系錢百文懸掛項下再用手指掐定太谿穴太谿穴在兩足內踝下動脈陷處神驗外治之法於病無傷今既諸治罔效姑一試之衄竟止惟神形疲睏頭昏少寐思血去過多真陰必傷改用麥易地黃湯加龜板石斛白芍女貞沙參阿膠旬日霍然識此以廣見聞某婦胎動下血昔聞先輩云補中益氣湯乃安胎聖藥予未深信乾隆癸丑秋某婦懷孕數月腰腹俱痛惡露行多勢欲下墮諸藥不應投以此方加阿膠即安後屢用皆驗下方中有參耆歸術培補氣血妙在升柴二味升舉之力俾胎元不至下陷然後補藥得以奏功血熱加黃芩血虛加地黃尤妙呂婦產後胞衣不下誤藥暈脫呂婦年甫三旬平時面黃體弱因少乳求方與八珍湯服之有驗數年後又因胎產胞衣不下予診之曰此氣虛不能傳送血虛不能濡潤故也令服礙十全大補湯眾議以為新產胞衣積血阻障不出補之不宜或授以單方用芒硝一兩煎服云下胞如神眾咸稱善一七入喉即時暈脫族媼血崩奇證族媼年逾八旬天癸復行日漸淋漓時或如崩頭昏食少心悸不寐予與黑歸脾湯服之不應他醫投以清補固澀諸方亦不效淹纏數月而歿予歷見老婦病此皆不能治古罕言之亦奇疾也方氏女孩帶下罕見之證鄰村方氏女年才四歲其母抱負來舍求治予問何疾曰帶下問疾何時起曰女夜遺溺常以帛墊臥舊春晨起曬帛乍見白物以為偶然後頻下不已漸覺面黃肌瘦飲食減少今經一載時發時止附近求醫皆言未見之證予曰此先天稟弱脾虛挾溫故也但童真未充早泄誠非所宜令夜服地黃丸早服參苓白朮散匝月而效半載後疾復發仍令守原方服愈嗣後不聞消息及閱怡堂散記載一七歲幼女患此證雖已治痊後出室懷孕一產即脫亦夭之由也方氏女孩得無類此洪大登痙病洪大登為人廝役體虛多勞初病夾車緊痛服疏風藥二劑臥不能起口不能張日飲米泔僅以茶瓶嘴灌入四肢攣急每小便須兩人抬起痛甚汗淋診脈細濡兩尺尤弱有從外感起見仍欲用風藥者予曰此痙病也氣血大虧服此即不救擬用大劑補元煎旬余未效病家亟請更方予曰毋庸藥力未到耳原方令守服二十劑漸能掉動服至兩月始出戶庭王木工反關脈王某木工也向患胃痛諸治不效一醫以草藥與服陡然便血半桶時時暈去閉目懶言汗淋氣怯診脈全無按脈乃血派此必血脫之故然血脫益氣須用人參彼木工焉能得此辭不與治料其旦晚必脫也越月遇諸途見其行動如常心竊訝之後因他病來視問其前恙如何得愈曰先生言我病危非參莫救求醫無益只得日煎黨參湯飲之僥倖得活予曰此亦血脫益氣法也再診兩手仍然無脈思人久無脈焉能得生沉吟半響恍然悟曰此必反關脈也覆候之果然渠乃匠人脈之如何原不自知予前診時因見其外證之危倉卒未及細究識此告諸診家務須留神詳察也王某血證頻發老醫方星岩曾向予言昔從上海王協中先生遊論及血證愈後每多反復者此由胃膜破傷須用法補之思之至再訂方用白芨魚膘絲綿三味燒灰等分為丸服之永不復發王某患此證莫能除根令服此丸果驗族子石淋奇證族子年方舞勺初時小便欠利不以為意後每溺莖中澀痛醫作淋治溺更點滴不通少腹脹硬臥床號叫晝夜靡安延予至家其母手拈一物與予視之云病者連日小便全無昨夕努掙多時突然溺出此物當覺通快喜為疾卻今又復閉豈尿管內尚有此物塞住耶予視其形如豆色蒼而堅置臼中搗之不碎考方書雖有石淋一證即予平素目睹患此者亦不過如鹽沙之細今此石形大如豆從未之見初以為妄試取簪柄探入莖中撥之硜然有聲方信溺之不通竟由於此思將此石取出特古無是法不敢妄出意見辭不與治聞後石不得出莖根爛開一孔溲又彼泄遷延而歿越數年道出廬江遇呂墨從先生言彼邑昔有徐姓老醫能治此證親見其治愈數人其術用刀將陰莖剖開取出石子敷以末藥旬日即愈予心異之欲求其方其人已物故矣因並志之倘後有患此者須求巧手剖之可也曹某忍精淋痛淋痛一證今人多用八正分清等方然有效有不效者蓋陰莖有精溺二竅若因濕熱阻閉膀胱病在溺竅則前藥投之是矣尚因房勞忍精病在精竅乃有形敗濁阻於隧道徒進清利無益此證葉香岩論之甚詳言古有虎杖散近世不識此藥治用杜牛膝根絞汁一盅衝入麝香少許隔湯燉服並宗朱南陽方法用兩頭尖川楝子韭白歸尾等味曹某患此證予仿前法治愈後治數人俱驗因並識之王氏婦痹證王婦周體痹痛醫作風治臥簀月餘肢攣頭暈予見之曰此痹證也軀殼外疾雖無害命之理但病久寢食不安神形困頓速救根本猶可支撐若見病醫病則殆矣方定十全大補湯加枸杞杜仲鹿角膠兩服未應眾疑之予曰緩則療病急則顧命今病勢敗壞如斯舍是不救且補虛與攻實不同非數十劑莫效又服十日周身發腫眾稱病變予曰勿憂凡風寒客於人壯者氣行則已怯者著而為病本由營氣不足邪陷於裡今服補劑托邪外出乃佳兆也仍命照方多服痛止腫消而愈識此為治痹恣用風燥藥者戒自病臂痛嘉慶癸亥歲予因夏熱夜臥石地受涼秋後臂痛莫能屈伸初服溫經散邪之劑不效外貼膏藥又不效思筋骨間病藥力難到古有暖洗一法日洗藥水其痛如故偶閱韓氏醫通云有痿痹疾者偎臥患處於壯陰之懷久之生氣和浹病氣潛消試仿其法將痛臂夜令室人以熱體偎之數日而愈按歸田錄云人氣能粉犀則療痹固其宜矣續錄黃敬修兄咳血敬兄向在金華貿易恙患咳血醫治無效食微肌瘦慮成損怯予時至蘭溪友人薦延診視閱前諸方偏於溫補謂曰古人治血證雖有此法然須審其證屬虛寒方為合轍據茲脈證責諸肺腎陰虧肝陽上僭咳甚火炎血隨溢出理應滋水生木潤肺保金得以咳稀血當自止服藥投機予欲辭回敬兄固留為治月餘咳血全好餐加神旺肌肉復生安波按溫熱治虛損與草菅人命何異故前賢云男子陽常有餘陰常不足蓋男子氣恆有餘者多血患不足者不少以溫熱治虛損者仲聖建中之類也其內以稼穡作甘之本味急建其中氣俾中宮得強飲食增而津液旺以至充血生精而復其真陰之不足愚意以治脾虛損怯則可若腎陰耗乏相火燥金見咳嗆累血形銷骨折遺泄潮熱等疴投之如抱薪救火矣鮑宗海風寒喘嗽誤補肺脹欲絕治驗黃敬修兄店內有同事鮑宗海者因感風寒喘嗽多日就彼地某姓老醫看視謂其證屬內虧藥與地歸參朮予見方勸其勿服宗海以為伊體素虛老醫見識不謬潛服其藥是夜喘嗽益甚次日復往加減醫謂前藥尚輕更增黃耆五味子服後胸高氣築莫能臥下呷呀不休閉悶欲絕敬兄詢知其故囑予拯治予曰前藥吾原勸其勿服伊不之信況加酸斂邪錮益堅如何排解敬兄云渠與我同事多年不忍見其死而不救揣摩至再立方用麻黃桂枝細辛半夏甘草生薑杏仁葶藶子並語之曰此乃風寒客肺氣阻痰凝因而喘嗽醫不開解反投斂補以致閉者愈閉壅者愈壅釀成肺脹危證金匱云咳逆倚息不得臥小青龍湯主之予於方中除五味白芍之酸收加葶藶杏仁之苦瀉者蓋肺苦氣上逆急食苦以瀉之如救眉燃不容緩待也敬兄欣以為然即令市藥煎服少頃嗽出稠痰兩盂胸鬲頓寬再服復渣又吐痰涎盞許喘定能臥宗海始悟前藥之誤泣求救援予笑曰無妨枉自吃幾日苦耳次劑麻桂等味分兩減輕參入桔梗橘紅茯苓蘇子更為調和肺胃而痊安波按風寒咳嗽亦一大症也不可渺視為輕淺者徐氏靈胎苦志三十年始能治咳先生於小青龍去味芍加葶杏真善法古人而不泥古人者也胡某婦臟躁面論證治方法長林胡某延診婦病據述證經半載外無寒熱飯食月事如常惟時時悲泣勸之不止詢其何故伊不自知延醫多人有云抑鬱用逍遙散者有云痰火用溫膽湯者藥俱不效又疑邪祟禳禱無靈咸稱怪證懇為診治視畢出語某曰易治耳立方藥用甘草小麥大棗某問病名及用藥方法予曰病名臟躁方乃甘麥大棗湯詳載金匱玉函中未見是書不識病名焉知治法宜乎目為怪證也某曰適承指教足見高明但拙荊病久諸治無功尊方藥只三味且皆平淡未卜果能去疾否予曰此仲聖祖方神化莫測必效無疑服之果驗安波按有時法於古而不泥於古有時竟法於古而泥於古此之謂良工也余振如兄幼子胎癇振兄乃郎出胎兩月突然肢搐目斜逾時乃定乳食如常以為偶然次日又發幼科作胎驚治藥用疏風鎮驚不應發經數日俱在巳午時候予視之曰此非胎驚乃胎癇也振兄云胎驚則嘗聞之矣胎癇之名請問出於何典予曰名出內經帝曰人生而有癲疾者病名曰何安所得之岐伯曰名為胎病此得之在母腹中時其母有所大驚故令子發為癲疾也注云癲癇也夫驚之搐搦無定癇之發作有時大人之癇疾亦然惟其發作有時故較驚稍輕耳愛用茯神遠志麥冬丹參甘草白芍菊花鉤藤桑寄生以安神定志養肝熄風少入橘紅半夏曲以滌擾心之痰涎蓋疾由母腹受驚而得病在心肝二臟神安風熄其疾自平妄行疏散則風益動襁褓胃氣薄弱金石鎮墜尤非所宜服藥其發漸輕未幾而定所見數兒證同皆照此法治愈安波按斯症邇來幼醫輒以抱龍等丸從事從不知孩提之負屈者豈止恆河沙數乎柳聖依翁夫人熱病戰汗而解聖翁夫人夏間病患熱盛無汗煩渴昏譫醫治旬余不解聖翁外貿伊郎蔭千兄廷予診視脈數舌黃謂曰此熱病也非清不可疏竹葉石膏湯與之時夜將半聞叩扉聲甚急啟視蔭兄慌入而言曰病危矣詢其故曰妙劑當服頭渣至暮未見動靜再服復渣更靜後忽寒戰肢抖少頃汗出如漿膚冷息微閉目不語眾以為殆歸咎藥性太涼欲投參附以救其脫亟求復診以決之予即隨往捫其肌膚果冷細按脈雖虛耎然至數和緩並不急疾曰無妨此戰汗也因本氣不足邪氣鴟張予重用清劑驅之邪不能留逐與正爭是以戰而汗出邪雖從此而解正亦由此而虧且任其養息切勿驚擾元氣來復自然膚暖神蘇若驟進參附誠恐餘燼復炎反為害矣葉氏論溫熱病戰汗解後胃氣空虛有膚冷一晝夜之說取書與閱群疑始釋另立一方用生脈散加茯神玉竹白芍甘草囑市藥煎好俟其甦醒與服並啜稀粥以養胃氣次早蔭兄來謝云昨夕非子有定見幾為旁言所誤遵囑靜守逾時汗斂神蘇忙將煎好之藥服訖復睡至曉肌膚已溫唯形倦氣怠耳更為輔正養陰和胃漸次而康安波按斯證若脈急數自汗如雨躁煩不安神志不寧是自氣脫陽越之候速宜大劑回陽與此大相懸絕鮑子欽兄感風停食小恙猝變虛脫宜用急療之法子欽兄幼年質弱偶因停感發熱腹痛兒科藥用荊防查曲服後熱退痛止以為應驗距意次日臥床不起頭重目闔氣怯懶言不飲不食急延予至見其形狀倦怠切脈細軟無神維時伊舅柳蔭千兄在座予告之曰令甥之恙乃元氣不支切恐虛脫亟宜峻補遲則難救蔭兄云舍甥病才兩日消散又未過劑童質固虛何至遽脫豈可驟投重補耶予曰小兒臟氣易為虛實脈證疲憊如斯舍此別無他策仿補元煎方法與服二劑病仍未轉伊乃堂憂甚予曰凡治病補虛與攻實不同攻實可求速效補虛本無近功服藥病既不增虛能受補即為見效古稱填補如地有陷阱方能容填若平地填之成敦阜矣仍依原方加入耆朮茯神棗仁合歸脾湯守服浹旬頭豎目開飲食照常儼如無病安波按於庚辰歲治餘杭金姓稚子年甫五齡形頗骯髒忽患暴注下迫形神頓減小尿短滴幼醫以消導之屬靡不備嘗或有以暴瀉屬熱者需胡黃連之類其瀉轉甚延余診治脈之細弱乏神按之則空胎微黑不渴曰寒邪直中太陰所致非附子理中湯不可遲則恐變乃尊曰邪中太陰已領教矣然小兒體若純陽胡可以熱濟之乎余曰醫貴活潑不可紐執一說以塞見聞彼以為然投之果應此症與斯案相類險為膚見所阻故錄出為固執者鑑族婦眩暈續堂弟媳所患證同治皆無效不藥自痊予童時見族中一婦人頭額常系一帶行動須人扶掖云無他病惟頭目昏眩飲食倍增形體加胖稍飢心內即覺難過醫治無效只得屏藥越數年疾自愈形體退瘦飲食起居如常其致病之由及所服方藥均不同考後堂弟媳年二旬余因遭回祿憂鬱成疾見證與族婦彷彿予知其疾由鬱而起初投逍遙達郁繼加丹梔清火更進地黃阿膠滋水生木白芍菊花平肝熄風磁石牡蠣鎮逆潛陽等法俱不應他醫以為無痰不作眩藥用豁痰又以為無虛不作眩藥用補虛亦皆無驗遂不服藥四旬外病自瘳予生平所見眩暈之疾未有甚於此二證者且病中諸治不應後皆不藥自痊事亦奇矣細求其故蓋病關情志是以草木無靈由此觀之凡七情內傷致病皆可類推安波按七情致病者尼師寡婦室女為尤甚必須陶情怡悅所謂心病必以心藥治也洪荔原翁挾虛傷寒荔翁年逾強仕冬月重感寒邪診脈細緊見證寒熱無汗頭疼體痛初投附子理陰煎汗發不出復診方加人參麻黃翁曰麻黃性悍駛不能御吾質素弱恐不可服予笑謂曰他人之麻黃或不可服予之麻黃放心服之蓋醫當論方不當論藥若以此加入表散藥中則誠駛不能御今合補劑有人參熟地監製之雖勇過孟賁亦難肆其強悍之性矣古人用散法有皮毛肌肉血脈筋骨之殊峻散平散溫散涼散之異至於陽根於陰汗化於液云騰致雨之妙獨景岳先生得之其所制理陰煎及麻桂飲大溫中飲數方真可稱長沙之功臣而補其所未備也況理陰煎方後有原加麻黃之法又何疑耶翁信予信一服汗出而解安波按於辛已歲治王少蓮者夏月納涼痛飲日晡覺頭重惡冷至次日壯熱憎寒口燥渴而不飲目赤汗沾診得脈洪大而空沉按若無苔來黑滑余曰此腎陽為陰暑所迫致見陽氣上戴目赤口燥不飲脈空無神壯熱惡寒即傷寒論之戴陽證也擬附子理中湯加香薷人參一劑而神清楚寒熱頓減口不燥目赤退諸恙稍愈後以斯方減輕加以祛暑滲濕而痊似此案之相類故亦錄出以廣後來者之目洪召亭翁夫人胎動血暈急救保全召翁夫人懷孕三月胎動血崩發暈促往診視乃告翁曰妊娠胎下血暈已為重險今胎未下而暈先見倘胎下暈脫奈何翁囑立方予曰血脫益氣舍獨參湯別無良藥翁問所需若干予曰數非一兩不可翁出取參予聞房內雇婦私語胎產服參不宜亟呼之出語曰爾何知勿妄言以亂人意少頃翁持參至予欲辭回思適才雇婦所言恐病人聞之疑而不服豈不僨事只得俟之翁持參湯予隨入房病人果不肯服翁無如何予正色言曰性命安危在此一舉今若不服此湯胎下暈脫莫救俗見胎產忌服人參無非恐其補住惡露在胎下後猶或可言今胎未下與平常臨產無異豈平常臨產可以服參今昏暈欲脫反不可服乎予治此症頗多勿為旁言所惑病人疑釋一飲而罄予曰有此砥柱中流大勢可守尚防胎下復暈其參渣再煎與服為妙詰朝復診翁云昨遵諭仍將參渣煎服薄暮胎下惡露無多暈亦朱作令多服培養氣血之劑而痊續翁媳升冶兄令政半產胎下血暈時值寒冬夤夜招診兩脈已脫面白肢冷亟以參附湯灌蘇一家兩證勢俱危險皆仗參力保全胎產不可服參殊屬謬語安波按半產之虛虛不待言況產前血暈等脫候可不以參輔乎險為愚婦僨事得以獲全者亦幸耳曹引泉翁竹筒痢引翁年將花甲秋季患痢纏綿日久清利過劑肛如竹筒直下無度臥床不起診脈細濡望色憔悴知為脾腎兩虧元氣下奪所幸尚能納穀胃氣未敗仿胃關煎調石脂餘糧末與服兩日其痢稍減再加桑螵蛸晚間參服四神丸治療匝月始安波按痢者利也不可以通利治痢之常藥以醫老人久痢之不固其法不一醫師胸有成竹耳王策勳先生幼孫疳疾予弟倚蘭服賈廬江戊辰冬予自中州回道經彼地羈留信宿有王策勳先生者與予弟善抱其幼孫懇為診治視其體熱面黃肢細腹大發焦目暗頸起結核予曰此乃疳疾疳者干也小兒腸胃柔脆乳食失調運化不及停積發熱熱久津干故名曰疳又謂之丁奚哺露丁奚者言奚童枯瘠如丁哺露者言愈哺而骨愈露但是疾每多生蟲蟲䘌日滋侵蝕臟腑非尋常藥餌所能去病古方有布袋丸治此證多驗藥用人參白朮茯苓使君子肉各一兩蘆薈夜明沙蕪荑甘草各五錢共為末蒸餅糊丸每粒約重三錢日用一丸以夏布袋盛之另切精豬肉二兩同煮汁服肉亦可食如法制就服完一料而愈安波按布袋丸名亦奇方亦奇故治亦奇沈姓幼童五齡者余之內戚也患腹膨形黑善食作瀉雖骨支床已半載矣余宗是丸服半料沉疴霍然蓋意布袋者今人之胃如物之袋病久致疳蟲蝕已空故其胃必虛津液必涸賴以豬肉汁充養胃陰而從藥得以各司其司同心共濟以奏凱歌也金蔭陶封翁久瀉滑脫之證封翁年愈古稀恙患泄瀉公郎邁倫兄善岐黃屢進溫補脾腎諸藥淹纏日久瀉總不止招予診視謂邁兄曰尊翁所患乃瀉久腸胃滑脫之候也十劑云補可去弱澀可去脫瀉久元氣未有不虛但補僅可益虛未能固脫仲景云理中者理中焦此利在下焦赤石脂禹餘糧丸主之李先知云下焦有病人難會須用餘糧赤石脂況腸胃之空非此不能填腸垢已去非此不能復其黏著之性喻西昌治陳彥質浦君藝瀉利久而不愈用此俱奏奇功遂於原方內加入石脂餘糧服之果效安波按善師古人之法洪梅渚翁肝鬱犯胃痛嘔發黃溫補藥誤危而復安嘉慶辛未春予患眩暈不出戶者累月友人張汝功兄來言洪梅翁病劇述其證狀起初少腹痛嘔吐醫謂寒凝厥陰投以暖肝煎痛嘔益甚又謂腎氣上衝更用理陰煎合六君子湯每劑俱用人參服之愈劇脘痞畏食晝夜呻吟面目色黃醫稱體虧病重補之不應慮其虛脫舉室憂惶復有指為疸證欲進茵陳蒿湯者囑邀子診以決之予辭以疾汝兄強之於是扶掖而往診畢笑謂翁曰病可無妨但藥只須數文一劑毋大費主人物料方疏加味逍遙散加鬱金陳皮穀芽蘭葉乃弟並鋒翁曰家兄年將花甲病經多日痛嘔不食胃氣空虛輕淡之品恐不濟事予曰此非虛證藥不中病致益劇耳經云諸痛屬肝病由肝鬱不舒氣機遏抑少腹乃厥陰部位因而致痛肝氣上逆沖胃為嘔溫補太過木鬱則火鬱諸逆衝上皆屬於火食不得入是有火也至於面目色黃亦肝鬱之所使然非疸證也逍遙一方治木鬱而諸郁皆解其說出趙氏醫貫予輯載拙集醫述中檢書與閱翁以為然初服各證均減服至四劑不痛不嘔黃色盡退共服藥十二劑服食如常是役也翁病召診日皆汝兄代邀語予曰翁前服參藥不應自以為殆予藥如此之輕見效如此之速甚為感佩囑予致意容當圖謝予曰醫者愈病分所當然惟自抱疾為人療病行動蹣跚殊可笑耳翁有盛情拙集輯成借代付梓亦善果也勝酬多矣晤間翁問尊集成乎予曰未也翁曰且俟脫稿薄助剞劂閱茲廿載集成而翁已仙矣集首閱書姓氏款中謹登翁名不忘其言安波按治肝一法不外辛散酸收甘緩此古制逍遙散之妙也但肝病已久必盜母氣故前賢有溫暖肝腎乙癸同源之治如腎陰偏傷木火內燃雖滋腎陰一法以柔肝然肝最礙補必須病久或腎家素有宿疾方為合符耳第治肝以辛散酸收為多以滋補收納者十中一二耳又乃愛暑邪擾胃發熱吐瀉欲作驚搐梅翁令愛年甫兩齡仲夏時發熱吐瀉渠宅同事方心樹兄知醫作暑風食滯治熱甚煩渴吐瀉益頻延予至心兄述其病狀並用藥大意予視其兒身熱肢冷舌絳苔黃煩擾不定謂心兄曰證屬暑邪擾胃熱氣上衝以故渴飲吐瀉經云諸逆衝上皆屬於火暴注下迫皆屬於熱但嬰兒質脆暑邪酷烈最易激動肝風許宣治先生論暑風驚候由吐瀉而後發搐者謂之慢驚治之不易且吐甚於瀉吐多胃傷不能宣布津液是以諸藥無驗必得生機活潑方轉靈軸所制黃土稻花湯一方甚妙予遇此證每仿其法治多應手於是方疏黃土稻花沙參茯苓甘草半夏烏梅木瓜扁莢葉因其熱甚再加黃連一劑而效夏月小兒感受暑邪熱渴吐嘔不利於香砂術曲者服此方而晏如安波按細繹方議暑邪犯胃為嘔以黃土稻花溫而不燥香而不竄安胃為君吐多傷液以沙參茯苓甘草半夏養而不膩輔而不滯使中宮得以運旋則吐瀉不治而自愈矣故主為臣蓋土氣衰微致招客邪則勝已之木來侮可不待言而知也故以烏梅木瓜預以定木為佐而脾胃得以安肝得以伏而炎炎之暑邪未驅故使以扁豆葉得金氣之最早祛暑平木良由斯乎又乃郎濕溫感證梅翁幼郎夏間患感證見其發熱口乾舌苔白膩知有伏邪思膏粱稚子提攜捧負邪何由受詢其乳媼據云向系樓居近緣天暑移住地房黴氣甚重病因此受亦未可知予曰是矣蓋黴濕之氣從口鼻吸入伏於膜原醞釀為熱自里達表不比風寒客於皮毛可以辛溫發散而治也初用淡豉蘇梗鮮藿香秦艽廣皮桔梗連翹甘草通草之屬芳香解穢辛涼透邪服藥熱甚煩渴舌苔轉黃方除蘇梗廣皮加入黃芩黑梔赤苓澤瀉熱渴不止舌色欲焦予素手戰渠宅視恙方俱心樹兄代書乃謂之曰此證熱勢熾甚非白虎湯不能去病心兄云據證應用此方但白虎之名俗多恐畏或至明日如病不減再進如何予曰拯溺救焚急不及待今舌欲焦邪熱燔灼胃津已傷倘到明日舌若變黑而成胃實則非白虎所能勝任再投承氣豈不更駭聽聞因將病原治法細與渠宅說明當用石膏一兩知母一錢並加滑石蘆根其餘梔芩等味分量均照前加重次日復看身熱較輕舌焦亦潤但病來勢暴若驟鬆手恐其餘燼復燃仍守原方再服一劑轉用沙參玉竹麥冬丹皮石斛料豆梨汁芝麻養陰需液而痊安波按讀斯篇未終不覺喟然長嘆已三息矣蓋古之名湯治疾二翻三複者甚眾今時地卑氣薄藥未終劑更醫已數四矣故出類拔萃之輩常立於人背之後是殆所謂命也夫張汝功兄乃郎嗽久傷陰奇治驗汝兄乃郎年方齠齔秋間咳嗽入冬不止初起嗆嗽痰澀氣急面紅漸次潮熱脈數食減肌瘦藥如瀉白散止嗽散清燥救肺湯遍嘗無驗汝兄慮成童怯囑予籌治令且停藥每日用甜雪梨一枚去皮渣雄豬肉四兩同切塊清水煮湯啜之其肉與粳米稀粥同食兒病日久戒食葷油復為藥苦得此可口食而甘之數日而效浹旬而痊汝兄稱謝並問其故予曰斯證即喻西昌所謂秋傷於燥冬生咳嗽之候也夫燥者濡之其所以服諸清潤之劑而不應者緣童質向虧嗽久陰傷凡藥皆草木根荄只可濡其時邪之燥未能滋其津液之干耳經云陰之所生本在五味五穀為養五果為助五畜為益故用豬肉雪梨粳米諸多濡液滋干之品氣味合而服之以補精益氣豈尋常方劑可同語耶汝兄慨然曰人知藥能療病不知藥反增病人知食肉病復不知食肉病愈今而後益信醫理淵深不易知也安波按讀斯案字字珠玉可見醫貴圓通徒執成方於胸中亦復何益又令愛暑入心包拯治無功後見數人證同皆不可救並答門人四問汝兄令愛笄年在室時屆季夏薄暮忽覺微寒夜發壯熱頭痛嘔吐次早迓予其女出房就診脈弦急數舌苔白膩謂汝兄曰證屬時感暑風來勢不輕防其生變方用葛根防風以祛風香薷茯苓甘草半夏滑石扁莢葉以清暑詰朝入房診視脈證如故舌苔轉黃熱盛口渴目定神呆方除葛根防風半夏加入連翹知母花粉鮮荷葉四朝再視病者扶坐榻上昏昏不語令其伸舌勉伸半截尖絳起刺汝兄云小女夜來熱熾煩渴呻吟不安黎明稍定以為病減不意神更昏迷肢漸厥冷未識何故予曰此暑入心包邪陷於裡熱深厥深肝風欲萌勢屬危險可延他醫酌之汝兄堅囑拯治思暑由上受首先犯衛漸傳入營葉氏有清絡熱必佐芳香開里竅以清神識用至寶丹一法吾鄉苦無此藥姑用生地元參銀花麥冬川連犀角鮮菖蒲西瓜翠衣令取荷露煎藥翌日復召病勢益劇目闔肢掣口噤牙咬予曰肝風已動證成痙厥不可為矣汝兄乞籌以希萬一揣諸病情治法不過如此奈服藥不應無已再想外法令桃黃土攤地上鋪荷葉將病人抬置其上另用紫雪牛黃蜜調塗舌方加鉤藤桑寄生羚羊角平肝熄風至第六朝汝兄來云昨晚肢掣不作口噤已開似有生意再煩視之至見病人眼戴口張痰聲漉漉切脈如絲予曰此非掣定乃元氣內奪無力鼓動故也脈證俱敗危期速矣延至七朝而歿未幾又見鮑菶莪翁令媳之證菶翁邀視媳病云日前因熱貪涼起初頭痛嘔惡旋即怯風發熱至今熱猶未退似屬外感煩為解散免致成瘧導予入室診際問其頭痛乎病者不答轉令使女詢之亦復默然予曰殆證也辭不治菶翁云小媳病才兩日其候不過發熱頭痛何以言殆予曰害雖未形其機已露蓋此病因於冒暑夫暑喜傷心心者君主之官神明出焉頃問病原蔑知應對足徵邪犯心包神明為之紊亂按心肝為臟臟者藏也邪已入臟斷難驅逐且手足厥陰相表裡肝風痙厥蟬聯而至預期一候恐有風波並將張汝兄令愛病狀告之翁雖唯唯然未深信續延他醫療治諸證蜂生果至七朝而逝始信予言不虛後旬日又見許禮門翁令侄媳之證禮翁儒而通醫因乃侄媳病見招晤間予告以近視張鮑兩女病均不治之故翁蹙然云舍侄媳病候與此彷彿奈何予問病經幾日矣曰五日問其狀曰身熱肢涼昏迷瘛瘲予曰邪已入臟不可救矣其姑堅托診視脈證俱殆翁求舉方予曰適談前視張鮑兩女證維時病人猶能行動尚不可療況如是乎辭欲登車其僕乞診婦病詢其何疾云病起三朝發熱不退神漸昏冒今早手足微掣予曰此亦暑入心包之候也可不必往翁強之皆至其家見婦昏臥於床熱盛息粗面赤唇乾舌伸不前抉視色絳苔黃切脈弦數辭不用藥僕人跪懇勉議清解暑邪芳香宣竅之劑並囑用黃土荷葉墊臥越日僕來言主母已故妻病服藥熱緩掣定神識稍清復為加減幸得獲痊後期年再見洪蕊春兄令媳之證蕊兄乃媳長夏患病四朝熱盛神昏舌黃口渴肢冷脈細予診之曰此暑邪內犯心包棘手之候蕊兄囑治勉商清暑滌邪參以芳香開竅並語之曰服藥熱減神蘇庶可圖幸若肝風一動則難救矣旁議予方過涼另延他醫以病者肢冷脈細認為陰寒遂用姜附置諸陽證不問歙俗病家服藥喜熱畏涼膏粱殆甚維時姻婭咸集度其少年新婚當從陰證治法蕊兄自不知醫因聽眾咻信以為是友人方瑞徵病者之表兄也予視病時渠亦在座見後醫之方與予相左私叩所以予曰病屬暑邪入臟熱極似寒實非陰證亟為清解猶恐不及再投姜附豈不火上添油乎瑞兄云家姑現在伊宅吾往告之勿服其藥如何予曰子固婆心但予雖能決其服彼藥而必死然未能料其服予藥而必生續聞競服彼藥肝風大動顛簸反張憑空躍起數尺爬床搔席齧舌斷齒未至一候而亡予所見數證臨危俱動風抽掣然不若此之劇蓋由姜附燥烈以剛與剛益助其威耳後十餘年復見吳蔚揚兄令愛之證蔚兄令愛適本里洪宅即星恆翁之乃媳也年近二旬形瘦質弱星翁乃郎向外貿易因病遄歸媳侍湯藥憂勞交集時值溽暑偶作寒熱次日熱發不退頭痛嘔吐逆予診之擬屬暑風相搏投以輕解之劑詰朝脈證如故神識欠慧予謂星翁曰令媳病勢頗劇刻防傳變可速告知令親切勿輕忽原方佐以清熱辟邪四朝再召蔚兄在座據言昨夕熱盛煩躁今晨人事更迷予入房診畢曰邪已入臟旦晚肝風即至病人體薄且多憂勞料難支撐並將疇昔所見諸證向說囑早延醫斟酌蔚兄務求畫策勉於昨劑中參入芳香開竅以盡人工五日黎明星翁遣價來請予辭不往再四相邀至見病者昏臥肢掣喉中痰鳴予曰內閉外脫蔑能為力他醫用藥亦無效靈越日而殂安波按於壬小春初二治錢清場司秦積卿公祖年將古稀神采矍鑠六旬余得類中症後以大補獲痊今歲秋季忽覺形寒怕熱溺短便澀素善飯膳須豚蹄之屬飢必以大碗燕窩其餘茶食之類常不輟於口寒熱之際啖食亦恐失餓致見神采蒙瞶口牽指搐目閉溲遺切脈沉伏撬視舌苔乾燥黃厚余曰此伏暑候也年高怯弱慎防內閉外脫之險辭以不起彼人固求立方余勉擬芳香開竅辛涼豁痰之劑今伊速覓妙手評酌醫亦吾藥彷彿竟服彼方次日復診余視脈病仍然令搜真西黃幾釐調至寶丹抹塗舌上倘得神定搐回可望萬一如是彌留者五日矣渠竟獲得西黃幾釐調至寶丹將塗詎期舌初沾染而公竟仙逝矣茲閱斯案益奇先生之明決於一候之間神乎神乎門人問曰暑入心包一證古人略而不詳近葉氏案載證治數條似非不救之候且六淫首重傷寒其危莫如兩感雖軒岐只有死期而無治法然後賢謂用藥先後發表攻裡復推出可生之機今讀先生所著暑入心包數案咸辭不治或拯無功果斯候之危甚於兩感而竟不可救耶答曰傷寒兩感固危畢竟其邪表裡雙傳猶或可據可療暑邪變幻無常彼暴中之激烈扁鵲不及攦指而投咀蓋緣心為君主之官心包乃其外郭邪犯心包至危至急烏可同類而語乎又問曰暑入心包危急之故已聞命矣然三因病候多端豈無一二可與比類者乎答曰安得無之小兒夏月冒暑發熱陡然神昏肢搐俗呼暑風急驚其證彷彿其原相同洵可以稱比類也但暑邪感觸小兒即作驚搐者多大人即入心包者少小兒暑風急驚十中可救七八大人暑入心包十中難拯一二此中奧義不可不明蓋小兒質弱臟氣未實邪入易故病多大人體強臟氣已實邪入難故病少惟其入之易則其出亦易故治易入之難則其出亦難故治難即此觀之病情思過半矣又問曰夫子發蒙解惑暢論病機頓開茅塞頑鈍輩以為古人治病證分寒熱藥析溫涼今見數案治法悉是清暑辟邪參以芳香通竅不識此外尚有他法可施與答曰凡治他病證有寒熱之殊藥有溫涼之異惟此一證有熱無寒比例溫病病必有陽而無陰藥必用寒而遠熱夫暴病暴死皆屬於火苦寒則凝冱稽遲焉有如此之激烈哉予為子輩再伸其義醫方八法汗吐下和溫清補滲是也此證邪已入臟汗之不宜腑病宜通臟無下法溫則以剛與剛和解滲利絕無干涉痰食結胸則吐之臟邪從無吐出之理至於補法傷寒中風邪陷於裡往往用之無如此證邪入瀰漫虛靈閉塞不滌其邪徒補無益故舍清法別無可施譬諸救焚舍水他無可用再按小兒暑風驚證質實能受清涼者可治質虛不受清涼者不可治此證亦然曩治許禮門翁僕婦之證得愈者亦因其藜藿體堅能受清涼故也膏粱羸弱患此欲求倖免者幾希又問曰傷寒論云太陽病頭痛至七日以上自愈者以行其輕盡故也若欲作再經者針足陽明使經不傳則愈此仲師驗治傷寒傳經之法也夫子言暑入心包之候危於傷寒但寒之傷人尚少暑之傷人甚多暑邪之入臟如傷寒之傳經應可預知曷不仿仲師針法使其不入可乎答曰此未可易言也夫寒邪未傳之先有證可據暑邪未入之先無證可憑當其疾作之始身熱頭疼嘔吐口渴與尋常暑證不殊有此慧眼能預知其邪之欲入而為設法堵御耶內經論卒中雲急虛身中卒至譬如墮溺不可為期可類推矣雖然邪之未入固難預知而邪之既入不可不識凡診暑證二三日間視病者神識微呆即是邪入之徵此語未經人道舟子望雲而知風汛予閱歷有年之一得耳既知邪之已入維時其入尚淺肝風未萌似可極力驗之勿令入深可也無如暑邪變幻電掣雷奔迅速異常縱使驗逐枉竭其力罕見其功亦非臨證目擊不能知之茲因子輩之問一伸病機惜未水飲上池無浣腸滌胃之術能起人於九死一生之中徒自歉耳安波按病至危證畢聚雖有慧心妙手亦奚以為姑立方者聊盡良工之婆心耳葉蔚如兄脅痛便閉一劑而效蔚兄來診云病初右脅刺痛皮膚如烙漸致大便閉結坐臥不安每便努掙痛劇難耐理氣清火養血潤腸藥皆不應切脈弦急欠柔謂曰易治耳一劑可愈蔚兄云吾病日久諸藥無靈何言易治予曰此乃燥證肺苦燥其脈行於右與大腸相表裡方書論脅痛以左屬肝右屬肺今痛在右脅而便閉結肺病顯然但肝雖位於左而其脈縈於兩脅內經言邪在肝則兩脅中痛今痛雖在右脅不得謂其專屬肺病已也夫金制木憂傷肺金失其剛轉而為柔致令木失其柔轉而為剛辛香益助其剛苦寒愈資其燥潤腸養血緩不濟急訂方用栝蔞一枚甘草二錢紅花五分蔚兄見方稱奇乃詢所以予曰方出赤水元珠夫栝蔞柔而潤下能治插脅之痛合之甘草緩中濡燥稍入紅花流通血脈肝柔肺潤效可必矣服藥便通痛減能以定臥隨服復渣微溏兩次其痛如失安波按懷抱奇肋痛法亦可參用曹靜川翁孫女頦脫音啞靜翁孫女年甫三齡夏月發熱醫作暑風治投清散藥兩劑忽頦脫音啞食莫能嚼飲莫能啜又以為風中會厭仍用散藥靜翁遲疑邀予商酌謂曰頦屬腎頦脫腎虛之徵腎脈循喉嚨挾舌本為聲音之根經云內奪而厥則為喑痱兒質本薄暑復傷氣更服辛散元氣益漓致變若此倘再行疏泄肝風一動慢驚旋至不可救矣仿左歸飲合生脈散服之而瘥安波按勘此等證腹中無內經猶瞎子行路堂妹吐證堂妹年二旬因情懷憂鬱致患吐證每餐鬲間哽哽少頃即吐輕則只吐數口甚則所食之物傾囊而出溫中調氣清火解鬱治俱不應予用安胃制肝法亦不驗只得停藥越十餘年疾仍如故肌肉不瘦產育如常予見此證數人藥皆罔效然亦無損復有梅氏女一證案載輯錄卷中其候更加經期阻閉纏綿數年咸目為殆出室後得自愈可見情志之病藥餌難療至於病久而血氣無損者良由胃為多氣多血之經腑病較臟病輕耳若果臟真損傷焉能久延不壞乎安波按古人云師尼寡婦必須異治愚謂室女之治較師尼寡婦為尤甚蓋室女人道未周情竇早露以致窒塞之郁百變百幻結離後諸病霍然余亦有見之者馬陸氏女也年過久笄識書算談吐淵博知藥性貌亦加常人一等後得肝厥一症每月如死者一二次及合巹有時而適逢厥來從此好事多磨者有二次余至以疏肝息風為事然雖救目前之急奈終身痼產總少妙術忽忽三年婿突至完姻迄今沉疴若失而瓜瓞已三四矣方萃岩翁乃郎跌後又患腹痛藥傷胃氣治驗萃翁公郎葆晨兄稟質素弱曩患滑精予為治愈案載初集中斯病之始偶因登山跌僕傷足吾鄉專科接骨頗善但其藥狠弱者每不能勝葆兄緣傷重欲圖速效日服其藥已戕胃氣又患腹痛更服溫肝行氣活血等方胃氣益傷神疲倦臥痛嘔不止藥食不納邀予診視脈虛細澀氣怯言微面青自汗謂萃翁曰公郎病候乃藥戕胃氣恐蹈脫機人以胃氣為本安穀則昌治先救胃冀其嘔止谷安然後以大補氣血之劑繼之不徒愈病且足得血而能步矣但治嘔吐之藥最宜詳辨氣味不獨苦劣腥臊不能受即微郁微酸亦不能受惟人參力大氣味和平胃傷已極非此莫可扶持而單味獨用分兩需多購辦不易姑以高麗參代之日用數錢陳米水煎緩緩呷之守服數日嘔止食納神采略轉接服大補元煎漸可下床移步尚苦筋脈牽強行動艱難翁慮成跛予曰無憂血氣未復耳仍服前方半載後步履如常安波按味單則力峻古人所以獨參名湯也而其用專又翁自患陰疽復中寒陽脫救急治法壬午冬萃翁患外證甚重因往候之翁臥於床謂予曰背偶生毒已經旬矣知子不專瘍科故請潘日章兄看視潰膿無多並不痛楚惟形疲食少煩為診之切脈沉細而耎觀其毒形平塌乃告之曰此疽也其病在陰治須溫補內托由陰轉陽焮腫作痛毒化成膿庶幾無慮囑邀潘日章兄同議方訂十全大補湯加白芷穿山甲薄暮使來促云刻病甚劇祈速往入室見翁靠坐於地眾皆倉皇予驚問故乃弟子橋先生言家兄因起身更衣站立不住忽然跌僕遂作昏暈故此不能動移按脈遲細欲伏面青肢冷嘔惡頻頻予曰此中寒也病上加病切防脫變計惟參附湯以濟其急嘔多胃逆更以乾薑佐之古有霹靂散之名形其迅速也適日兄亦至意見相符於是用高麗參五錢附子乾薑各二錢五分令先扶掖上床藥熟傾服予與日兄同坐室中俟其消息時屆三鼓漸見嘔定肢溫神蘇脈出予喜曰可無憂矣令煎二渣與服次日復召謂日兄曰昨夕中寒急暴幸賴參附湯挽回今視其疽形仍平塌尚不知痛昨同議之方猶恐不濟商以大劑養榮湯加附子再診更增枸杞菟絲巴戟天及河車鹿茸血肉之屬日漸知痛腫起膿稠腐化新生治療月餘瘡口始斂次兒光墀單腹脹奇驗墀兒年逾弱冠向無疾病夏間偶患腹脹以為濕滯無關緊要雖服藥餌然飲食起居失於謹慎糾纏兩月腹形漸大肌瘦食減時作嘔吐自療不愈就同道曹肖岩余朗亭二公診治藥如和滲溫清消補遍嘗無驗其時尚能勉力出戶猶不介意予思既諸藥無功諺云不藥得中醫遂令停藥迨至冬初因事觸怒病益增劇食入旋嘔臥即氣衝二便欠利予憶經云肝主怒怒則氣上得無肝氣橫逆阻胃之降是以為嘔為脹與自擬越鞠逍遙及安胃制肝方法亦不應漸至腹大如鼓堅硬如石筋綻臍突骨立形羸行步氣促予技已窮復邀同道諸公視之皆稱證成中滿消補兩難有進專治鼓脹丸藥者言其音如響一下其腹即消予料彼藥乃巴黃霸劫之品今恙久胃虛如何能受即古治單脹有用雞矢醴一方顧斯畏食嘔吐氣味亦不相投晝夕躊躇無策可畫俄延至臘忽睹梅梢蕊放見景生情旋摘數十枝令以湯泡代茶日啜數次機關勘破觸類旁通家有藏釀用木瓜橘餅各三錢另以村醪煎熟與藏釀對衝晚飲兩杯以前腹脹否塞絕不響動如此啜飲三日腹中微鳴不時天氣堅硬稍軟迨至旬余脹勢減半二便覺爽食入不嘔夜能安臥匝月後腹脹全消當時脹甚腹如抱甕疑謂何物邪氣若此之盛及其脹消大便並無穢惡遺出可知即此身之元氣與此身為難首耳兒病愈後咸以為奇友人問予所用梅花治脹出於何書予曰運用之妙存乎一心此予之會心偶中無古可師大概梅佔先春花發最早其氣芳香故能舒肝醒脾橘皮調和諸氣肝以斂為瀉木瓜酸柔能於土中瀉木更藉酒力是以得效友人喟然曰子良工也公郎之疾固雖有術起之於後尚且無法療之於前此醫之難也然使此證患於不明醫理之家當其迫切之際未有不隨下藥而斃者此又醫之不可不知也予聆斯語不覺悚然安波按膨證一候世乏良方細繹此子得愈之由緣年正方剛血氣甚盛雖病久形衰而根蒂尚固更兼年輕無知鬱怒未深並非冤沉海底大怒不解日就憂抑者同日而語不然臘殘春回木升當陽其病日增之不暇豈藉梅花微末之材可能卻病乎余見是證不治者甚眾其年均在四五六左右三十以外尚未之聞也餘生也晚不然責之杏翁以為然乎否乎巴聲茂生布痘癍閉險逆一劑救轉巴生居近比鄰尊公秉昭翁早子俱殤於痘是春痘令盛行兒多夭折生年數齡尚未出痘翁以為憂一夕忽發熱嘔吐臥寐不安比曉迓予望其頰赤唇乾捫其身熱指冷煩渴舌黃細驗周身標點隱隱夾有紫癍顧謂翁曰此布痘癍閉險逆之證也服藥癍消痘透庶可無虞方定羌活散癍湯加石膏燈心午後復視云服頭渣藥後熱盛悶亂頭搖肢掣予曰此欲作驚令服復渣薄暮煩熱益甚昏譫渴飲舌吐唇外掉弄不休痘仍不透癍反增多其熱頗劇舉家倉皇旁議劑中石膏過涼冰伏為害予辭焉秉翁堅求拯治因在鄰居素契且此子又從次兒受業情難固卻復告之曰方書雖有痘初宜於升發忌用清涼恐其冰伏之說特此證乃心胃火毒壅遏致成癍閉不清其火癍何由消痘何由透前方清藥力輕故不勝任於是重用石膏為君佐以犀角酒炒黃連元參升麻連翹赤芍牛蒡紫草之屬燈心尖為引每服另沖無比散取其大熱利小便亦釜底抽薪之義方已寫就思舌為心苗今舌吐弄不休內服煎藥須外用紫雪塗之奈此物吾鄉甚罕乞諸其鄰所與些微亦不濟事翁云吾有紫雪藏之久矣取出稱有三錢快甚即令蜜調塗舌並速煎藥與服次早翁來云昨夕遵諭服藥塗舌至半夜熱緩癍收瀉止躁定似有轉機再煩一看果諸證悉平癍消痘透予曰生矣詢其紫雪只剩三分余皆塗去予笑謂翁曰此證雖仗藥力挽回然非如許紫雪亦無此速效今火勢既平藥當褪松酌以十神解毒湯仍稍用石膏犀角清其餘火轉用太乙保和湯人參易沙參加天蟲白芷貝母鮮鱗漿成之後補脾利水清涼解毒漸次收功此等險證幸在比鄰朝夕看視藥隨病轉得以保全使病家與醫居隔遠倉卒變幻硬鞭長莫及欲圖慶成不亦難乎安波按方議精妙入神讀者不可忽過答鮑北山翁詢伊郎飲澼證治始末並商善後之策飲證名載內經特經文專論運氣司天在泉勝復之義僅啟大端仲聖於金匱玉函中闡發病機詳辨治法條分縷析後世有所遵循可稱幸甚經云水火者陰陽之徵兆也水為陰火為陽足見飲為陰類致病之由必其人之元氣虧乏陰盛陽衰津液凝滯不能輸布留於胸中則清者悉變為濁矣使果真氣充足飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱何患之有經又云陽化氣陰成形夫氣即水也水即氣也氣可化水水可化氣今則陰翳瀰漫水精凝聚得無陽衰氣無以化之故乎人身之陽有三一曰膻中之陽如離照當空纖雲不掩膻中陽虛則濁陰上干竊踞陽位所謂濁氣在上則生䐜脹也一曰腎中之陽如釜底之火熟腐水穀腎中陽虛則釜底無火物終不熟所謂戊癸少化火之機命陽無蒸變之力也一曰膀胱之陽膀胱者州都之官津液藏焉氣化則能出膻中位於膈內膀胱位於腹內膀胱氣化則膻中之氣得以下行膀胱陽虛則氣不化失其通調水道之職矣童年既無色欲之戕又鮮情志之擾其膻中腎命膀胱之陽從何而虧飲病從何而起得無水果生冷所傷之咎與軒歧於病治之後尚以穀肉果菜食養盡之非謂水果不可食也惟食之有節無使過之過則傷矣童質稟薄素嗜水果胃陽受傷致成飲澼夫蔗性寒清胃詩稱大官還有蔗漿寒者此也舊夏日啖蔗漿致發宿疾胸膈支滿漉漉有聲憒然無奈嘔吐冷水成碗成盆投以苓桂術甘理中六君之屬通陽滌飲服至月餘始得獲效復訂溫健脾胃丸方並囑戒食生冷冀杜病根仲秋病復召診詢知丸藥未服復食梨菱此則自誤非醫咎也窺其病狀較前加甚不但嘔吐水冷並且脘中喉口俱冷如冰食姜不辣溲色如泔經云中氣不足溲便為變諸病水液澄澈清冷皆屬於寒初則胃陽之傷繼及膀胱腎命一寒至此誠為可畏姜椒桂附屢投不應思商硫黃丸大熱純陽差堪有濟此藥吾鄉苦無市處無已每日方內附子加至五錢連進十二劑才見春回暘谷細揣此病定有窠囊附於膈間如賊寇依山傍險結成巢穴出沒不常窠囊之說許叔微論之於前喻嘉言詳之於後師古而非杜撰前番勢輕病後只須治脾此番勢重病後務須治腎因仿腎氣丸方法令其上緊制服並囑水果不可沾唇即菜蔬性寒之品均不可食詎意旁人少所見多所怪因見方內附子分兩加重咻為有毒不可多服致令藥已奏功反生疑畏又將所立丸方付未達不敢嘗之例無如病雖暫愈其根猶在交春萌動一夕吐水半桶夫水之為物不盈科不行積之日久故復傾囊而出不明窠囊之因反詆溫藥之過嗟呼周禮冬至採毒藥以供醫事凡攻疾之藥俱是有毒不獨附子為然但有病病當彼性攻寒不逮何暇留連作毒如兵者毒物也然剿賊必須用之若無故用兵則受其毒矣倘用兵以剿賊剿賊以安民則不惟不見其毒而反受其益故第論用之當不當不必問其毒不毒苟用之不當即無毒亦轉為大毒用之得當即有毒亦化為無毒仲聖傷寒方中如四逆湯回陽救急生附俱用一枚今時種附力薄況經童便甘草制透其力更緩方將虛其無毒以攻疾何至慮其有毒以傷人乎試思一月之中附子服過斤許設不對證早已禍起蕭牆何以病後毫無喉痛口瘡之恙安得視為砒鴆執迷不悟耶果疑溫藥非是盍請他醫療之醫來案稱胃寒氣痛藥用吳萸丁香雜以枳樸蘆根石斛僕因素契不忍緘口復實告以證屬寒凝飲積且發經數次吐多胃傷豈特不可寒涼即枳樸消耗真氣亦屬不合此次病發得以勢輕未始非仗從前溫藥回陽之力觀其吐後即渴金匱飲證條中以渴者為欲解也愈期非遙不藥亦可但窠囊不除終為後患耳如言停藥數日即安諭商善後之策所云五氣朝元丹僕前原思及此惟是此番疾作寒象既已減輕溫藥亦應稍損純陽剛愎似可無需矧窠囊之疾非迅速可以蕩掃藥性過悍久防增氣且前僅用附子眾咸詆其有毒今若再進硫黃更駭聽聞莫若仍從外飲治脾內飲治腎不偏不倚中正和平禹之治水行所無事病去元氣不傷斯為盡善再按治飲用溫固屬無難要知其病雖由虛而成非同全實可以直行攻消然亦非同全虛可以專行溫補酌予溫藥中少加開導俾飲邪不至逗留合乎溫而和之之旨考諸金匱云心下有痰飲胸脅支滿目眩苓桂朮甘湯主之心下有支飲小半夏加茯苓湯主之原痰飲之作不外脾胃陽虛濁陰凝聚而施治之法亦不外燥土升陽驅導飲邪蓋胃寒則痰生胃暖則痰消脾濕則飲留脾燥則飲去二方雖治支飲然用之於諸飲亦無不行並考許叔微本事方專用蒼朮一味療痰飲之澼囊喻氏寓意草中有華太夫人餌術方法效驗彰彰聖域賢關心心相印外飲治脾當如是也金匱又云短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之蓋治飲雖以升陽燥土為第一義然從小便去之尤為先務苓桂術甘亦導水利小便之劑也設其人腎陽不充則難勝任故又主之以腎氣丸以桂附加入六味補腎藥中益火之原蒸暖中焦之陽使胃利於消而脾快於運則飲邪自無伏留之患矣況方內苓澤原有淡滲水邪之能亦本溫而和之之意較他溫補諸方相去徑庭奈世無好桂而種附力復淺薄雖以枸兔佐之猶恐不逮再假斑龍血肉純陽溫煦奇經以補玉堂關下之闕方內減丹皮者恐其清瀉相火故也內飲治腎不亦宜乎安波按可稱盡善盡美許玉書翁大郎腹痛吐瀉危證拯治之奇玉翁大郎童年曾患頭昏諸藥不愈予作肝風治疏歸芍地黃湯僉謂頭昏是有風寒童子不可輕服熟地翁排眾議依方多服而瘳次春又患腹痛嘔吐便瀉延診藥用溫中調氣兩服未愈家人著急令更他醫日請數人或以為蟲或以為血或以為火治總不驗淹纏旬余痛甚不止嘔瀉不停寢食俱廢復邀診視脈細面青呻吟疲憊予思病勢增劇玉翁固雖相信然旁議紛紛難與著手轉薦同道余朗亭先生診治初投五苓散續進真武湯亦俱不應玉翁堅囑想法予曰非不欲為借籌奈令郎病久胃氣必空輕劑諒不濟事若背城借一尊公愛孫如珍見方駭然焉肯與服翁沉吟云有一善策今早友人談及鄰村有扶鸞治病者家人慾往求方予呵止之祈擬一方予持語家人云是乩仙所開自必信服予曰策固善矣治法尚難令郎之病起初不過寒凝氣滯本無大害因求速效諸治龐雜痛久傷氣吐多傷胃瀉多傷脾故困頓若此倘仍見病療病必至土敗氣脫計惟扶陽益氣以拯其急愛議附子理中湯米水煎飲氣固胃安庶堪保守詰朝玉翁來舍喜云曩服他藥如水投石昨服尊方不但病減並可啜粥家人信為神丹相煩往視懇為加減予曰藥已對證勿輕易轍今日照方仍服一劑明日再為斟酌次早往診病勢大轉因其體素陰虛方內除去附子又服兩日更用參苓白朮散調理而痊是役也非玉翁平素信心兼施權變安能圖成志此以見醫家臨證不特病情之難窺而人情之難處尤甚也安波按人情難處近今為尤甚杏翁處嘉道盛世之際而不見光緒醫生之吃苦乎今日之醫必須一劑知二劑已之技否則另商他人矣可見人心不古愈流愈下又次郎脾腎陽虛伏寒凝冱重用溫補而瘳玉翁次郎形貌豐腴向無疾病丁亥季秋望後陡作寒熱延予次兒光墀診治藥投溫解其熱即退嗣後單寒不熱肢麻指涼口吐冷涎臍腹隱痛便溏畏食知系伏寒凝冱方換姜附六君附子初用八分增至一錢未見鬆動邀予商酌切脈遲細無力望色面白舌潤予曰此正仲聖所謂無熱惡寒發於陰也前方不謬尚恐病重藥輕附子加用二錢更加吳萸肉桂砂仁川椒次日復診病狀彷彿思火為土母陽虛生寒溫理脾陽不應非補火生土不可王冰所謂益火之原以消陰翳也仿生生子壯原湯加吳茱萸葫蘆巴肉果巴戟天附子增至三錢以為必效矣詰朝脈證依然玉翁問故予曰無他藥力未到耳蓋市中種附力薄況經制透其味更淡可增四錢再加鹿茸枸兔峻補真陽自可春回暘谷依法服之證仍如舊翁侄召成兄私詢予曰舍弟之病先生審屬陰寒第用如許熱藥毫不見功理殊不解且附子大毒今已服過數兩久而增加可無患否予曰其他勿論時下秋燥此等純陽之藥若不對證一匕亦不能堪況其多乎夫攻病之藥皆有毒無毒之品不能攻病凡傷寒中陰等證非附子不能驅陰回陽有病則病受之何有餘性遺留作毒即使有毒而生不勝於無毒而死乎仍守原方附子加至五錢維時旁議沸騰幸玉翁信而不疑予告之曰此證確屬沉寒痼冷然煎劑溫藥止矣再得硫黃丸佐之庶有裨益於是煎丸並進漸見好機熱藥稍減參入熟地河車杜仲予與墀兒日為診視兩閱月始得全愈共計服過附子一斤硫黃丸二兩乾薑六兩鹿茸一架黨參三斤高麗人參共十餘兩其他肉桂吳萸川椒等不可勝計予生平治陰證用溫藥未有若斯之多而效驗亦無如此之遲也安波按病家相信醫家放膽所以為醫一道非易事也鮑宅京翁僕人中寒暴脫救轉之奇宅翁令政質虧恙久是歲季春病劇延診投以大補之劑諸證漸減六月初旬病人夜臥受涼微覺怯寒體痛其時宅翁往淮公郎輝遠兄遣僕相招予至視畢謂曰此新感陰暑但病軀不勝表散暫進參附湯得以邪從汗解仍服本藥比用人參二錢附子錢半各煎和就正待與服恰病人睡去少頃輝兄出告曰家母方才睡醒身已有汗體痛亦鬆不甚怯寒日內天暑附子過溫或可不用即服本藥何如予曰質虛偶感邪原無多標證既除自應治本仍將舊方加減配藥其所和之參附湯留貯盞內置方几上時值正午輝兄留餐甫將舉箸忽僕人之婦張皇奔入泣云伊夫病在重危叩求拯救予曰爾夫早間迓我隨同歸來並未見有病狀婦云陡然暈倒不知所由輝兄本家莆田翁偕往果見神昏汗冷肢厥脈伏初為躊躇繼而猛省笑顧莆翁曰證固危殆然有一大奇事可望生機翁驚問故予曰此證乃卒中陰寒陽欲暴脫而救脫必須人參伊等焉能得此況安危呼吸急不可待頃輝兄乃堂所煎之參附湯未服人參雖貴重之物但和有附子在內他人無此病斷難服此藥不意盛紀突遘斯疾適與此藥吻合豈非天造地設乎令婦跟至輝兄宅中予道其詳眾咸稱異當將几上參附藥盞付之持去諭其稍溫與服再看動靜下午其婦來云服藥逾時汗斂肢溫人事漸蘇復診脈出神清惟倦怠耳方疏參耆建中湯仍加附子囑向伊主人處乞高麗參四錢分兩劑服更見起色續增枸杞山萸當歸杜仲服之而瘳觀此可見人之死生有數而一飲一啄莫非前定矣安波按證似中暑以參附回陽非大識見不可許絅之兄齒痛絅兄質虧多病予為調治所用藥劑不外歸脾湯補元煎之屬一日遣使相促至時將薄暮絅兄蜷臥榻上起告予曰早晨齒牙忽痛甚不可耐予至今不止恐挾風熱外因故停前藥相煩診視暫解標邪切脈沉細無力見證形寒足冷謂曰此屬虛寒非關外感不徒用補更須從溫爰仿古方八味地黃湯加骨碎補一服痛已鮑智原翁令孫痘後鬼腫潰久藥投溫補而愈智翁令孫三歲痘後左手曲池穴側鬼腫潰經年餘外科療治不能收口逆予商之維時伊兄朗玉翁及同事葉殿揚兄在座二公俱知醫理予視畢告曰毒生手足固不害命然潰久膿水流多氣血受傷面黃肌瘦神形疲倦目無精采天柱骨垂一派大虛之象最為可慮潰口收否無暇計也朗翁云證既屬虛虛則當補予曰不但用補且須用溫智翁云時下炎暑如蒸過溫恐其難受予曰醫家治病盛夏遇寒證用熱藥隆冬遇熱證用涼藥所謂舍時從證也病若虛而不寒單補亦可見功今虛而兼寒非溫補莫能奏效爰定人參養營湯加附子鹿茸枸杞杜仲合乎內經形不足者溫之以氣精不足者補之以味之義二公見方稱善初服精神略轉再服頸骨不傾守服數十劑氣血恢復潰口亦斂此證獲痊雖予之執理不阿亦賴二公贊襄之力也吳尚時兄春溫兩感危證治愈附載鄭晉康兄令弟病同致殂之故並誨門人尚兄體素清癯夏月病溫延診金邁倫翁偕往據述昨午先寒後熱頭痛汗出熱灼不退口渴心煩夜不安臥形倦莫支就榻診之脈虛浮大而數視舌無胎撫如干版予為之駭曰此證乃春溫兩感至危至急仲聖云發熱而渴不惡寒者為溫病發汗已身灼熱者名曰風溫內經云冬傷於寒春必病溫冬不藏精春必病溫既傷於寒又不藏精同時病發謂之兩感凡傷寒瘟疫熱盛舌乾亦須至一候之外始見今病才一日舌即乾涸足徵腎水素虧冬傷於寒邪伏少陰暗吸腎真劫其家寶故一見發熱津液無以上供舌即干矣熱論篇云傷寒一日巨陽與少陰俱病則頭痛口乾而煩滿斷為兩感不可救藥比類而推殊難著手爰用熟地一兩當歸三錢料豆五錢玉竹五錢甘草一錢疏方訖告邁翁曰予生平治少陰先潰於里太陽復感於表傷寒春溫兩感危殆之候初起悉宗景岳新方理陰托邪往往獲效無如此證津液既涸再投姜附則陰立亡故但師其意以廣期前輩風溫湯佐之雖一時之權宜亦經營之慘淡耳邁翁曰善遂服其藥熱減神安舌稍轉潤再加沙參麥冬女貞石斛更進復脈左歸漸次而愈安波按形倦句不妥蓋外感一病人人皆倦鄭晉康兄僑居潛口設帳汪宅予因其居停延診晤間云舍弟抱恙便托一看予問恙經幾日矣曰昨日起病發熱至今未退予曰此感證也汪宅去伊家不數武即與偕行途次談及時下患感證者頗多須驗其舌若初起舌苔膩厚則受邪深重纏綿難愈既至其室病者出房就診令其伸舌乾涸無苔形如鏡面予曰殆矣晉兄驚問所以予曰適言感證輕重須驗舌苔厚薄不意令弟舌毫無苔光明如鏡初病見之甚非佳兆晉兄云子言感證苔薄病輕今舌無苔反以為殆此曷故耶因將曩視吳尚時兄病情向說即照所用治法疏方付之並告之曰服藥應效則吉否則難救渠以予言為過另更他醫日甚一日挨至六朝勢已沉篤予言果驗欲復相招恐予不至乃札托家芃生兄勸駕予曰非不肯往奈彼病本重即服予藥亦難必效況復稽遲內經論兩感之危在於六日今已屆期盧扁再世亦無能為芃兄曰固難如此但渠昆仲與吾交契今急而相求且屈一行以全吾之友誼耳勉為呼輿將及門其疾已革安波按兩證舌俱無苔外感固屬陰候但亦須問其平日舌苔無苔否倘若體質如是不在此例也門人問曰叔和序例云寒毒藏於肌膚思肌膚淺近豈容邪棲數月而病始發與答曰喻氏云寒邪由肌膚而入辛苦之人邪藏肌膚則有之苦膏粱之輩冬不藏精者其寒邪且有藏於骨髓者矣程扶生云藏於肌膚當云藏於骨髓周禹載云逆冬氣則少陰不藏不藏寒邪得而入之傷於肌膚伏於骨髓合三條而觀之謂傷於肌膚則可謂藏於肌膚則不可又問曰序例又云至春變為溫病喻氏謂變字下得怪誕駭人周禹載言變字大妙未審孰是答曰內經論伏氣為病如冬傷於寒春必病溫春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽等條未言變也又如夏暑汗不出者秋成風瘧亦未言變也其有稱變者如高粱之變足生大疔逆春氣則少陽不生肝氣內變逆之則傷肝夏為寒變等條乃謂病之由此變彼如實證變虛熱證變寒之類始可言變若春溫則本冬傷於寒至春病作流異源同似未可言變也經又云秋陽傷於濕上逆而咳發為痿厥曷不一宗經旨曰至春發為溫病豈不韙乎又問曰經云冬不藏精春必病溫然則室女童男曠夫嫠婦皆無溫病乎答曰經語渾融在人之意會耳蓋冬不藏精一語亦指天時非專指人事也試觀天明則日月不明之句義可見矣夫一日之中早明而夜晦者即藏精也一歲之中春生而冬藏者亦藏精也使入夜不晦入冬不藏人物能無夭札疵癘乎軒岐於此分定兩例曰冬傷於寒春必病溫冬不藏精春必病溫但寒乃冬令之正氣人知畏避受病尚少冬陽開泄天暖而雷乃為淫氣受病殊多此雖予之臆說然揆其理似當不謬又問曰劉松峰謂內經冬傷於寒春必病溫雲笈七籤改作冬傷於汗蓋言冬時過暖以致汗出來春必病溫冬日嚴寒來春並無瘟疫以其應寒而寒得時令之正故耳以汗易寒可乎答曰此創論也似亦近理但內經格言豈容率改耶家芃生兄怔忡治法芃兄恙抱怔忡久而不愈每發心旌搖搖頭暈神倦輾轉不安予診之曰此煩勞郁傷心脾肝三經病也方定黑歸脾湯去木香加白芍柴胡合逍遙散間參以麥冬五味柏子仁丹參牡蠣之屬疾發雖輕然猶未斷芃兄憂之予曰神者伸也人之神好伸而惡郁鬱則傷神孔聖二論首揭說樂佛家般若經首稱自在莊生著南華首標逍遙遊情志中病未可全憑藥力務須屏煩頤養方能除根如言閒散半載服煎藥兩百劑至今疾不復發安波按鬱則傷神一句妙極蓋心有悒鬱則事事肘掣雖有樂境當前變為畏途汪靖臣兄乃郎冒暑瀉甚欲脫亟挽元氣一法靖兄乃郎年甫四齡稟質向虧夏冒暑邪發熱便瀉幼科僉用清散消導之品服至匝旬熱瀉如故形疲氣餒食入作嘔醫稱邪滯未淨仍用前藥乃至食粥瀉粥飲藥瀉藥更醫以為脾虛投六君子湯不應始來逆予兒臥几上闔目無神脈細如絲予曰胃氣告竭慢驚欲來不可為矣靖兄曰固知病久屬虛然昨服六君補藥亦無靈效何也予曰病有倒懸之危一縷千鈞焉能有濟考古人制六君子湯原為平時調養脾胃而設非為救急拯危而設也且閱方內並無人參僅用錢許黨參數分白朮而市中種術味苦性烈與蒼朮等不能補脾而反燥脾復有二陳消之茯苓利之欲求撥亂反正之功真蚍蜉之撼大樹矣靖兄曰然則治當如何予曰非真人參不可蓋參者參也與元氣為參贊也魚一刻無水即死人一刻無氣即亡兒質本薄瀉久氣傷加以醫藥重戕胃氣經云食入則胃實而腸虛食下則腸實而胃虛今腸胃通為一家幽門闌門洞開不固飲食入胃不使少留即從腸出倉廩之官廢弛厥職此誠危急存亡之秋惟仗參力急固其氣氣不奪則命不傾然須獨用始克見功古有獨參湯可法也靖兄聞言大悅即懇立方專用人參二錢令分兩次米水煎服熱退瀉稀次日照方再進便瀉全止啜粥不嘔更制八仙糕與服而痊又幼女外感咳嗽誤藥釀成肺痹急證歙俗信神無知之徒將神廟籤詩混編藥名鄉愚患病輒往求之呼為神藥貽害甚多靖兄外貿幼女在襁褓中時值冬寒感冒外邪發熱咳嗽其妻誤聽人言往求神簽藥用貝母三錢女流不諳藥性即市煎灌咳嗽頓止以為神驗少頃忽痰湧氣促頭仰胸高徹夜攪擾次早迓予視其兒身熱肢冷口張鼻扇啼聲如鴉乃姑告其所以予曰此肺痹大證危期甚速夫肺主皮毛皮毛受邪肺氣閉塞因而發熱咳嗽不為疏解反投寒斂之品且單味重用為害更烈經云風寒客於人使人毫毛畢直皮膚閉而為熱病入舍於肺名曰肺痹孩提弱質焉能堪乎辭不舉方友人譚萃升翁代懇試施一匕以圖僥倖予思病既瀕危藥非精銳料難應效方用麻黃桂枝杏仁桔梗橘紅半夏薑汁並囑服藥豎抱旋走勿令臥倒如此一晝夜始得咳嗽出聲痰喘略定知其痹象稍寬但病勢過重藥雖見效未便驟松麻黃昨用三分令其減半余照原制再進一劑汗出膚潤熱退喘平更用六安煎加桔梗臥穩嗽稀予曰痹開病去大局無虞古云小兒勿多服藥蓋兒質薄弱臟腑嬌嫩藥多恐傷真氣今可停藥乳哺調之自然恢復果如予言識此為鄉愚信求神藥者戒安波按神藥胎害不可勝道余見病傷寒服簽內人乳斃者兩人可不戒哉黃曙堂翁乃郎頭痛忽變痙厥續見數證皆不治頭痛久而不愈名曰頭風頭風多害眼方書固已言之矣尚有一種突變神迷肢掣不可救治之證前賢未經道及曾見曙翁乃郎年約十歲頭痛時發予因他事過其家見兒號泣詢之翁告之故出方藥皆辛散之屬予曰此由先天不足木失水涵風陽上冒辛散不宜翁求方疏歸芍地黃湯付之翁惑旁言遂置不服仍請原醫看視以為前藥尚輕更增細辛藁本一夕痛劇而厥手足瘛瘲急來延予予曰肝風動矣不可為也翁懇拯援勉用熟地黨參麥冬阿膠炙甘草麻仁棗肉茯神白芍合復脈湯參入牡蠣龜板方諸水介潛之法不驗辭之更醫無功遷延數日而歿續見仇姓稚子及方氏女證同皆不治推詳病機證屬頭痛巔疾下虛上實治當上病下取醫昧病原恣行辛散以致變幻其理顯然凡諸痛厥可治者尚多惟此證一經神迷即莫能救此其故豈所謂甚則入腎內奪而厥則為喑痱者與初集載有鄭氏婦一證予雖為治愈然亦幸也安波按肝風肝厥發逆以後此風盛行大抵感乎日久人情矯柔造作的致何則當發逆熾張時人且謀食療生之不暇豈有怒髮衝冠之患乎家秀翹兄肝鬱痛傷胃氣詳論病機治法秀兄年逾五旬向在維揚貿易患病數月延醫多人愈療愈劇因買舟載歸望其形容枯槁行動艱難診脈弦勁欠柔詢其病原據述舊冬少腹癰起漸次痛連中脘時作嘔惡彼時納穀雖減尚餐爛飯一盂交春病勢日增即啜稀糜亦吐形羸肉脫便秘皮枯藥餌遍嘗毫無一效邇來更加惡聞藥氣入口即吐君將何以教之予曰醫之審病如吏之審案審案必得其情審病須明其理推詳脈證其病機已瞭然心目矣按弦為肝脈諸痛屬肝厥陰之脈循少腹究緣平日情懷不適木鬱失條少腹因而致痛然肝為將軍之官臟剛性急醫投辛香溫燥希圖止痛肝陰被劫怒木益橫沖胃為嘔此肝為受病之原胃為傳病之所醫多藥雜胃氣益傷夫胃為水穀之海氣血俱多之經既不安穀氣血從何生化膚無血潤則枯槁腸無血潤則乾燥陽氣結於上陰液衰於下欲走噎途豈區區草木所能回枯轉澤耶經云諸澀枯涸幹勁皴揭皆屬於燥燥者濡之治法固無難也無如濡潤之品恆多凝滯現今胃氣空虛嘔吐惡聞藥氣焉能強進考古人治血氣兩傷之候先當益氣氣為血之帥也但益氣藥品殊多首推人參者以其能回元氣於無何有之鄉也再考東垣云胃中虛熱穀氣久虛而為嘔吐者但得五穀之陰以和之則嘔吐自止不必用藥謹擇參米飲一方氣味沖和諒當合轍於是每日用人參二錢陳米水煎果受不吐服至匝旬餐加色轉再合參乳湯守服兩月便濡膚澤而起如此大證只此二方並未別參他味藥簡功專信矣安波按病久屬虛故人參能受不然肝無補法之旨竟置於無矣別駕菽田何公僕婦子癇吾郡別駕何公續遷甘肅眷屬仍居郡城宅中一僕婦重身九月偶患頭痛醫作外感治其痛益甚嘔吐汗淋至二鼓時忽神迷肢掣目吊口噤乍作乍止何公少君六吉兄當晚遣力相召曉造其宅六兄告以病危之故入視搐搦形狀診脈虛弦勁急謂曰此子癇證也勢雖危險幸在初起當不殞命六兄曰昨夕倉皇恐駕到遲故近邀女科一看亦言證屬子癇然服藥不效奈何出方閱之羚羊角散也予曰此乃古方原屬不謬不知子癇疾作之由因子在母腹陰虛火熾經脈空疏精不養神柔不養筋而如厥如癇神魂失守手足抽掣其病初頭痛者即內風欲動之徵也醫家誤作外風浪投疏散致變若此至羚羊角散方內惟羚角入肝舒筋當歸棗仁補肝益血茯神安神甘草緩急與證相符其餘防獨木香杏仁俱耗真氣苡仁下胎多不合宜豈可以為古人成方漫不加察耶於是仍以本方除去防獨等味參入熟地沙參麥冬阿膠芝麻養陰濡液少佐鉤藤桑寄生平肝熄風頭煎服後其搐漸平隨服二煎搐定頭痛亦減六兄喜甚予曰病來勢暴今雖暫熄猶恐復萌囑再市藥一劑盡今晚服盡搐不再作方許無虞次日復診痛搐俱止神清脈靜納食不嘔方除鉤藤寄生加白芍玉竹女貞石斛逾月分娩母子俱得無恙安波按論證一端總在靈機活潑隨症變化不可效尾生之見至死不悟也鮑覺生宮詹病發三次不能復起宮詹前於乾隆丁未冬自毗陵抱疾歸證類噎隔已瀕於危予為治之而愈嘉慶乙丑宮詹視學中州病發召診又為治愈案載初集及輯錄中道光乙酉秋宮詹在都前疾又作初時尚輕來書語狀予輒憂之慮其年逾花甲血氣既衰非前此少壯可比末又云幸得請假南歸便圖就診深為之喜及至臘底伊宅報中詳述病情較前兩次發時更劇體憊不支勢甚危篤令侄子碩兄亟欲邀予入都診治予雖老邁誼不容辭適迫歲暮冰雪嚴凝水陸舟車都難進發道阻且長恐其病不及待子碩兄躊躇無策再四相商只得酌擬一方專足送去冀幸得效如前即可回籍調治另函致意勸令速歸回書云手翰再頒感淪肌髓妙劑服之不似昔年之應手蓋衰憊日久之故欲歸不得進退維谷負我良友何以為人弟之心緒不可名狀永別之戚慘劇難言然奄忽而徂勝於凝狂而活也專勒敬謝不能多寫亦不知結草何時南望故鄉惟有悵結未幾遂卒悲夫宮詹自訂年譜未竟令弟時任乾州續成之譜末有云兄病中嘗語人曰吾生平患此疾及今而三矣丁未乙丑皆瀕於危皆賴程杏軒治之而愈今無杏軒吾病殆不可為矣予閱及此不禁泫然安波按臌隔等症較癱癆尤險大約倉扁復生亦無如之何矣黃就唐表兄脘痛嘔吐危證治驗就兄體素虛寒向患腹痛服溫藥相安年來痛移上脘氣逆嘔吐飲食漸減丁亥之秋病發益劇食全不納自服理中六君之屬溫理脾陽未應形羸氣怯臥床不起遣價逆予診脈胃少弦多望色青白不澤自以為殆予曰無妨治未中肯耳尊體平素虛寒原宜溫理據茲脈證由於心境欠舒木鬱不達厥陰乾犯陽明肝氣逆橫胃降失職仲聖云厥陰為病氣上衝心心中熱疼飢不欲食夫肝為將軍之官臟剛性急脾胃雖俱屬土然須分別治之不容籠統而論葉香岩謂胃司受納脾主運化脾宜升則健胃宜降則和太陰濕土得陽始運陽明燥土得陰自安數語實發前人之所未發觀其食入即嘔足見其病在胃而不在脾理中六君皆是脾藥不能治胃今胃空若谷必須參力扶持始克有濟寒士購參不易姑思其次以高麗參代之乃於六君子湯中除術甘之守加入川椒烏梅乾薑木瓜白芍另用陳倉米水煎服藥則辛酸並投法合制肝安胃予辭歸越日就兄專札來云妙方連服兩劑痛緩嘔止稍能安穀頗見效靈深為感佩尚祈加減照原法略為出入守服而痊次春相唔郡城饒君揚翁宅中丰采倍勝於前安波按此亦病久胃虛故麗參能受然必須參入梅椒瓜等仿安胃腕以辛散酸收甘緩三法並濟也燕云亭司馬伏暑感證戊子夏徵郡蛟水暴漲橫流泛濫田廬人畜到處被湮歙休尤甚公奉委往勘暑濕煩蒸感伏膜原交秋疾作始而寒熱似瘧繼則單熱不寒吾宗思敏翁為治兩旬大熱已退日晡微潮擬屬邪去正虧轉為養陰和胃越日寒熱又作以為感復輔正驅邪病狀如故神形益疲度其恙久陰陽兩虛連投補劑寒熱總不能止囑邀予商予進署時公寒熱正發臥榻呻吟診畢思翁適至謂予曰燕公祖之恙吾看多次愈而反復煩子酌之予曰頃診脈象數猶帶弦熱時口猶作渴是屬秋時晚發感證似瘧之候大局無妨但恙久正氣固虛餘波似仍未淨過補恐其膩邪過清慮其傷正酌以輔正劑中微寓和解之意邪退而正不傷斯為美也思翁稱善遂令疏方藥用首烏人參當歸茯苓甘草料豆衣扁豆殼陳皮半夏糯稻根鬚引加鮮姜紅棗另以井河水各半煎露一宿明早溫服後旦再議屆期復召詢其家人云昨服藥後寒熱未來夜眠安穩入室公起坐就診笑曰瘧魔已被君驅去矣復與思翁斟酌加減不旬日而痊公善畫山水有倪迂風惜墨如金求之不得病痊後親繪一箑贈予並序其事饒君揚翁公郎風溫證治原委道光戊子冬郡城饒君揚翁公郎厚卿兄病初起寒熱頭痛咳嗽服辛散藥一劑次日單熱不寒口渴煩躁嗽痰帶血下午突作昏暈當晚折簡逆予黎明至郡見其面目俱赤舌黃耳聾嗆咳脅痛汗出而熱不衰診脈洪大數疾謂君翁曰公郎之恙乃風溫犯肺邪在上焦速為清解免致蔓延中下辛散之品不宜用也方用料豆甘草桑葉蔞皮杏仁桔梗牛蒡子貝母梨皮之屬詰朝復召問知夜來熱甚煩譫咳血甚多望其面目仍赤診畢昏暈又作額汗淋漓翁甚彷徨適黃就唐表兄至予告之曰此證確屬風溫為病但質虧病重慮難支撐昨方力薄故不應效就兄曰鄙見亦然不識當如何用藥予曰噫難言考風溫名載仲景傷寒論中但只言脈證及誤治之變並未出方叔和以下亦皆無治法惟朱奉議創立六方可謂登壇樹幟然既言不可發汗何葳蕤湯中又用麻黃羌活等藥耶宋元迄今名賢代出所論風溫證治未有一言折衷可為法守者惟近時休邑汪廣朝先生所立風溫湯一方只葳蕤料豆甘草三味藥簡功專頗有深意予治此證每宗此方範圍而擴充之往往獲驗就兄以為然於是照方加入沙參生地丹皮地骨皮知母貝母黃芩引用蘆根梨汁白蜜服之大效診視數次熱勢漸退苦寒漸減轉手養陰潤肺調理兩月幸得保全是役也使非君翁信而不疑就兄推誠贊助未見其有成功也予常語人曰凡起一大證務須病家能篤信醫者有主持旁人不妄議三者失一不可為矣饒厚卿兄幼女因熱生風之證治愈並明其理厚兄病愈其女三歲發熱目赤醫謂證屬因風生熱投以羌活荊防目腫如李眵流如膿熱甚搐搦尊公君揚翁囑予治之予曰此因熱生風證也非清不可方用生地丹皮山梔生甘草菊花桑葉石決明羚羊角服之熱退搐定目腫亦消君翁疑而問曰小孫女之病醫云因風生熱子云因熱生風同一風耳風則當散何服散劑而病反增服清劑而病旋愈此曷故也予曰風熱二字不可概言須知內外標本之別因風生熱者乃外入之風風勝則熱遏散其風而熱自解所謂火鬱發之此風為本熱為標也因熱生風者乃內出之風熱勝則風旋清其熱而風自熄所謂熱者寒之此熱為本風為標也醫家因風熱二字義未解明模稜施治是以多誤翁喟然曰醫患不明理理明則治病視諸掌矣安波按卓論也又僕人肝風用藥大意君翁盛紀年將二旬暮春之初始覺頭筋抽痛旋見口眼歪斜肢涼脈細以為風寒外感藥投溫散其病益劇肢掣頭昏心悸汗漿君翁令舁至舍囑為診治按諸風眩掉皆屬於肝春深時強木長水不涵木陽化內風乘虛繞絡凡治風須分內外外入之風則可散內出之風散之益助其升騰鼓動之勢現在左肢瘛瘲防變痙厥神迷議以滋水涵木和陽熄風方用炙甘草黑參熟地麥冬阿膠芝麻茯神棗仁五味子牡蠣小麥南棗初服四劑勢已減輕更加白芍當歸葳蕤服至廿劑病瘥虛猶未復令制丸藥數閱月始得元復如初許兌岩兄尊堂久痢治驗兌兄尊堂年將及耋本質陰虛時常頭昏口乾耳鳴心悸藥服滋補相安秋初患痢後成休息延至次春晝夜或十餘行七八行之不等每便腹痛後重糞帶鮮紅間見白垢形疲食少醫治無效召診脈如平時予曰體素陰虧原宜滋養但痢久脾虛腸滑滋藥又非所宜方仿異功散加首烏白芍山藥扁豆蓮肉老米劑內俱用人參數服痢仍不止復診告兌兄曰令堂證屬休息痢疾病根在大腸曲折之處諸藥力不能到即復人參亦皆無益兌兄云然則奈何予曰非鴉膽子莫能奏效特此物本草未收他書亦鮮論及惟幼幼集成載其功能名為至聖丹予用治此證頗多獲驗檢書與閱兌兄云據書所言並先生經驗自必不謬第恐此藥性猛家慈年邁難勝耳予曰所慮固是但每用只三十粒去殼取仁不過二三分且有桂圓肉包裹兼服補劑扶持正氣斷乎無傷蓋非此莫達病所病不能除正反傷矣如法制服三日全瘳是秋其疾復作家菡洲兄為治多日未瘥復邀同議予曰上春曾投鴉膽子見功何不再用兌兄仍以高年質虛為憂予曰有病當之不害亦三服而愈兌兄慮疾復萌商用此味研入調養丸藥內冀刈病根予曰善後之圖固妙然研末入丸似不合法更與菡兄斟酌仍照原制每以五粒與丸藥和吞服之兩月至今三年其病不發可見此藥之功效如神安波按久年腸紅亦效可見醫貴圓通也許月鄰翁令愛齒衄月翁令愛患齒衄藥服生地丹皮赤芍連翹石膏升麻之屬衄反甚予於方內除升麻加犀角一服即止翁問曰古人治血證用犀角地黃湯云無犀角代以升麻蓋升麻能引諸藥入陽明也今服之不效豈古方不足信與予曰朱二允有言升麻性升犀角性降用犀角止血乃借其下降之氣清心肝之火使血下行歸經耳倘誤用升麻血隨氣升不愈湧出不止乎古方未可盡泥也翁又問入陽明清胃熱藥品尚多惟犀角與齒衄相宜者得無齒屬上部角長於頭本乎天者親上之義耶予曰不寧惟是人之上齒屬足陽明禮云戴角者無上齒陽明之血脈上貫於角齒衄用之輒應者職是故也安波按醫工古方而不知更變猶一匠人拆舊料起翻房地基雖合而關筍鉤角總須刀鋸也族弟羲採血湧欲脫予僑居岩鎮距祖居之東溪幾五十里丁亥春族弟羲採證患吐血近延予弟春圃門生詠堂酌治血湧不止勢欲暈脫專價星夜逆予至見病者仰靠於床氣息奄奄自云臍下熱氣上衝血即湧出切脈虛大不斂顧謂弟與生曰此水火失濟之候也經雲水為陰火為陽夫人身之陰陽相抱而不脫是以百年有常故陽欲上脫陰下吸之不能脫也今陽但上越陰不下吸恐蹈危機所服皆滋納之品藥病相當其所以不驗者病重藥輕故耳方定大劑兩儀煎合生脈散更加龜板懷牛膝白芍茯苓山藥童便阿膠之屬服後血雖不湧脈猶未斂予曰慎之防復吐上午因親屬問病應答煩勞血又上湧神思飄蕩幾欲脫去忙照原方熟地由一兩增至二兩再加磁石吸引腎氣歸原另煮團魚湯煎藥蓋治真陽之飛越不以黿鱉之類引之下伏不能也如言飲藥血旋止日晡又因家人嘈雜血復溢出雖不若前之甚亦覺難支思血屬陰喜靜動則陽化故越出上竅令其閉戶屏煩如此兩晝夜始得脈斂神安血止不吐仍守前法調治月餘而瘳安波按方論並妙何少君令政傳屍蟲異附載歷見諸證並詳治法何別駕少君六吉兄召視令政病診之曰此瘵證也危期甚速可勿藥憶別駕公如君前亦患此疾而歿因謂六兄曰令政病狀顯屬傳屍此證五內有蟲人將歿蟲先出迭相傳染為害最烈慎防之六兄曰吾亦疑及此據內子云家庶母病篤時伊坐榻旁見帳中一物飛出攢入伊鼻自此得病予曰是矣六兄求杜患之策令研獺肝末每人日服錢許思蟲由鼻入當以法御之囑捻紙球外裹雄黃入病人房以此塞鼻倘見蟲出即鉗置火中煉之一夕六兄入房突有物飛集於頭似覺蜿蜒多足驚撥墮地而沒秉燭四照瞥見其物潛伏几下蠢蠢然急呼家人持鉗夾住視形如蝶翅翼生毛毛色雜花投諸火唧唧如鼠聲六兄有妹時又病劇越日令政逝有鄰媼來慰順至伊妹房中問疾歸家脫衣陡見一蟲綴其裙媼亦如法煉斃伊妹殂後患遂絕曩見方理豐翁宅中始而妻死於是繼而媳死於是後弟媳又死於是一歲之中同病而死者三人次春皆續絃未幾長子死焉翁娶繼室質偉體堅自以為無患不數月而病矣其前妻之女年已及笄侍繼母湯藥忽見病人鼻內有物蠕蠕而出心異之其物飛撲女面倏不見繼室殂女疾作未百日亦殞一歲之中又同病而死者三人傳屍之禍可勝言哉又許玉生翁有女四人先是二三兩女俱患此證相繼而夭居無何四女又病予謂之曰此證有蟲傳染三傳乃靈符藥莫制宜設法以杜後患翁因將長女遠送戚家病女移於後院家人日服獺肝女歿患幸泯但三病臨危俱未睹有蟲出或能變化而人莫之見歟愚按傳屍乃虛勞中另自一種虛勞無蟲傳屍有蟲虛勞不傳染傳屍傳染但此病與虛勞形狀彷彿卒難認識而治之之法諸說不同務將證治辨明則臨病庶有主持亦醫家之不可不講也請先以證言之稽求古訓如蘇遊之說道藏之言不為不詳然後人謂其類於不經流於妄誕似難取信夫傳屍之異在於蟲但其蟲須俟人之疾篤而後見不比別病之蟲可先從吐從便而見也紫庭方用乳香薰病人手背有毛出者為傳屍法雖未試然恐不驗又燒安息香菸令病人吸之嗽不止者為傳屍不嗽者非也此說亦不足憑凡虛勞多嗽嗽最畏煙斷無吸之不嗽之理惟喻氏謂狐惑聲啞嗄勞瘵亦聲啞嗄是則聲啞者氣管為蟲所蝕明矣斯言可為此證之一驗愚於此更有一得焉如一家之中先有患虛勞而歿未幾又一人所患證同不問前病之見蟲有無後病之聲啞與否即可斷為傳屍蓋尋常虛勞不傳染也至於治法肘後有獺肝散治冷勞鬼疰一門相染青囊有取蟲用啄木鳥法喻氏又謂虛勞熱久蒸其所瘀之血化而為蟲遂成傳屍瘵證獺肝散非不可以殺蟲而未可以行血去瘀仲景所製大黃䘌蟲丸及授陳大夫之百勞丸驅舊生新誠有一無二之聖法愚考二方金匱原文只言治五勞七傷內有乾血並未云治傳屍喻氏從金匱敘虛勞於血痹之下悟入以為血痹則瘀瘀則生蟲非具過人之識不能若是然則䘌蟲丸百勞丸可滌蟲之原獺肝散青囊藥可除蟲之害證有辨之之法蟲有治之之方傳屍之候或有可生然須及早圖之若待其勢已成噬臍何及安波按喻氏瘀化為蟲實闡前人之秘汪紹由翁尊堂脫證救蘇戊子之春予由旌邑至孫村汪生德輝家伊族紹由翁尊堂病劇延診比至已治木矣入見病者色白如鹽切脈弦勁少胃予曰此脫證也何以至此翁述病原云家慈年近古稀體虛多憂向患氣痛服辛香之品稍快舊夏病目眼科療治其目已盲今春又因痰嗽藥如二陳枳桔杏仁蘇子服經多日前夕忽心慌暈汗至今不止畏食懶言出所服諸方予閱之曰病傷猶可治藥傷最難醫今脫機甚速駟馬追之尚恐不及奈何翁懇舉方商以兩儀煎合生脈散每劑擬用人參三錢熟地八錢翁云家慈因患氣痛補劑向不取嘗分兩過重慮其不受請小試之如何予曰亦可但大廈搖搖一木恐難支耳姑用人參一錢熟地三錢麥冬一錢五分五味子五分予下榻汪生宅中次早翁郎岷山兄來云家祖母昨夕服妙藥後安睡片時汗斂暈定略啜稀粥稍能言語幸已獲效乞求復診予曰子歸先煎人參二錢熟地五錢備用往察脈證頗有起色仍守原方續仿千金復脈湯以救陰液再加茯神歸芍牡蠣女貞石斛柔肝養胃漸次而瘥汪商彝翁夫人風寒襲絡之證商翁夫人本質虛寒常多疾病舊春曾為診治藥投溫補有效今春因乃郎心疾晝夜看守辛勞風寒之邪乘虛襲絡比時不覺漸致頸脊痠痛喜暖畏寒欲人揉打糾纏兩月醫用羌獨防風以驅風香砂陳皮以理氣屢服不應季夏予至孫村延診謂曰此風寒襲絡之證也夫初痛在經久痛在絡經主氣絡主血考督脈並於脊裡至風府入屬於腦素問云痛者寒氣多也寒則泣而不流溫則消而去之大法治風先治血血行風自滅理當養血為君佐以溫通脈絡非驅風理氣所能治也方定當歸枸杞杜仲巴戟天附子鹿角膠霜狗脊五加皮秦艽桑枝四劑全愈安波按此內風症也名以風寒襲絡似屬不切不然前醫驅風已效靈矣予久患腹痛忽下瘀血而痊予患腹痛多年由午餐飯冷強食而起痛處在臍之上痛時腹冷掌按熱熨稍瘥雖盛暑亦必以帛護其腹飲食漸減喜暖畏涼他物食尚相安惟飯蒸煮未透或稍冷食則必痛素嗜瓜果得疾後不敢嘗向患痔紅食姜蒜燒酒即發故忌之此疾作時食入阻滯飲燒酒一二杯反覺通暢不但姜蒜不忌即食椒末辣醬均與痔紅無礙經云痛者寒氣多也證屬寒凝氣滯無疑予素畏藥痛發無何香砂姜萸陳半穀芽神麯之類服一兩劑即罷去往歲發疏尚輕惟餐飯不能如常年來發頻且重不拘何物餐後必痛須食下行其痛方止於是餐後不敢坐臥乃學古人養生食後行百步常宜手摩腹之法並遵釋教過午戒食然亦無益於病遂視食為畏途無如疾經多載消恐耗元補防助壅躊躇無策友人謂予年近古稀命陽衰弱寒從內生是以喜暖畏涼釜底無火物終不熟是以穀食難化須用八味丸補火生土所論固是予意終未坦然思痛若在鬲慮其妨食成噎今幸在腹當不害命藥餌亂投恐反有傷恪守不藥得中醫之誡己丑季夏旌邑孫村汪宅延診下塌塾中時二鼓既寢急欲大便燈滅暗中摸索跌僕莫能掙扎大孔汩汩遺出如瀉水狀呼僕持火至扶起視地皆汙色如漆汗淋氣墜即忙就枕汪宅獻楠志仁二公聞之馳至殊為著驚予曰無妨此因久痛蓄瘀刻瘀下脫未免傷氣耳飲黨參桂圓湯少頃氣稍續汗亦斂次早登廁猶有餘瘀予恐其瘀復脫遄歸到家更衣瘀已無矣自此腹不再痛餐飯如常細求其故究由瘀凝腸胃阻其傳導之機以故食入則痛夫血猶水也血之結而為瘀亦如水之結而為冰所以痛處常冷按熨飲醇熱氣至故覺稍快至於瘀蓄年久膠固已深一旦傾囊自出理殊不解得無長夏炎蒸奔馳煩勞動則陽化如雪消而春水來耶從斯悟入書稱久痛在絡絡主血不獨肢體之痛為在絡即胸腹之痛痞積之痛皆為在絡皆宜治血無徒從事於氣又如噎隔一證方書雖有胃脘枯槁及陽氣結於上陰液衰於下等語然由瘀血阻塞胃口者恆多進而思之予疾將十年固未能自知瘀蓄於先然不藥穩持尚不失為中駟不然補瀉雜投不殞於病而殞於藥矣予見敗壞之證自萎者十之二三藥傷者十之七八藥本生人而反殺人可不懼哉自今以往伏願醫家證未審明勿輕用藥病家疾如可待勿急求醫如此或亦可為衛生之一助耳安波曰初痛在經久痛入絡二語葉氏實發前人數千年之未發啟後學於意萬載之無竅然不獨胃病噎膈之症渾融使然也凡病久根深蒂固綜須治血為主此即古人竅必及腎之意也夫程杏軒醫案輯錄慶敬齋方伯耳鳴經言腎氣通於耳故人至中年以後腎氣漸衰每多耳鳴之患喻氏論之甚晰然不獨肝腎之陰氣上逆必兼挾有內風乘虛上升夫風善入孔竅試觀簾櫳稍疏風即透入人之清竅本屬空虛是以外感風邪其息即鳴韓昌黎云草木之無聲風撓之鳴水之無聲風蕩之鳴凡物之鳴由於不得其平人身之陰失其平陽失其秘化風盤旋上干清竅汩汩之聲晝夜不息其義亦然議與潛陽熄風靜以制動之治安波按耳為腎之主竅心膽寄附是以體虛失聰心腎同責案內簾櫳稍疏風即透入之句真是精議卓識又公子痘證見點九朝成漿之期孩提先天稟薄痘形陷伏根腳不齊漿清色白便溏食少嗜臥無神一派氣血虛寒之象亟亟溫補內托尚有生機醫猶以為肌熱未退火毒未消藥仍清解誤之甚矣夫痘證發熱此其正候蓋不熱則表不能透標不能長漿不能蒸靨不能結故痘證始終無不賴此熱力為之主持若欲盡攻其熱不顧戕損其元元氣受傷安能送毒歸窠苗而不秀能成實者鮮矣外科論癰疽謂有膿則生無膿則死痘證亦然又傷寒有養汗之法痘證有養漿之法傷寒須七朝以前邪氣未傳尚可養得汗來痘證須七朝以前逆證未見尚可養得漿來倘至七朝以外生氣已離再思養漿亦猶傷寒邪氣已傳再思養汗其可得乎無膿癢塌勢所必至十二險關慮有風波勉議保元湯合參歸鹿茸一法冀其堆沙發臭或可僥倖圖成安波按近時痘醫輒以辛涼解毒苦寒退熱往往致成敗證束手無策良可嘆也齊方伯脅痛肝者將軍之官謀慮出焉情志不舒木鬱為病據諭恙起數年左季脅下不時作痛飲食入胃其氣常注於左不行於右經言左右者陰陽之道路也肝位居左其氣常行於右脾位居右其氣常行於左左升右降如環無端今氣偏注一隅豈非升降失司肝脾不和之所使然目前雖無大患竊恐肝病日久土困木橫沖胃為嘔攻脾為脹可不早為曲突徙薪之計乎福方伯哮嗽哮嗽多年原屬錮疾往歲舉發尚輕此番發劇胸滿喘促呼吸欠利夜臥不堪著枕藥投溫通苦降閉開喘定吐出稠痰而後即安思病之頻發膈間必有窠囊痰飲日聚其中盈科後進肺為華蓋位處上焦司清肅之職痰氣上逆阻肺之降是以喘閉不通務將所聚之痰傾囊葉出膈間空曠始得安堵無如窠囊之痰如蜂子之穴於房中蓮子之嵌於蓬內生長則易剝落則難不刈其根患何由杜考金匱分外飲治脾內飲治腎且曰飲邪當以溫藥和之議以早服腎氣丸溫通腎陽使飲邪不致上泛晚用六君變湯為散默健坤元冀其土能生金兼可制水夫痰即津液所化使脾腎得強則日入之飲食但生津液而不生痰痰既不生疾自不作上工治病須求其本平常守服丸散疾髮間用煎劑搜逐譬諸宵小潛伏里閈乘其行動犯竊易於拘執剿撫並行漸可杜患臺靜亭州尊陰陽兩虧傷及奇經復診寒熱依然神采更倦前方初服微見痰紅疑係附子溫燥所致續服五劑紅不再吐口並不渴仲聖云身大熱而反近衣者熱在皮膚寒在骨髓也且越人明以陽維為病苦寒熱為訓豈寒慄如此經年累月憔悴不堪不從溫補尚有何策可施耶王太僕云熱之不熱是無火也益火之源以消陰翳旨可悟矣雖內經有諸禁鼓慄如喪神守皆屬於火之言丹溪有治用清涼之案然與此似乎不合無如補虛門中歸脾十全補元煎養營湯之屬均已服過即治奇經之鹿茸河車亦無應驗殊為棘手但細詳脈證總不外乎陰陽精氣兩虧張介賓所謂以精氣分陰陽則陰陽不可離以寒熱分陰陽則陰陽不可混古人復起不易斯言長中堂病機治法經云陰陽者萬物之能始也水為陰火為陽是病機雖繁可一言以蔽之曰陰陽而已試觀天有四時以生寒暑燥濕風人有五臟以生喜怒悲憂恐五臟所患不同要不外乎心腎此陰陽窟宅水火根基恙緣夙夜煩勞心腎不交水火失濟夫營衛二氣行陽則寤行陰則寐若衛氣不得入陰則但寤而無寐矣醫用補心丹養心湯安神定志未為不善要知心為虛靈之臟草木無情非假物類之靈以引之焉能望效擬以純甘加入龜板虎睛龍齒琥珀珍珠諒當有應安波按此議誠言人所未言擬再參入磁石取其黑色通腎上交於心靈情活潑上應虛靈之臟未識與先生合拍否馬朗山制軍公子中寒陽脫急救不及診脈沉伏模糊證見肢厥聲鼾口鼻氣冷人事迷惑處由真元內戕陰寒直中陽氣外脫勢屬危殆內經以陽氣者若天與日今則冱寒凝泣陽霾用事使非重陽見晛何以復其散失之元乎夫人身之真陽譬之鰲山走馬燈拜舞飛走無一不具其間惟是一點火耳火旺則動速火微則動緩火熄則寂然不動而拜舞飛走之軀殼未嘗不存也方用參附二味重加分兩晝夜頻進本草言人參能回元氣於無何有之鄉附子為斬關奪門之將潭底日紅陰怪滅分陽未盡則不死但脈證敗壞如斯欲圖斷鰲立極之功亦難之難矣安波按此症亡陽也急用附片墊氣海關元炙數百壯或可挽溫景僑制軍飲傷脾胃商善後之策脈沉細緩外腴內虛飲多谷少恙經三載發時脘痞噯噫小便欠利年來戒飲其疾雖平然精神起居未能如昔飲食稍有失調脘中猶覺不快慮其病根復萌商圖善後之策此不治已病而治未病也夫脾胃清和始能生化氣血酒者熟谷之液其氣慓悍入於胃中則胃脹氣上逆滿於胸中故致患若此今病雖愈而倉廩之官未得驟反清和之舊計惟調養脾胃以資運化考古治病有煎膏丸散之別心肺病在上焦宜用煎膏肝腎病在下焦宜用丸脾胃病在中焦宜用散審其致疾之因投藥自中肯矣周都憲咳久醫誤治用溫肺滌邪岐伯雖言五臟六腑皆令人咳然其所重全在於肺蓋皮毛者肺之合也皮毛先受邪氣邪氣以從其合其寒飲食入胃從胃脈上至於肺則肺寒肺寒則內外合邪因而客之則為肺咳是咳之不離乎肺猶瘧之不離乎少陽據諭病緣夏熱曉起感冒涼風更兼飲冷始而微咳漸至咳甚服藥月餘咳仍不已經云形寒飲冷則傷肺此致病之大端醫者只知天時之氣熱不察人身之臟寒頻投滋潤希冀清火止咳適燕指南無怪藥愈服而咳愈頻也蓋肺為嬌臟性雖畏熱然尤畏寒金被火刑固為咳金寒水冷亦為咳五行之理生中有克克中有生金固生水者也然金寒則水冷使非火剋金則金不能生水矣譬諸水冰地坼猶以霜雪壓之其能堪乎診脈沉細口不乾渴時當盛暑背猶怯風使非溫中滌邪何以春回暘谷倘再因循貽誤寒邪不解久咳肺傷更難為計擬溫肺湯一法安波按咳嗽一症治之最難昔徐靈胎醫究三十年始能治嗽難怪庸流一見咳症就以沙參麥冬從事貽害良深可歡可恨方耒青制軍便瀉溲數經云中氣不足溲便為變人之二便全藉中氣為之轉輸故不失其常度腎氣虛則關門不固脾氣虛則倉廩失藏便瀉溲數之病生焉方定補中益氣湯升舉脾元四神丸固攝腎氣二藥合投並行不悖加枸兔佐蔻萸之功增蓮芡輔參朮之力方則脾腎分施病則溲便並治矣安波按腎開竅於二陰腎氣虛則失其司脾氣弱則運失其旋故以脾腎雙補治然此公大約多年或久瀉溲數如新瀉溺短則大相徑庭矣曾賓谷中丞痢疾痢疾古名滯下然此滯字非單指飲食停滯之謂言其暑濕內侵腑氣阻遏而為滯耳長夏感受暑邪伏於腸胃新秋患痢腹痛後重赤白稠黏日夜頻次考古賢治痢不外通澀兩法大都初痢宜通久痢宜澀夫暑濕邪熱客於營衛則生瘡癤入於腸胃則為瀉痢痢之紅白如癤之膿血膿血不淨癤不收紅白不淨痢不止證在初起治貴乎通經曰通因通用然此通字亦非專指攻下之謂言其氣機流行而無壅滯乃為通耳丹溪以河間發明滯下證治和血則便膿自愈調氣則後重自除二語實盲者之日月聾者之雷霆特其方法每用芩連檳枳苦寒攻伐藜藿洵屬合宜膏粱恐難勝任敝郡汪氏蘊谷書稱痢疾即時疫濁邪中下名曰滯亦雜氣之所乘故多傳染於人其自定黃金湯一方藥雖平淡無奇然於逐邪解毒之義頗為切當穀食不減胃氣尚強約期二候可以奏功安波按黃金湯者用黃土金銀花扁豆肉扁豆花茯苓穀芽黑豆甘草生白芍五穀蟲生薑也余治噤口痢甚效已驗之數人矣張觀察如夫人經期不調先天稟薄情志欠舒心脾抑鬱診脈細澀細為氣少澀主血虛問寢食如常惟月事失調每值經期灑淅寒熱腰膂痠疼按沖為血海任主胞胎二脈交通乃能有子脈證若此即無他患恐難孕育間進加味歸脾湯調養心脾血氣之源常服毓麟珠補益衝任陰陽和協衝任調勻則合浦珠還藍田玉茁可預必也安波按衝脈為經水之本故內經言太衝脈盛則月事以時下茲以毓麟珠等藥以補益衝任正合其旨龔暗齋觀察令媳瘵證軒歧論五郁首究乎肝肝主春生之氣春氣不生則長養收藏之令息矣而欲其無災害者幾希夫病端雖始於肝久則滋蔓他臟膚淺見血投涼因咳治肺者固無足論即知求本而不審諸陰陽消長之理依然隔膜所謂補陰補陽義各有二芩連知柏有形之水也麥味地黃無形之水也以無形之水制無形之火如盞中加油其燈自明乾薑桂附溫烈之溫也參耆甘草溫存之溫也以溫存之溫煦虛無之氣如爐中復灰其火不熄日內咳頻痰猶帶血似須先投甘寒以降火未可驟用參耆以補陽耳醫貫云凡人肺金之氣夜臥則歸藏於腎水之中腎水乾枯無可容之地故復上逆而為患矣病始不得隱曲漸至不月風消喘咳息賁莫能正偃所以然者雖云火熾之相煎實由水虧之莫濟夫火空則發使非填實其空炎焰何能斂納王太僕云益心之陽寒亦通行強腎之陰熱之猶可誠見道之論昨論便溏多恐脾元下陷夜來便圊數次煩熱少寐夫土為物母心肝肺腎若四子焉子虛尚可仰給母氣苟土母傾頹中無砥柱矣古人論脾肺兩虧之證最難措置方欲培土強脾恐燥劑有妨於陰液方欲濡燥生津恐潤劑有礙於中州惟上嗽熱而下不便溏下便溏而上不嗽熱者方好施治耳今日用藥當以扶脾為急昔士材先生治虛勞嘗云今日肺病多保肺藥中兼佐扶脾明日脾病多扶脾藥中兼保肺亦因時制宜法也但臟真損傷已極藥餌恐難圖成吳春麓儀曹不寐眩暈經曰水火者陰陽之徵兆也腎為坎卦一陽居二陰之間故須陰得其平然後陽藏於密童年知識已開陰精早泄此致病之大端及壯血氣方剛尚不覺其所苦人四十而陰氣自半起居日衰精神不充蟬聯疾作診脈尺虛細澀寸關大於平時按尺為腎部脈見細澀腎虛奚疑寸關大於平時陰弱陽浮之象耳夫醫之治病不以用補為難而以分別水火氣血為難馮氏書云小病治氣血大病治水火蓋氣血者後天有形之陰陽也水火者先天無形之陰陽也太極之理無形而生有形是治大病可不以水火為首重耶請以不寐言之人知其為心病而不知其為腎病也心雖為神舍而坎離尤貴交通越人以陽不入陰令人不寐豈非水火未濟坎離失交之故乎內經又有頭痛巔疾下虛上實過在足少陰巨陽之語形容厥暈病機最切方書稱風稱火稱痰漫無定見景岳師其意以為無虛不作眩治當上病療下滋苗灌根精矣精矣暫服煎劑再訂丸方王道無近功內觀頤養為要舊患眩暈怔忡不寐遺泄本屬心腎兩虧水火失濟曾訂煎丸服經十載茲診脈候平和精神矍鑠此亦頤養之功非全關草木之力也惟食多尚難運化腰膂時痛遺泄間或有之藥物所需仍不可缺考古人用藥有攻病保躬兩途攻病則或涼或熱當取其偏保躬則適其寒溫宜用其平蓋溫多恐助相火精關不藏潤多慮傷脾陽坤元失健如雲食蜜便即溏瀉脾虛不勝潤滑之徵青娥丸固能治腎虛腰痛但故紙胡桃味辛性溫久而增氣恐其助火且常服丸藥亦須分別氣候夏令炎熱遠剛近柔以防金水之傷冬令嚴寒遠柔近剛以遂就溫之意將交夏至一陰初變元精不足之時商以益陰保金兼調脾胃秋季再為斟酌又少君水火失濟之證水火之道宜交而不宜分水上火下名曰交交為既濟不交為未濟由是觀之水火之切於人身者大矣據脈與證處由腎元下虧水火失濟以致魄汗淋漓玉關滑泄腰為腎腑腎虛則腰膂多疼心為神舍心虛則夜臥欠逸面赤頸熱虛陽上炎體倦頭傾髓海不足且金乃生水之源肺腎為子母之臟子虛盜竅母氣此喘咳之所由腎開竅於二陰心與小腸相表裡心熱移於小腸此血淋之所自昔肥今瘦虛里跳動種種見證虛象奚疑不知持滿御神日啖草木無益積精自剛積氣自衛積神自旺酸以收之介以潛之厚味以填之水火交精神治矣安波按廣成子云無勞爾形無搖爾精之言誠為養身吃緊良方而世人一至有疾徒以草木從事其先天不自攝恣意斫伐忍心剋剝可歡可悲胡觀察疝證經云任脈為病男子內結七疝督脈為病不得前後為沖疝是疝病雖屬於肝而實衝任督三脈所生據證睪腫少腹形堅痛甚攻衝腰俞病根深遠愈發愈劇考任脈起於中極之下上毛際循腹裡衝脈起於氣街督脈統督諸脈而為奇經之長葉氏云大凡沖氣從背而上者系督脈主病治在少陰從腹而上者系衝任主病治在厥陰揣諸病情確為奇經受病無疑醫不中肯是以藥治無功郭松崖郡侯瘧疾瘧雖小病而內經論之最詳首稱夏傷於暑藏於皮膚之內腸胃之外因得秋氣汗出遇風內外相搏是以日作可知瘧病由於暑風相搏而成然暑必兼濕若無濕但為乾熱非暑也即此推之瘧病雖屬暑風相搏而成又必挾有濕邪醞釀之所致矣特六淫分配四時暑之與濕氣雖異而因則同有可分不可分之義也今歲太陰司天濕土主事其變驟注其災霖潰人在氣交之中感而即病者為霍亂吐瀉腫滿諸候其不即病邪伏膜原內趨大腸則為痢外走少陽則為瘧故瘧之寒熱往來亦猶痢之赤白膠黏耳恙逾匝旬瘧經五發胸腹飽悶嘔惡不渴脈沉弦緩顯系濕鬱中焦腑陽失運幸得從樞外達不至滯下疸滿邪淨自瘳無煩過慮鮑蒔春部曹尊堂血枯久傷奇經產育多胎衝任受虧兼之自乳陰血更耗恙經年遠腰膂刺痛轉側維艱小便血淋痛引少腹揣摩其故非特血氣之傷而且奇經亦損故歸地養陰參耆益氣均無靈效衝脈起於氣街任脈起於中極之下淋痛諸候必有所關即寒熱一端亦陽維為病耳病由血海空虛損及奇經八脈尋常藥餌諒難奏功宗內經血枯治以四烏鰂骨慮茹丸安波按古言病久入八脈周司馬痱風病後足膝軟弱前患痱風調治小愈案牘勞形元虛未復腰膂雖能轉側足膝尚覺軟弱肝腎真元下虧八脈不司約束參耆歸地僅可益其氣血未能通及八脈古人治奇經精髓之傷僉用血肉有情豈諸草木根荄可同日而語推之腰為腎府膝為筋府轉搖不能行則振掉不求自強功夫恐難彌縫其闕恬澹虛無御神持滿庶幾松柏之姿老而益勁也擬河車鹿茸虎脛骨虎膝骨牛骨髓豬骨髓羊骨髓阿膠海參之屬王明府夫人積聚久痛脈弱質虧操持多勞昔年產後少腹起有痞塊不時作痛邇來痛於早晨日日如是經云任脈起於中極之下循腹裡任之為病其內若結男子七疝女子瘕聚再考古人論積聚分癥瘕兩端癥者徵也有塊可徵其病在血瘕者假也聚則有形散則無跡其病在氣良由新產之後或因寒侵或因氣滯以致循經之血凝結成形膠黏牢固長大則易鏟削則難須待本身元氣充旺始能消磨倘務急攻非但積不可消反傷正氣內經有大積大聚其可犯也之戒旨可見矣現在痛勢攻衝較甚滋膩之補似非所宜思久痛在絡沖為血海先商煎劑調和衝任使其脈絡流通氣機條暢痛勢稍緩再議丸藥圖刈病根安波按煎劑議通瘀煎法丸以回生丹攻補兼用沈虹橋廣文疫證時疫十朝正虛挾邪證見神卷耳聾熱發不退脈息沉細無力憑脈用藥理應壯中溫托閱方曾服理陰煎三劑病樣日增前法似難再進夫陽證陰脈原屬不宜方書有時疫邪伏於裡脈多沉細不同傷寒邪自外來脈多浮大語屬可參仿趙氏六味湯加柴胡一法復診脈仍虛細神形倦怠唇齒乾枯舌苔黃燥變黑夫邪熱最為真陰之賊高年腎陰本虧熱甚津液更耗己任編所謂感證始終以存津液為第一義蓋陽明燥土全賴少陰腎水以滋養之如旱田側有井泉猶可供其灌溉之資倘並井泉乾涸燥土炎蒸則苗槁矣宗甘露飲洪廣文少君損過脾胃書云衛虛則惡寒營虛則發熱證見日晡寒熱往來已經數月洵為營衛二氣之虛斷非客邪外感也病既屬虛虛則當補昨服補劑胸鬲反增滯悶此中消息頗難窺測蓋非藥不能應病乃胃氣不行藥力耳夫上損過胃下損過脾越人且畏姑遵經旨虛癆不足當與甘藥兩進甘藥寒熱依然惟粥食稍增咳嗽略緩藥病尚覺相符稽古補虛方法千蹊萬徑而其關鍵總以脾胃為之主腦夫人之一身內而五臟六腑外而皮肉經脈何一非藉穀氣長養之功苟土母傾頹既難輸化飲食之精微焉能傳送藥力宜乎虛不納補也難經發明五損勿過脾胃仲景治虛癆諸不足出活人手眼其所立建中方法亦皆稼穡作甘此古聖賢明訓內傷大病可不以脾胃為首重耶然病真藥假終難圖功鮑覺生宮詹精氣內虧詳敘證治次第恙經半載脈證合參究屬質虧煩勞以致坎離不交水火失濟五液內涸虛陽不藏誤服苦寒重伐胃氣諸證蜂生糾纏不已揆之古訓以虛能受補者可治虛火可補參耆之類實火可瀉芩連之類勞傷之火虛乎實乎瀉之可乎趙氏謂陰虛之火如盞中油干燈焰自熾須以膏油養之專主補陰其說是已然陰生於陽血生於氣顧此食少欲嘔脘悶不快又難強投滋膩反復推詳計惟培養脾胃默運坤元以為先著脾為土母安穀則昌金匱治虛勞首用建中越人言損其脾者調其飲食脾元日健飲食日增變化精微滋榮臟腑不治火而火自熄不潤燥而燥自濡充膚熱肉之功可漸見矣然內傷之病宜內觀靜養所謂大病須服大藥大藥者天時春夏吾心寂然秋冬也參透此關以佐草木之不逮為妙服藥旬余脈象稍轉寢食略安惟足膝痠軟項脊時疼形神疲倦考治五臟之虛難經言之甚悉曰損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精闡發精微了無遺蘊再考金匱云男子脈大為勞極虛亦為勞夫脈大為真氣泄越心脾耗傷此歸脾建中養營四君等湯之所宜極虛亦為勞乃精血內奪肝腎下衰此六味八味天真大造等丸之所宜也但病證多端治須次第首先稼穡作甘培補中宮專崇其土次當榮養心脾蓋心為離陽補心陽以生胃土虛則補母之義至於皮枯肉瘠肢懈形羸精髓內竭筋骨廢弛明屬本實先撥舍填納固攝則解㑊何由而振枯槁何由而回特草木無情須假物類之脂膏益人身之血液煎丸並服脾腎分施煉石補天而收桑榆之效矣調治兩旬雖未大效然處境煩劇猶能支撐未始非賴藥餌扶持之力七年之病三年之艾原無速功春三月此謂發陳恪服煎丸春氣得生夏可得長一陰來復自可霍然病機前案已詳其中奧義難測者尚有數端請再陳之凡人病若勞動反覺精神強健者此陰火沸騰扶助於內不覺其元氣之衰若靜養調適反覺神疲氣弱者此陰火退本相露故也病情有類乎此者一也解㑊一證由於肝腎二經之虛肝虛則筋軟無力以束周身肌肉皆渙散而若解腎虛則骨痿不能自強遍體骨節皆鬆懈而多㑊故懨懨悒悒若不知所以為人病情有類乎此者二也男子精未滿而早搖其精五臟有不滿之處異日有難狀之病病情有類乎此者三也衛氣晝行於陽主寤夜行於陰主寐平人夜臥則陽升陰降陰陽交合然後漸入睡鄉若營弱衛強坎離失媾神明之地擾亂不安萬慮紛云卻之不去衛氣剛入於陰契合淺而脫離快升者復升降者復降是以欲寐之時忽驚而寤矣病情有類乎此者四也至若飲食雖能強餐腹中常覺不暢者胃得受納之司脾失健運之職也大便燥結數日始一更衣者腸脂枯澀傳導艱難也脘中時痛者木失水涵肝吐怒張而迫鬲也心乍怔忡營虛之故臂多青脈血脫之徵更有皮肉之間時如冰水滴溜證狀之奇方書未載曾治一婦患此疾數年投補藥百劑而愈豈非血氣空虛失其溫分肉實腠理之司耶安波按先生闡發經義善發古人之意殷仲周先生筋攣便濁據諭病原始末考諸經云肝主筋身之所束者筋也所以榮筋者血也病本血不榮筋而跗筋之血又耗於足瘤之滲漏加之時疫熱邪深入經絡足跗之大筋得熱而短經又云肝氣熱膽泄口苦筋膜乾則筋急而攣者是矣然治攣固難而治濁亦不易雖津液藏於膀胱氣化能出但肺為生水之源金燥則水不生諸病水液渾濁皆屬於熱義可知矣進而求之筋攣血涸使非養血榮筋不可也然徒知榮養而不明夫輔金制木之法亦不可也苟以金制木而木反榮筋反舒矣且金清則水生而熱降此榮筋即可以治濁也水足則木暢而筋柔此治濁即可以榮筋也明見諒以為然安波按金清則水生而熱降此榮筋即可以治濁擬準繩人參清肺法冀其治節之令行則膀胱氣化出矣所謂不治濁而治濁也復以朱氏虎潛法以濡養營衛壯陰潛陽所謂水足則水暢不榮筋而筋自榮也張佩韋先生肝腎兩虧證治兩尺細澀肝腎下虧必得之醉而使內也壯時血氣方剛故無所苦自強仕以來漸覺目盲不能遠視耳如蟬吟蛙鼓虛里其動應衣闔目轉盼則身非己有腰膝酸楚行步不正種種病狀就衰之徵經云肝開竅於目腎開竅於耳目得血而能視耳得血而能聽血氣衰耗不能上充故視聽失其常度心為君主之官血虛心無所養故掣動不安腦為髓海下通命門上氣不足頭為之苦傾腰者腎之府腎憊則憚於轉側膝者筋之府筋憊則艱於屈伸方用人參為君形不足溫之以氣地黃河車龜鹿膠為佐精不足補之以味更用山萸五味攝納腎氣歸元氣旺精充百骸司職收視而視明返聽而聽聰矣安波按方議皆精妙入化家近陶翁肝陽逆肺咳嗽加感風溫標本異治兩寸關脈候俱大左關尤急據述前冬因情志抑鬱先見此脈後覺心煩不安舊春心煩稍定咳嗽至今不止舌苔時黃時退此肝為受病之源腎為傳病之所夫肝之傷脾人所易知肝之傷腎人所不識譬如折花枝安插瓶中花枝日茂瓶水日為吸乾肝陽吸引腎陰此之謂也且肺為腎母子虛必盜母氣不特金不制木而木反得侮金肝陽上升衝心為煩沖肺為咳脈大不斂舌見黃苔要皆陽亢陰虧之所使然所幸寢食如常別無兼證議以滋腎生肝保金化液辛溫剛愎似非所宜復診脈急依然連日嗽甚於前夜臥欠安頭額手心俱熱是屬挾有風溫外因若云陰血之熱當發於日晡不應發在午前且其來也漸何驟若此質虛恙久固不能正從標治然亦未可過補仿汪廣期前輩風溫湯方法安波按卓識名論非熔經鑄史者不能汪舜賡翁令愛水腫色白膚嫩腎氣不充數月病魔脾元又困諸醫調治病勢日增請求其本而論治焉經言諸濕腫滿皆屬於脾曩服五苓五皮非無所據但腎為胃關關門不利故聚水而從其類仲師主用腎氣丸即此意也若謂童年精氣未泄補之不宜然治標不應理應求本所謂有者求之無者求之是已夫水流濕火就燥二陽結謂之消三陰結謂之水消者患其有火水者患其無火且水病雖出三陰而其權尤重於腎腎居水臟而火寓焉此火者真火也天非此火不能生物人非此水不能有生即膀胱津液藏焉亦必由命門氣化而出華元化曰腎氣壯則水還於腎腎氣虛則水散於皮前服腎氣丸頗應日來飲食不節病復再投不效考諸己任編云此病單用腎氣丸不效單用補中益氣湯亦不效須用補中益氣湯吞金匱腎氣丸謹宗其旨安波按於庚長秋行醫於杭筧橋一士子患水腫面目無縫陰大如栲小水點滴不爽切脈沉細模糊苔膩白滑不渴閱前醫有開鬼門者有潔淨府者有用五子五皮者有需金匱腎氣法者服之如石投海余意腎氣虛則水泛為腫以腎氣丸為旗鼓之劑何反不應追憶己任編有益氣陽送腎氣丸之法翻書令彼視之伊以為然服之竟驗視此與先生暗合也方芷南茂才夫人產後心脾兩虧之證金匱云婦人新產有三證一曰痙二曰鬱冒三曰大便難三證所因無非陰傷血耗之所致耳人知四物湯能補血此第認其面目而未審其根源夫血生於心統於脾欲求其源舍此誰與再按脾主肌肉脾虛故肌肉發熱心主神明心虛故神明失藏計惟黑歸脾湯一方可稱對證之藥泛涉他求恐多岐也語云寧醫十男子莫醫一婦人蓋女科病本無難其所難者胎產兩端而已胎前諸病尚須培養氣血況乎產後百脈空虛不言可知矣產經十朝發熱昏冒肢掣煩躁夜臥欠安脈息數大無力斷非蓄瘀風邪顯屬陰虧陽越病關根本非枝葉小恙可比歸脾湯培養心脾化源喜其虛能受補第補藥治虛如旱田稼穡灌溉宜頻病人畏藥昨晨至今停藥未進心煩肢擾痙厥欲萌原方加膠黃棗麥守服勿懈安波按近時之大弊產後輒以生花湯從事徒不知芎歸等之走竄散渙無常茲閱此案較以歸脾膠黃何啻霄壞之殊昔丹溪之產後多血虛嘗以大補為主雖有雜症以末治之景岳云產後多不虛症胎前為氣血所壅及產後始見通快之語細玩二言在醫者之靈機活潑不可固執一見以致膠柱鼓瑟也鮑禹京翁夫人厥證治法節略傷寒論厥證分別陰陽陰厥屬寒陽厥屬熱寒宜溫而熱宜涼雜病論厥證分別虛實奪厥煎厥痿厥為虛薄厥屍厥食厥為實實可消而虛可補病由情懷不釋肝失條達血氣日偏陰陽不相順接因而致厥與全虛全實者有間理偏就和宜用其平偏補偏消烏能治情志中病厥證婦人常有之其為情志鬱勃致病顯然惟晝夜頻發陰陽臟氣俱傷卻為可慮若乍發乍止疏而且輕亦無妨礙所嫌病關情志難以除根務須戒怒舒懷惜勞靜養冬令收藏之際加意慎持來春草木萌動庶可不致復發厥證有因痰者有不因痰者因痰而厥厥時喉中必有痰聲漉漉此則厥來寂然無聞且痰厥脈應帶滑今脈細兼弦澀洵屬氣厥無疑持脈之道須知人之平脈然後察其病脈質虧脈細此其常也惟細中見澀右寸關兼帶弦象故主病耳澀者血虛氣滯弦者胃弱肝強細小弦澀主病尚輕牢大弦長主病重矣諸厥屬肝女子以肝為先天肝主怒怒則氣上經云血之與氣並走於上乃為大厥其由肝鬱為病可知考古人治郁證多用越鞠逍遙二方但越鞠燥而逍遙則潤矣越鞠峻而逍遙則和矣治肝三法辛散酸收甘緩逍遙一方三法俱備木鬱則火生加丹梔名加味逍遙滋水以生木加熟地名黑逍遙己任編中一變疏肝益腎湯再變滋腎生肝飲前用逍遙減木者恐其守中用丹皮減山梔者恐其苦泄傷胃也肝胃二經同病須分別其肝陰胃液已虧未虧如陰液未虧氣藥可以暫投若陰液已虧治惟養陰濡液所謂胃為陽土宜涼宜潤肝為剛臟宜柔宜和葉氏論治郁證不重在偏攻偏補其要在乎用苦泄熱而不損胃用辛理氣而不破氣用滑潤濡燥澀而不滋膩氣機用宣通而不揠苗助長數語深得治郁之理血虛治當補血四物湯為補血之首方然其中尚須分別陰陽若血虛肝燥木火沸騰芍藥微酸微寒在所必需地黃先應用生涼血生血繼則用熟補水涵木川芎辛竄固屬不合當歸亦須蒸去辛溫之性養血諸藥除四物外惟丹參為勝本草言其色赤入心有去瘀生新之能功兼四物乃女科要藥可以備用木鬱生火火則宜涼第此火非從外來良由木失水涵以致肝陽內熾芩連知柏苦寒傷胃洵非所宜不若生地丹皮之屬清肝涼血為穩五行剋制木必犯土肝氣上逆胃當其衝洵其厥來脘中有塊按之則痛食下阻滯此肝犯胃厥陽順乘陽明故也既知氣逆為患治應先理其氣無如氣藥多燥肝陰胃液已虧如何燥得經言蘭除陳氣並能醒胃舒肝可加為引桑葉輕清能瀉肝膽之鬱熱葉案每與丹皮同用見功虛則補其母肝腎同治乙癸同源乃治肝病第一要訣然須俟其痞消厥定以作善後之籌若用六味湯可加當歸白芍或去山萸恐其溫肝故也如用須陳者乃佳分兩減輕並用鹽水拌炒肢掣名為肝風此非外來之風由乎身中陽氣變化故曰諸風眩掉皆屬於肝第肝為剛臟須和柔濟之治用和陽熄風及養陰甘緩等法至於鉤藤菊花桑寄生均有平肝熄風之能發時隨宜加入內經有肝苦急急食甘以緩之之語金匱出甘麥大棗湯只用甘草小麥棗肉三味蓋小麥春生肝之谷也最能養肝合諸甘草棗肉之甘以緩其急後賢治肝風諸病每參此法木喜滋而惡燥陰虧血燥之體或逢天時陽氣泄越或觸情志恚嗔因而激動肝風變幻痙厥糾纏日久陰液內竭可以借用千金之復脈湯蓋脈乃血派血脈既虧藉其藥力以通營衛致津液葉氏於方內除去薑桂益精諸厥雖屬肝病然心為君主之官主安則十二官各得其職厥發日久肝風內扇震動心營養心安神藥品雖多首推抱木茯神者蓋茯神本治心而中抱之木又屬肝以木製木之義其次柏子霜既能養心更可潤腎滋肝用棗仁須豬心血拌蒸曬用麥冬須辰砂拌染或加琥珀龍蠣均有鎮靜之功肥人之病慮虛其陽瘦人之病慮虛其陰陰虧後下則陽越於上下虛上實而為厥巔之疾是故養陰藥中必佐以潛陽者如畜魚千頭須置介類於池中之意牡蠣鱉甲淡菜龜板皆介類也方中只用牡蠣鱉甲者取蠣之咸能軟堅鱉之色青入肝不獨潛陽已也安波按肝厥良由腎陰枯涸肝陽上冒所致是以輕則竅絡阻塞甚則瘛瘲痙厥故厥者必挾痙往往若是張仲篪翁息賁喘嗽情志抑鬱原屬肝病辛散酸收甘緩俱厥陰正治之方屢投未應竊思肝木不平金失其剛肺臟不能無患肺欲收觀其胸痞喘咳不得臥豈非肺張不收臥則葉黏背俞阻塞氣道之故乎經言諸氣膹郁皆屬於肺喻氏發明秋傷於燥冬生咳嗽之義是知郁病可不專責於肝而燥證則全關於肺也蓋肺主氣居相傅之官苟治節有權則清肅下行克稱其職病緣木鬱生火兼挾燥邪金受火刑令失清肅肺燥葉張阻塞氣機而為患矣倘果專屬肝病而不涉肺何至喘咳不能著枕耶且肝病治肺輔金制木道猶不悖設令肺病不救則煩冤逆滿內閉外脫更何如耶擬千金葦莖湯大意安波按然氣閉欲死時先總以開豁為主或降氣或豁痰善後之法不出己任編等方意義也又按木叩金鳴以千金葦莖湯治大有深意方竹坪翁頭痛質虧煩勞證經多日診脈虛弦帶急精神欠充夜寐少逸詢其病初並無寒熱知非外因惟頭痛乍輕乍重推求其故東坦云內傷頭痛時痛時止究緣煩勞抑鬱水不涵木肝風上擾清空鼓動不定夫頭痛神煩倏然而至迅速莫如風火但身中陽化內風非發散可解寒涼可平必須陽和庶乎風熄經旨以下虛則上實陰傷陽浮冒上病療下滋苗灌根語可味也安波按胃陽不潛宜和陽以就陰擬虎潛法洪並鋒翁脾陽虛寒濕內伏重用溫補治法夏月伏陰在內當於寒濕中求之議以理中湯溫理脾陽服藥瀉止嘔減舌苔少退此由脾陽向虧卑監之土易於釀濕陽氣不足寒自內生既無外邪干之本氣自能為病今既投機只可於方內增分兩不必於方外求他味其所以不驟加陰藥者蓋恐肥人之病慮虛其陽耳經云陽氣者若天與日失其所則折壽而不彰故天運當以日光明日光不到之處恆多濕生土之薄也經又云脾苦濕急食苦以燥之脾陽健可冀運矣昨方加增分兩有效足見尚是病重藥輕然當此盛暑參附大劑服逾兩旬病猶未卻虛寒情狀亦可畏矣安心穩守功到自成安波按華氏云低窳濕處必須以烈日曬之此病是也洪庭光兄肝風眩暈證類猝中病起偶然眩僕醫謂急虛身中猛進甘溫峻補轉增胸脹嘔吐不飢不便有時浮陽上騰面赤唇口乾燥然脈尚和平寢尚安穩言語尚覺明白求其所因良由腎元下虛水不生木肝風鴟張以致發時狀如中厥經謂諸風眩掉皆屬於肝溫補藥重激動肝陽其胸脹嘔吐不飢不便者無非肝風擾胃阻胃之降而然使果真陽飛越雷龍不藏則脈必浮大無根證必煩躁無暫安時且前服溫補諸方豈有不效而反病增之理所定製肝安胃尚有商者蓋肝陽沖逆非介不足潛其威木火沸騰舍酸無可斂其焰擬於方內加牡蠣烏梅二味更覺相宜痰涎頻吐胃液必傷再加赤斛蔗汁益陰保液尤為符合安波按肝風症由肝陽吸耗腎水致水涸木熾故上冒為僕為痰迷上泛為暈為嘔為驚悸為不寐為痙厥為耳鳴種種惡候變態不一庸流不識以熱補助火致斃者何可勝計故錄出以為庸醫者解葉振標翁證患似隔非隔肝主怒怒則傷肝脾主思思則傷脾病緣情志不適初患上焦痞悶噯噫此肝氣橫逆阻其胃降而然醫者不察浪投檳榔枳樸損傷胃氣轉致胸脘脹痛泛泛欲嘔食麵尚安稍飲米湯脘中即覺不爽糾纏三載似隔非隔百計圖之總不見效經云肝在地為木其穀麥不能食谷而能食麥者肝強胃弱之故也蓋胃弱故谷不安肝強故麥可受耳安胃制肝法當不謬但證屬情志內傷未可全憑藥力張雞峰以為神思間病當內觀靜養惟逃禪二字甚妙夫禪而名之曰逃其心境為何如哉安波按安胃制肝法想如半夏廣皮炒香荷葉蒂茯苓杵頭糠等以安胃如烏梅白芍綠萼梅木蝴蝶棗兒檳榔之類以制肝需以清香潔絡松靈不鈍使橫逆之氣下行而胃陽疏動矣洪星門翁吐血脈大不斂陽虛體質兼多煩勞舊病喘汗服溫補煎丸相安月前偶感咳嗽續見鼻衄痰紅日來吐多不止口苦食減頭昏氣促若論尋常吐血不過肝肺之火藥股清降火平其血自止尊體精氣本虛一陽初復形神交勞水火不交氣隨血脫病關根本再投清降損真則陰陽離決矣先哲有見血休治血之語可味也議從黑歸脾湯培養心脾佐以生脈保金攝納腎氣服藥三劑血止脈斂經云人四十而陰氣自半平素質虧多病今復大失其血生生不繼臟真耗傷灌溉栽培尤非易事夫血雖生於心藏於肝實則統於脾古人治血證每以胃藥收功良有以也再按痰之本水也原於腎痰之動濕也由於脾內經以痰多為白血此果痰也果精血也豈精血之外別有稱痰者耶故昔賢又有見痰休治痰之論參五陰煎水土金先天一氣化源也安波按方義精妙入神吐血以歸脾法治大不易事學者須審究的確否則禍不旋踵矣龔西崖兄咳血向患血證發將匝月醫用血脫益氣之法未為不是惟嫌脈數不靜肌肉咽乾嗆咳莫能正偃咳甚則血來咳止血亦止血去陰陽陰不戀陽水不制火刻值金燥秉權肺被火刑金水不相施化醫貫云不投甘寒以降火驟用參耆以補陽此非醫誤不知先後著也自述胸脘乍覺煩冤即咳頻血溢按沖為血海其經起於氣街挾臍上行至胸中衝脈動則諸脈皆動豈非下焦陰火上逆血隨火升之故耶火在丹田以下曰少火出丹田以上曰壯火少火生氣壯火食氣欲止其血須止其嗽欲止其嗽須熄其火然非尋常清火止嗽之藥所能奏功務使下焦陰火斂藏火不上逆金不受刑嗽止血自止矣安波按擬一陰煎加青鉛山萸收納衝脈之逆吳曜泉翁乃媳痙厥變幻證治之奇前議安胃制肝嘔吐稍止脘仍痞痛大便未圊手抖目竄齒齘唇乾舌黃肌熱肝風痙厥狀已顯著據述病因情懷鬱勃夾食而起鬱則傷肝食則傷胃木鬱宜達腑病宜通昨宗仲聖厥應下例便解結糞數枚中宮痞形稍軟飲入不嘔惟肝風未熄痙厥仍發肌熱口渴面赤齒乾胸脘嘈雜病由肝木抑鬱腑氣阻閉變化火風下焦腑氣雖通上脘火猶未降姑議平肝熄風舒郁清熱諸厥屬肝肝為風木之臟相火內寄體陰用陽肝氣上逆胃當其衝食不得入是有火也古稱寒熱之氣相結於心下而成痞相阻於心下而成格又云厥陰為病氣上衝心心中熱疼飢不能食仿半夏瀉心減去守中之品肝鬱逆胃阻胃之降中焦痞塞不食不便連日肝風勢平脘熱亦減惟胸痞未寬不思飲食前用潤下微解結糞昨晚兩番欲便未得解出似有宿滯未淨胃宜通肝宜涼乃病治之法則鬱抑夾食激動肝風神昏肢掣煩熱胸痞不飢不便曾投承氣瀉心獲效加怒病復連日診治證猶未減自言脘中熱悶口渴唇乾頭筋抽痛有時氣衝厥暈即發大便欲出不解病久反復誠難想法然揚湯止沸不若仍用釜底抽薪陽明腑氣一通厥陰風木自平但成敗利鈍雖武侯之明亦難逆睹也便通復閉脘痞依然按之尚痛食不阻塞不行然下法用經兩次燥糞已圊所有熱滯亦應推蕩何至牢錮若此遷延兩旬言微形倦似未可以再攻奈痞結不開補之不納仍宗土鬱奪之實有羸狀之義安波按凡病之變幻不一在病家之賢愚耳如今時之人病有一變群醫華集或論寒或道熱貽誤者焉可勝算如先生之相信終不更醫亦時也運也命也為之廢書一嘆大約為醫一途命中必要為天醫星者何彼多遇而此不遇耶葉震先兄肝風眩暈肝者將軍之官罷極之本其藏血其主筋肝病則血病筋失所養眩掉強直諸證生焉要知此乃肝家自生之風非外中之風也治肝之法可不以為先著耶但東方木生於北方水使無此水何以生之使水不足何以涵之虛則補母厥有深意平昔嗜飲醪醴傷陰足間常患流火行步振掉皮肉乾瘠春來漸有眩暈之象肝風勃勃內動加以陰絡之血又從痔孔內溢淋漓不已將何以榮筋澤肉乎斯恙由來有自矣目下年紀尚壯猶可撐持過此以往欲求良治不可得也吳雙翹兄幼女目疾目得血而能視黑輪上戴日久澀癢羞明弦爛流淚眼科苦寒消散屢服無功可知無形之火原非苦寒可折王太僕云寒之不寒是無水也壯水之主以鎮陽光小兒純陽從錢氏六味地黃湯治法囊緣血虛肝燥目痛羞明苦寒消散陰氣益弱今年厥陰司天風木氣王秋深燥氣倍張肝藏血其榮在爪觀其爪甲枯槁剝落肝血內涸顯然前議壯水以平厥陽沖逆之威繼佐芍甘培土酸味入陰甘緩其急交冬腎水主事木得水涵庶可冀安哭泣躁煩究由臟燥肝在竅為目肺在聲為哭地黃滋腎生肝二冬清肺潤燥所加黑羊膽汁引之者蓋肝位將軍膽司決斷膽附肝葉之下肝燥膽亦燥矣故取物類膽汁以濟之同氣相求之義也安波按羊膽味苦恐蹈前轍不若以磁珠丸之磁石其性能引鐵製金平木之義可知也設肝膽得以有制則其勢不暇他顧只可足以自守本位濟之以補益涵養俾渴者得飲而燥者潤沖逆之威下潛則目疾釋矣汪式如兄陰暑感證轉為癉瘧前後治法不同證經七朝兩投溫解寒熱退而復發乾嘔不渴舌膩頭疼病緣本質不足因熱貪涼感受陰暑之邪怯者著而為病方訂理陰煎冀其云蒸雨化邪從少陽轉樞歸於瘧途則吉寒熱如期呵欠指甲變色似走瘧途證因陰暑逗留非開手正瘧可比仍宜壯中溫托參以薑棗和解現在寒來且看晚間熱勢若何明日再議寒熱仍來邪犯未解口仍不渴體猶怕風時當盛夏姜附服至四劑並無火象使非陰暑安能勝任不問是瘧非瘧總屬正虛邪留輔正即所以祛邪強主即所以逐寇昨發熱至五更汗出始退今日午初又至嘔惡呵欠前次尚有微寒此番並無寒意脈見弦急由阻轉陽之機大凡陰證得以轉陽為順證既轉陽溫藥當退中病則已過恐傷陰病經多日正氣受虧輔正驅邪為是汗出熱退頭痛稍減脈仍弦急舌苔轉黃瘡刺俱見寒邪化熱無疑恐其熱盛傷陰酌以補陰益氣煎出入質虧感證經十二朝單熱無寒午初起勢黎明汗出退涼確係伏暑為病較之傷寒其狀稍緩較之正瘧寒熱又不分明經云少陽為樞陰暑伏邪得從樞轉尚屬好機不然則邪正溷淆如白銀中參入鉛銅不成銀色矣夫傷寒一汗可解溫暑數汗不除蓋暑濕之邪伏匿膜原所以驅之不易今寒邪既化似可清涼惟嫌受病之原終從陰分而來甫經轉陽苦寒未便驟進昨用養陰和解夜熱稍輕頭痛稍減脈急稍平窺其大局守過二候當可獲效熱來稍晏勢覺和平黎明退涼渴飲較多汗至午時尚未收靜夫暑汗與虛汗不同經言暑當與汗皆出勿止脈急漸緩頭痛漸輕小便漸淡邪剩無多今將二候愈期不遠按純熱無寒曰癉瘧癉即陽亢之名用藥自應轉手昨熱作止勢猶彷彿脈急已平神采稍好惟舌根尚有黃苔口猶作渴仍屬伏暑餘波今明兩日熱難驟止好在發作有時上癉瘧同例內經以為陰氣孤絕陽氣獨發參加減一陰煎昨熱仍作其勢較輕證屬癉瘧因系伏暑了無遺義喻氏論癉瘧會內經金匱微旨從飲食消息調以甘藥二語悟入主用甘寒保陰存液指南醫案治用梨蔗亦此意也推諸病狀似與秋時晚發之證相類氣候稍有不符情形不略則一必須兩三候外日減一日方得全解屆期可許霍然安波按秋時伏氣之疾考方書惟己任編另出心裁論之甚晰迄今以來葉氏獨得其妙此外無幾人矣又乃嫂喉痛清藥過劑變證恙經兩旬起初喉痛清涼疊進喉痛雖好變出舌強語澀食少形疲頭昏足麻虛里跳動一派虛象切防肝風變幻若恐餘燼未熄亦當壯水養陰斷無再用苦寒之理舌乃心苗腎脈系舌本當於心腎兩家求其水火既濟之道早診言防肝風變幻午後突然口眼歪斜心悸肢掣此腎真下虛水不涵木以致內風鼓動更怕痙厥之險經云肝苦急急食甘以緩之祖千金復脈方法連日肝風已平食少欲嘔人以胃氣為本病久正虧全仗飲食扶持胃氣不旺藥難奏功究緣前患喉證煎吹二藥清涼過度脾胃受傷不必慮其有火且恐變為虛寒脾開竅於口脾和則口能知五味口冷不渴豈非脾胃虛寒之明驗與溫養脾陽仿理中六君方意服藥兩劑嘔止胃安虛里跳動舌強口歪諸證尚未見效虛風不息谷少胃虛固當扶助脾元建其中氣第土由火生既虛且寒更須兼補其母安波按擬景岳四味回陽飲合六味異功煎法又患伏暑危證拯治原委日前診視擬屬質虧受暑熱傷胃陰諸嘔吐酸皆屬於熱商仿黃土稻花湯養胃滌邪服藥嘔減熱緩惟舌膩未退脈急未和寐仍欠逸心煩體躁正虛邪留輔正兼理餘波治法固雖不謬所嫌熱久嘔多形倦不支目闔少神不獨傷陰亦復傷氣不患邪之不除而患正之不守未可以嘔減小效恃而不恐昨夜仍不安寐今日巳刻陡然神昏齒噤狀類痙厥舌苔黃膩反甚於前證雖多朝伏邪未透本體向虧況經三候之久驅輔兩難暑喜傷心風喜傷肝入心則昏迷入肝則瘛瘲其危若此姑訂甘露飲合幹一老人湯養正滌邪穩持不變庶可轉危為安夏暑內伏秋時晚發前見熱勢鴟張不得不為清涼復慮正氣不勝兼佐養陰固本以杜痙厥脫變其熱朝輕暮重口渴心煩舌黃欲黑足徵內熱燔灼若非急為徙薪必致焦頭爛額幸得熱退方許坦途質虧伏暑病經多朝邪熱雖減正氣更虛自云心中焦煩口渴嗜冷固知邪熱未清然形倦如此清涼又難再進前案所謂不患邪之不除而患正之不守洵非虛謬原知邪實正虛未敢直行蕩掃無知邪熱蘊熾舌苔欲焦神迷欲厥所商養陰固正清熱滌邪睹斯證狀邪未淨而正欲傾將何圖治耶復脈生脈合參再望幸成昨訂亟固真元以拯危殆夜來狂叫暈汗黎明神識漸蘇脈大稍斂面赤略退舌苔仍黃口仍作渴頭額手心尚有微熱倦怠依然惟詢問病原略能應對較昨昏沉形狀稍好質虧載邪糾纏四候正虛固不待言餘燼似乎未熄苦寒雖不可投甘寒尚可佐用證將匝月危而復甦雖屬伏邪黏著迅速難驅亦由正氣不充無力托達凡治質虧加感之病起初最難著手不比壯實之軀發表攻裡邪去病除之為易也神明清爽似屬轉機然肌熱未退大便欲圊不解固非實熱為殃亦緣虛焰不熄仍議育陰固正濡液存津陰血下潤便自通耳養陰濡潤便仍未圊熱仍未淨病人自言心煩口渴喜吃生冷總屬熱久陰傷津液被劫雖仲景有急下存津之法現在正氣動搖焉能商進考諸張介賓及高鼓峰前輩所論傷寒溫暑熱甚傷陰舌黑便閉之候悉用左歸六味甘露等方以代白虎承氣見效雖遲穩當過之謹宗其旨病候纏綿變幻不測刻診脈耎形疲氣墜都系虛象外熱已輕舌苔既退內熱料亦無多大便未圊腹無苦楚聽其自然知飢啜粥胃氣漸開一意固本培元當此九仞加意留神為上安波按此症極數紫雪牛黃至寶之候必須詳察精凝如此症之前曾患肝風虛患故決意以熱極傷陰四字作主稍不經意藥到人死可不慎哉又按近時吳鞠通先生增液法取添水行舟之意大有深味余治斯候甚效投之應若桴鼓故參而啟後學之悟也吳婦血崩經云陰虛陽搏謂之崩又云悲哀動中則胞絡絕陽氣內動發為心下崩病機已見大端至於治法方書雖有暴崩宜溫久崩宜清之語要知此溫清二字乃示人大意未可執論也夫氣為血之帥暴崩氣隨血脫每見暈汗諸證故宜甘溫以益其氣蓋有形之血不能速生無形之氣所當急固初非指溫字為溫烈之溫也陰為陽之守久崩血耗陰傷每見躁熱諸證又當滋養以培其陰蓋壯水之主以鎮陽光盞中加油浮焰自斂亦非指清字為清涼之清也病由半產失調始而經漏繼則崩中黑歸脾湯一方按心脾肝三經用藥暴崩之頃洵屬合宜若謂反復之故除肝脾失其藏統之外或情懷不釋因怒動血者有之或衝脈空虛不司約束者有之或腎水下虧不能坐鎮心火者有之或元氣大虛不能收攝其血者有之斷無因服歸脾湯而反致崩之理凡血離宮便成塊未可見血之有塊即認為瘀果真內有蓄瘀必然脹痛拒按何崩決數番腹無所苦耶血色紫黑固多屬熱然須辨其熱之虛實經言陽搏其陰必虛心崩由乎悲哀太甚其旨可見再按腎開竅於二陰沖為血海脈起氣街據言小解後血隨溢出此腎真下虧衝脈不固益彰彰矣安波按洄溪云崩漏宜大劑補陰輕藥不能以取效余擬砂仁炒枯熟地蒲黃炒枯阿膠桑螵蛸海螵蛸醋煅牡蠣棕炭以雞黃炒茜草以黃芩水炒血餘以童便炒枯煅盡煙人參穀芽等分修丸余自名為補煉丸曾治吳觀察夫人患崩三月諸味餌遍不效余以此丸大劑作湯飲十裹而痊許婦內傷經閉辨明非孕病由不得隱曲以致臟真內傷經期阻閉女科不察病原僉用清熱安胎愈醫愈劇考金匱雖有䗪蟲丸治虛癆血痹之法顧此羸軀恐難勝任即水土金俱病古人亦無籠統治理議以早用四陰煎育陰保金晚仿周慎齋前輩淡養胃氣甘益脾陰蓋土為物母脾乃至陰其他退熱止嗽之藥皆置不用葉氏云勿見熱而投涼勿因咳而理肺誠哉是言也形瘦陰虧脈虛近數證見咳嗽側臥汗多食少經停九月失紅三次據述曩因腹中微動疑是妊娠經云婦入手少陰脈動甚者孕子也又云身有病而無邪脈也今脈證如此諒非孕徵果真有孕不過氣血之虛胎不長養雖費調理尚在可為無孕則血海乾枯勢走怯途殊難著手且婦人重身即有病端但去其病而胎自安漫究妊娠之是否惟論療治之何知君以育陰保金佐以調養胃氣夏至一陰能復差可保守安波按女子以血為主首重在乎衝任治衝任之法首重養血胃為衝脈本故陽明氣旺則月事行先生以育陰調胃良由斯乎汪孚占翁乃孫暑風驚證反復治法一熱即搐幼科呼為急驚經云東方青色入通於肝其病發驚駭昨日驚作至今熱發不退神識昏迷哭不出聲唇乾鼻燥舌苔中黃尖絳雖屬時感燥邪然必挾有伏暑兩邪相合致病勢暴如此叫喊作努頭仰肢搐肝風動搖亟亟清解守過一候邪淨熱退庶可安穩夏暑伏邪秋時感發病起三日熱甚作驚新舊兩邪內犯心肝二臟入心則昏迷入肝則抽掣觀其撮唇弄舌尖絳苔黃伏邪化熱顯著夫邪在皮毛疏散可解伏熱內蘊非清不除病來勢暴未可因循亟當清解伏邪舍此別無法想兩服清解熱退七八驚勢雖定神猶未清舌仍干黃唇紅目赤伏邪未盡故也口中生瘡火尋竅出心熱外解之徵清藥仍不可少慮其熱盛傷陰參以養陰亦可九朝驚定復作餘燼復燃肝風熄而復動幸病不由吐瀉而來證屬急驚猶可無妨熱蘊在裡外反不熱肢反厥冷所謂熱深厥亦深也若謂熱盛傷陰理則有之若直指為虛寒思投溫補斷乎不可仍當滌邪清熱平肝熄風病逾兩旬驚猶未定神迷齒齘肢掣頭搖證由夏伏暑邪兼感秋燥之氣兩邪相併一熱即驚邪傳手足厥陰深伏於裡所謂臟者藏也邪難入亦復難出故治法宜守更有初中末三法病初邪熱熾甚治宜清解急驅其邪不使陷伏中治則和陽熄風末治惟有養陰存津緩肝之急而已若云初起熱甚驚作之時當服桂枝湯豈不抱薪救火而犯桂枝下咽陽盛則斃之戒乎是病糾纏至今尚有生機可圖者幸能納穀胃氣未散倘一投桂附溫補陽遇陽則為焦枯胃氣消亡殆盡矣病勢潰裂若此恐難扭轉機關伏暑至秋而發邪陷手足厥陰證經五十餘日肝風雖定神躁未安舌絳唇紅鼻瘡便結雖屬病久陰虧而心肝伏邪總未滌淨今歲少陰君火司天陽明燥金在泉故多熱燥之證治病須明運氣也緩肝之急以熄風滋腎之液以驅熱服藥數日躁定寐安時或仍有強直之狀經云諸暴強直皆屬於風許宣治前輩書稱暑風驚後強直者屬陰虛治當養陰舒筋僭仿其旨安波按案內直犯心肝之句似欠融化蓋暑邪最喜犯心其故由肺逆傳肺病則肝無所制故手足制動矣下句有五十餘日之久其邪深入下焦陰分故前輩以甘露覆脈等方雖不治肝而已治肝下言肝風兩字日久者少似蓋肝居位不及心肺之高豈邪一中即直赴至陰之地乎安波按小兒驚症一候歷來惟喻氏前輩駁之甚詳自斯涇渭析矣其立名曰風熱驚痰四字愚嘗溯之蓋孩提氣血未充腑臟未實每招微感邪留皮毛上注於肺失治則蔓沿於心包絡是以視識溷蒙目睛上吊肺失治節之司聚液成痰而肝失勝己之制得以鴟張上逆為抽為搐速當辛涼開肺甘寒退熱肺開則痰行熱清而昏定昏定而抽搐瘛瘲之勢亦平矣若陡用芳香全石之劑使陰液愈亡肺熾愈橫其禍不可待而言也余誠愴惻不愧贅言若見斯症輒投驚藥其幼稚之含冤無勝數矣黃禹功兄陰虛咳血誤服陽藥致害操持經營勞思過度病起咯血後加咳嗽孟秋診過告以肺腎陰虧久咳虛火上升津液生痰不生血治當補水制火則其痰自除第此甘醇靜藥本無速功更醫參附養陽服至半月諸證倍增經曰剛與剛陽氣破散陰氣乃消亡是知證有陰陽藥有動靜陽主動以動濟動火上添油也不焦爛乎且一星之火能燒千仞之山一杯之水難救車薪之火恙本火多水少救陰尚恐不逮豈堪燥烈更灼其陰乎三冬腎水枯涸來春奉生者少語云昌陽引年欲進豨苓其斯之謂歟方侶豐兄挾虛傷寒誤治致變壞病年屆五旬心事內傷兼挾外邪誤藥因循邪留不解脈濡無神汗多頭暈交午寒熱此陰陽衰憊邪正交爭烏可與傳經少陽之寒熱同語張介賓云邪氣如賊其來在外元氣如民其守在中足民即所以強中強中即所以御外斯證斯時曰但驅邪可以卻病吾不信也曰舍輔正可以拯援亦不信也仲聖云傷寒若吐若汗若下若溫針不解者名曰壞病知犯何逆隨證治之雖然理固如斯而病已瀕危大廈欲覆一木恐難撐持勞感經旬因循誤治邪陷正虧喻氏所謂輕則半出不出重則反隨元氣縮入觀其暈汗每現於寒熱之頃此陰陽交爭正不勝邪脫機顯露如盜入人家門戶洞開藩籬不固主憊如斯何堪與賊角勝負邪請先救人後醫病安波按病到此等地步雖有盧扁於命云何謝翁證治並答所問年逾花甲天真既薄酒多谷少脾胃復虧書稱胃主四肢脾主肌肉脾宜升則健胃宜降則和睹此手足牽強膚腠繃急麻癢豈非脾胃不和失其升降之道乎內經以胃之大絡名曰虛里出於左乳下即今乳房腫脹胃絡不和之徵又按痰生於濕濕生於脾由土薄也土厚則無濕無濕則無痰矣閱所服諸方均從肝治以為凡病皆生於郁但土為萬物之母試以五行言之木雖生於水然江河湖海無土之處則無木生是故樹木之枝葉萎悴必由土氣之衰一培其土則根木堅固津汁上升布達周流木欣欣以向榮矣又問腎氣丸能治手足麻木否答曰天一生水水之疑處為土堅者為石其最堅者為金水土金原同一氣凡人戴九履一心肺居上脾胃居中肝腎居下胚胎始基先具兩腎此腎為先天之根元牝之宅腎氣丸先天藥也能助右腎命門火使腎火生脾土脾土生肺金肺金生腎水腎水生肝木一方而五臟皆調一法而水火兩備且夫人之手足猶樹之有枝也人之腎命猶樹之有根也烏有根本充盈而枝葉不敷榮暢茂者乎引指使臂灌葉救根何可與言至道安波按確論引喻亦妙饒君揚翁脾虛瀉血肺燥咳嗽證治異歧診脈細濡恙經多時始而便瀉繼則下血漸致食少欲嘔形疲心憒藥無靈效略投辛溫血下即多稍用清涼飲食即減輾轉卻難借箸然醫貴變通未可見病治病印定眼目經曰濕多成五瀉病始於瀉脾虛釀濕治濕固宜於燥但脾為血之統剛燥過劑致動其血內溢不已陰絡受傷無如養陰之品恆多膩滯又與脾胃欠合此培其中州抉其土母不得不為之亟亟也昔賢治血證每以胃藥收功土厚自能勝濕耳酌以淡養胃氣甘益脾陰宗嘉禾飲服藥數日穀食稍增視其病狀與痢相似即痢久正氣未有不虧亦當培養本元資其生氣據述脘中如飢如嘈是屬下多亡陰兼傷其氣觀其得食則安情已顯露方內參力加重佐以烏梅取其酸能生津並可攝血再考方書論久痢病根在大腸曲折之處藥力所不能到有用至聖丹一方余仿其法治驗頗多可備採擇經云陰絡傷血內溢然藥用清熱養陰而不效者何耶經曰營出中焦中焦取汁變化而赤是謂血中焦蓋指胃而言夫胃為水穀之海氣血俱多之經病之淺者飲食如常旋去旋生病之深者谷少氣衰所生不償所耗脾與胃以膜相連胃弱則生化無權脾虛則統攝失職書稱不問陰陽與冷熱先將脾胃為調和萬物以土為根元氣以土為宅議進歸脾理當如是又述向有肝陽沖逆之恙近兼舉發方內加入首烏既可益陰又可固攝非熟地滋膩可比烏梅畏酸不用亦可但腸滑已久須參澀以固脫李先知云下焦有病人難會須用餘糧赤石脂便稀食進大有好機病纏兩月氣血受傷以故尻骨酸楚頰車乍痛便時急墜行動乏力初議專培脾胃乃血脫益氣之法續進歸脾乃虛則補母之方李士材先生云先天之本在腎後天之本在脾二臟安和百骸皆治今既食增瀉減脾胃已調自當進加腎藥治療匝月諸證均減寢食俱安精神漸長體素陰虧加以便血久傷陰絡屢服胃藥氣分雖充陰猶未夏金為生水之源金燥不能生水是以上膈焦乾鼻癢咳嗆夫藥隨病轉移步換形醫如珠之走盤貴乎活潑氣不足便是寒氣有餘便是火改議養陰潤肺金水相生津回燥自濡矣經言虛邪賊風避之有時恙後體虧加受外因形寒頭痛脘悶欲嘔然舌無苔脈不急受邪知不甚重正氣不充未可直行表散治宜輔正驅邪外感已解痔瘡舉發肛痛便復見紅然每日便止一次並不溏瀉此乃痔血非前腸血可比痔平血當自止知飢能食食後脘中微痛按胃司受納脾主運化脾健失職運化較遲若果食滯致痛則飽悶不飢矣地黃益陰固妙稍嫌其膩不利於脾暫商養胃調脾復診再籌進步據諭向來冬春左畔畏風夏秋上焦熱悶藥投清散服時雖效過後依然揆度其故諒緣營衛失和籓籬不固邪之所湊其氣必虛斷無六淫之邪久羈人身之理使非探本尋源徒泛治標無益且俟新病瘥後再為圖之下極為魄門魄門亦為五臟使痔血去多陰虧陽冒上焦燥熱乾咳陽加於陰謂之汗前則瀉多納少故仿胃藥收功茲則大便如常多食善飢病情迥別丹溪謂男子陽常有餘陰常不足陽主動陰主靜理當育陰濟陽靜以制動據言每屆秋時即患咳嗽服清潤之劑頗驗目前感後恐有餘邪地黃滋膩似未可服按質虛偶感邪本無多既已驅逐諒無逗留肺與大腸相表裡腸熱上熏肺燥則癢癢則咳此咳嗽之故非關於風而實由於燥也經云燥者濡之痔血咳嗽同歸一途無煩分治矣安波按大腸為燥府以潤為補擬桑麻丸意以表裡同治方女慢驚周歲女嬰病經兩月消散多劑脾元內傷面青目定肢掣指冷證屬慢驚勢頗危殆無風可逐無驚可療治惟溫補脾陽百中冀圖一二病緣脾元大虧木橫土困變生慢驚屢進六君溫補脾元已臻小效日來停藥神形復疲小兒臟腑柔脆初生萌芽非蒼枝老幹可比根蒂傷伐恐難圖效盡人工以邀天眷耳安波按驚風一途初感即發為急驚慢驚總緣食積傷脾脾傷則木恣其所侮宜培土之中兼以抑木雖聖人復起不易吾言矣丁酉仲春志某嫗本病風痱加感暑邪本證風痱近加受暑脈虛身熱倦怠口渴經云脈虛身熱得之傷暑暑傷氣是以倦怠夫暑乃六淫標邪雖無大害特恐質虧不勝病耳商仿清暑益氣湯大意以俟消息脈仍虛急熱甚心煩夜不安寐方內酌除耆朮加以玉竹本草言其用代參耆不寒不燥且能治風淫濕毒寒熱痁瘧大便五日未圊小溲數熱肺與大腸相表裡又與膀胱通氣化古人治暑證每用生脈散者以其有保肺清金之能也病軀加受暑邪恙經六日兩進清暑益氣輔正滌邪形倦膚干熱仍熇熇心煩口渴溲數便閉張介賓云乾鍋赤裂潤自何來但加以水則鬱蒸暢然而氣化四達宗玉女煎早服玉女煎薄暮復視病勢依然暑邪留著原難急驅今日已服藥兩渣末便再進暫與荷蜜煎代茶便通膚澤往日早晨熱緩交午復甚心內如焚今午熱勢平和無焦煩輾轉之狀病軀治標亦不得已茲既勢平自當斟酌無使過也前藥退松昨午其熱復甚溲數口渴心如煎熬質虛恙重況加反復切虛變更揣諸病情得無心營胃液為熱灼傷以致焦煩嘈雜者歟宗阿膠雞子黃湯法安波按方議均佳胡某令郎麻後頸生瘰癧籌治三法麻出於臟由陰而及乎陽火毒燔灼營血耗傷故麻後每多遺毒之患不可補氣以助火只宜養陰以退陽此治法之大綱也病由麻後頸生瘰癧自春徂冬滋蔓不已鄙籌三法而論治焉蓋瘰之未消由毒之未淨然毒即火也欲去其毒須去其火要知火有虛實病有新久麻出之先其火屬實藥宜清涼麻斂之後其火屬虛藥宜滋養酌以六味地黃湯煎送消瘰丸庶乎瘰消而元氣不傷且人以胃氣為本久病服藥必究脾胃此養陰軟堅消其瘰培補脾胃扶其元道並行而不悖也安波按妙論侃侃令讀者口齒生香家若谷兄乃郎脅痛感證已逾兩旬脅痛依然不愈按外感脅痛病在少陽內傷脅痛病在厥陰今外邪解經多日脅痛何以不瘳既無情志抑鬱定屬動作閃力之傷外邪引發耳夫久痛在絡絡主血防其蓄瘀動紅從金匱肝著例用旋覆花湯一法安波按病久入絡理固宜然藥內再參入搜痰滌飲則無遺蘊矣梅氏女嘔吐經閉病逾四載起初嘔吐漸致經期不行溫清攻下遍投無驗醫乃視為癆瘵棄而不治診脈不數亦無風消息賁寒熱咳嗽兼證似與癆瘵有間果真損怯已成病人膏肓焉能久延歲月乎經云治病必求其本又云先病為本後病為標恙由嘔吐而起自當以嘔吐為病之本也苟能止其嘔吐則倉廩得藏生生有賴氣血周流諸證不治而自安矣考諸方書論吐證非止一途斯病既非真寒又非實火所以溫清俱不投機至於下法乃治傷寒暴急之方施於內傷久病殊屬悖謬詢其飲食下嗌停注膈間不肯下行旋即嘔出沖逆不平時時噯噫所以然者乃肝為受病之源胃為傳病之所胃宜降則和肝氣橫逆阻胃之降致失其和而為患也夫脾為濕土胃為燥土六君異功止可健運脾陽今病在胃而不在脾濕燥異歧不容籠統而論矣再按肝為將軍之官臟剛性急木喜條達最嫌抑鬱古人治肝病辛散酸收甘緩與夫補水生木培土御木方法多端非僅伐之瀉之而已治宜安胃制肝厥陰陽明兩調王道無近功戒怒舒懷以佐藥力為要安波按灶心土溫中除嘔平木製肝此病在所必需之物葉某喉痛病逾一年醫稱陰虧陽升水不制火育陰清火潛陽屢治無效若云癆瘵已成非草木之所能治現在飲食如常脈不細數似又不侔求其何以屢治不效之故理殊難測豈非另有隔膜未窺透耶據述病緣舊春郊外垂釣感冒風熱而起經云肺主皮毛皮毛者肺之合也皮毛先受邪氣邪氣以從其合此肺為受病之原比諸勞風法在肺下巨陽不能引精青黃之涕不能咳出適足傷肺之例當時雖曾服過清解之劑但外邪入肺如油入面有倉卒難以浣滌者膠黏醞釀鬱而為熱鬱熱熏灼津液受傷所謂因病致虛者由肺病而累及之也何以言之凡人咽喉兩管咽通於胃喉通於肺今喉雖辣痛而納食無礙可知其病在喉而不在咽人身之氣左升右降肝主升其脈縈於左肺主降其脈縈於右今左畔肢體如常而病端偏著於右足見其病在肺而不在肝肺脈雖縈於右然位居上焦為臟腑之華蓋觀其上脘煩熱時沖喉嚨頸下皮膚作癢搔爬如痱咯吐痰色灰黃等因其為肺臟蘊熱金燥液干情已大露再按大便堅硬數日始一更衣者肺與大腸相表裡也倘果因虛致病悉屬內傷水不制火而致喉痛早已咳血音嘶走入怯途焉能緩待且滋陰壯水藥證相符何以久服不應耶然病情雖窺一斑治法尚難計議蓋治病須分新久用藥貴審機宜病初體質無虧治惟滌邪無庸顧虛茲則病魔經歲正氣已虧豈容孟浪進而求之肺為嬌臟喜潤惡燥邪熱久處肺中金被火刑津干液涸是以養陰藥餌只可滋其津液之干莫能驅其蘊伏之燥耳古人治燥甚少良方惟西昌喻氏會悟經旨發明燥病根源見得諸氣膹郁諸痿喘嘔以及心移熱於肺二陽之病發心脾各種病機俱關於肺所立清燥救肺一方頗有深意蓋輔金制木即所以治肝清肺澄源即所以治腎僭仿其法諒當有應安波按此方之義無遺蘊矣朱百春兄令嬸半產崩暈寒熱似瘧質虧生育多胎此番重身三月又復半產氣隨血脫昏暈頻發幸賴獨參湯挽回日來熱發不退時時怯寒舌白喜飲熱湯頭痛形倦脈急無力合參脈證明是氣血兩虛即有外邪投鼠忌器丹溪云產後當以大補氣血為主他證從末治之仿甘溫除大熱之旨下午復診脈象彷彿早間服藥安眠片時頃復寒熱交作此屬陰陽兩虛正氣不勝非瘧證也原方更進一渣明日再議兩進甘溫昨午寒後熱甚扶掖下床小溲遺出直至半夜熱始漸緩切恐今午寒熱復來撐持不住揣其寒熱之故非陰陽兩虧即正虛邪陷當此危迫不問有邪無邪一意扶元固本蓋輔正即所以祛邪也本草謂人參能回元氣於無何有之鄉古人治氣隨血脫之候悉仗參力斡旋昨藥分兩固雖加重惜乏參力故難奏效耳昨午寒熱仍來神形益倦二更後熱勢漸平然起床勞頓即作昏暈頃進診間暈又復發連服溫補大劑尚未見功即云寒熱由於外因睹此狼狽情形焉可再從標治仍守原制佐以河車亟挽真元醫當醫人不當醫病昨夕昏暈頻作頃診右脈虛要左猶帶數體倦無力氣怯懶言虛象無疑病緣質虧半產加之寒熱糾纏波濤洶湧現在熱退神清固見小效奈病來勢暴大廈搖搖前議補元歸脾更從養營進步兩日未診脈象依然在前發熱之際脈由熱搏而數今外熱既退理當和緩何至數猶未平口不乾渴並無火象無非產時血去過多營陰受虧脈乃血派是以急數不平耳但諸藥皆是草木根荄人身真元耗傷倉卒焉能挽轉參力既艱他策又無可畫前方減去辛溫稍佐柔和之品產後崩暈血氣大虧陰陽樞紐不固見出種種疲憊之候賴諸溫補藥餌竭力挽回寒熱已除胃安穀納無如事多磨折臀生瘍毒痛楚不安瘍甫潰膿痛勢稍定又加時感濕邪腹痛便瀉節外生枝暫與香砂六君俟其痛瀉愈後仍須峻補真元冀圖恢復安波按先生方必中肯劑不虛投但此婦真元已敗冥遊已近不過聊盡人事矣王氏婦妊娠二便閉塞孕婦脈來滑數證見便溺不通二陰牽脹足膝浮腫醫藥滋陰疏利升舉屢施不驗按肺與大腸相表裡又與膀胱通氣化是二便之通閉肺有所關係焉金燥水無以生清肅之令不能下降是以二腸交阻喻氏謂人身之氣全關於肺肺清則氣行肺濁則氣壅清肺之熱救肺之燥治其源也氣行則壅自通源澄斯流清矣凡禽畜之類有肺者有溲無肺者無溲故諸水道不利而成腫滿者以治肺為急前商清燥救肺小溲雖通大便未暢足腫未消二陰仍然牽脹夜臥不適口苦舌黃原方加枯芩梨汁安波按議論神妙使讀者滿舌生津李某鼻淵孔潰經云肺氣通於鼻又云膽移熱於腦則辛頞鼻淵可知鼻淵一證病端雖責於肺實由膽熱移腦之所使然證經數載腥涕流多肺腎為子母之臟金被火刑陰液受傷加之鼻竅右側舊夏曾已穿潰甫經收口左側又潰一孔至今紅腫未消經謂熱勝則腫雖由膽移之熱醞釀為患但治病須分新久診脈數大無力是屬恙久陰虛陽浮非新病實熱可比苦寒傷胃洵非所宜計惟壯水保金冀其水升火降庶幾紅腫可消潰口可斂也安波按擬清燥救肺法輔金剎木即所以治膽清肺澄源即所以治腎王某背瘍潰後餘毒未淨癰從六腑生疽從五臟生營氣不循逆於肉理乃生癰腫此先聖論癰疽之大端瘍科之綱領也證起月餘毒發於背始初平塌不痛藥服溫補內托得以由陰轉陽掀腫潰膿腐化新生瘡口漸斂無如一波未平一波又起日前齦微腫痛漸次腫甚流血病中飲食本少茲因齦腫米汁難啜人以胃氣為本瘍潰之後胃氣空虛全藉飲食精華資其生氣既不安穀倉廩必傾何恃不恐且瘍後與產後同理應培養氣血現在齦腫咽乾下利糞色如醬利下齦腫稍松利止腫痛復劇詳審病機似乎餘毒未清奈病久困頓如斯固正則火勢不平清火則正氣不守如何借箸姑仿少陰不足陽明有餘之例宗玉女煎方法蓋腎主骨齒者骨之餘上齦屬手陽明下齦屬足陽明據理推詳冀圖僥倖安波按擬於玉女煎外再參入清胃散意方有升麻使清升濁降丹皮以疏其下滯則斯候之上下處病厥義無遺漏矣王錫章肺腎虛喘畏補致脫經云呼出心與肺吸入腎與肝是肺主出氣腎主納氣肺為氣之主腎乃氣之根母藏子宮子隱母胎金水相生之義也前商保金生水納氣歸根正本澄源治不為謬據述服藥脘中微覺痞悶心疑藥補即不敢嘗此由胃虛不能傳送藥力之故與補無干如果補之為害何喘不見增病不見甚耶經曰能合脈色可以萬全豈色悴神疲喝喝不繼者如是而能以耗散收功者乎先哲有云喘生毋耗氣氣本弱而復耗之元本虧而復竭之抱薪救火入井下石脫機甚速勿怪言之不祥安波按讀至斯案不覺浩嘆雖有回生妙術奈不見信何近來見夭枉者甚多大抵彼壽固止於此而吾之道終於不行豈非命耶吳媼肺痹恙經三月脈大而急證見嗆咳氣築胸滿背脹夜不安臥臥則氣衝呼吸不利目爛舌赤口乾心煩審諸脈證是屬肺感燥邪加之抑鬱痰氣膠結肺竅阻閉清肅失司釀成肺痹危險蓋肺為氣之主肺氣逆則諸氣皆因之而逆矣平素質虧受補茲則補劑不投雖虛虛而病則實不去其病徒補無益經云諸氣膹郁皆屬於肺秋傷於燥冬生咳嗽計惟清燥宣痹幸得胸展痹開方許機關衄轉仿葦莖湯遵金匱法服藥四劑喉口燥象稍減舌根焦苔亦退脈象依然痹猶時發甚則胸膈䐜脹喘喝不已欲人捶摩咯出濁痰略覺寬展病由燥邪蘊伏上焦治節不行痰壅無形之火火灼有形之痰交相為患夫痹者閉也內閉則外脫至危至急無如上焦不開未能填補其下是以每投補劑其閉更劇按肺竅蘊結之痰如屋之遊樹之蘿石之苔膠黏滋蔓豈尋常消痰之品所能芟刈原方加蔞皮海石輕清宣痹病象未減下虛不能納補上實通之無功消補兩難頗為棘手據述每痹甚時惟飲菔水則痰氣稍平即此推求定有頑痰膠黏肺管阻塞氣機葦莖頻投不應惟有進步葶藶一法非不慮及老人質虧難任當此危迫畏首畏尾身其餘幾奈何葦莖葶藶乃金匱治肺痹兩大法門前因年高恙久不敢驟用葶藶峻攻惟取葦莖輕清宣痹冀其病去元氣不傷服藥雖見小效痹終未宣前論燥熱醞釀為痰肺竅氣機阻塞清肅失司因而逆滿卻非謬語夫頑痰滋蔓譬諸頑民不服王化不忍猛而寬則萑莩盜風何由而息所加葶藶雖系無可如何亦理之所當然非徒行險僥倖也現在痹勢稍松足見有故無殞從來峻劑原屬可暫而不可常然證經數月之久痰熱瀰漫已極甫得稍開若旋行易轍病根尚在慮其復萌今早鼻仍流血可知肺火未清方加石膏山梔竹瀝徹其痰熱餘波今夜得以痹再減輕明日可為轉手老人病逾百日痰凝氣壅肺痹不舒上實下虛原難想法數番診視因其痰火勢盛不能受補無已初投葦莖輕清宣肺繼進葶藶滌飲除痰佐以膏梔竹瀝以徹痰熱餘波此皆古人成法非杜撰也今痹象稍減虛狀漸露高年恙久恐其元氣不支商佐保金輔正安波按先生用方用法絲絲入蔻不比近來庸流溷亂籠統者也施婦感證證逾三候始而寒熱溷淆繼則不寒單熱日晡熱甚黎明漸退閱方初投逍遙次用桃仁承氣愈醫愈劇食少便瀉足腫腹脹熱甚脹亦甚熱緩脹亦緩若云肝氣未必發熱亦不必脹隨熱至若云血痹當在下焦不應脹在中脘求諸病因非關氣滯血凝乃伏邪留著故也己任編云秋時晚發感證似瘧本是伏暑之病暑必挾濕盤踞膜原膜原即中焦部位邪伏既久乘時而發自里達表是以外熱內脹至於便瀉足腫更屬濕病無疑欲消其脹須祛其邪邪一日不去脹一日不除所謂傷寒究六經溫暑辨三焦上焦不解勢必蔓延中下淡滲佐以微辛蓋無形之邪未可作有形攻擊耳前議服藥汗出熱退脹減伏邪外達之機蓋暑濕伏邪與風寒外邪不同新邪當先徹表伏邪當先清裡里清表自解也日來兼見咳嗽瀉仍未止按外感以嗽為輕腑病以通為補嗽瀉均系伏邪之出路不可止遏安波按擬薄荷山梔辛苦以清裡熱茯苓皮大豆卷滑石通草之甘淡以滲外濕杏仁橘紅以開肺半夏佩蘭以醒脾江婦崩證女子二七而天癸至任脈通太衝脈盛月事以時下故曰月經經者常也反常則為病矣是以婦人首重調經經調則百病不生失調則諸證蜂起夫血生於心藏於肝統於脾而沖為血海血猶水也若江河之流行設有枯涸崩決其為患也大矣求其致病之因有謂血枯者蓋女子以肝為先天索性多郁木鬱生火火灼陰傷以致經血日耗地道不通經言二陽之病發心脾有不得隱曲女子不月者此也有謂崩決者崩如山塚崒崩決如波濤橫決蓋血屬陰靜則循經營內動則錯經妄行經言陰虛陽搏謂之崩陽氣內動發為心下崩者此也病經日久形瘦陰虧木火鬱勃舊春經阻崩暈現又愆期兩月勿愁血之不行切恐崩患復發議養腎陰以濟心陽兼培衝任冀其生生有自血氣調勻無錯妄之虞復經常之度不徒病去人安更可勿藥有喜安波按擬自制補煉丸養腎陰以濟心陽培衝任以贊其職江氏子足痹誤治成廢經云風寒濕三氣雜至合而成痹風氣勝者為行痹據述證由右足膝蓋痛引腿胛漸移於左狀類行痹行痹屬風治以驅逐理不為謬但邪之所湊其氣必虛況童質稟薄腎元未充驅逐過猛血氣受虧肝主筋筋無血養則攣急脾主肉肉無氣煦則枯瘦以致腓日乾髀日腫足不任地釀成廢疾矣古云治風先治血血行風自滅聞所服諸方非全無治血之品也無如桂麻羌獨藥性太狠難以監製故只見其害不見其益在病初血氣未衰猶可輔驅並行今則疲憊如斯尚有何風可逐何絡可通倘再求速功見病醫病非但病不能醫而命亦難保矣要知疾即成廢欲圖轉澤回枯誠非易事惟有培補肝腎一法膝為筋府肝腎之脈麗於足足得血而能步復有調養脾胃一法四肢皆稟氣於胃脾病不能為胃行其津液脈道不利筋骨肌肉皆無氣以生故不用焉脾強胃健四肢得稟穀氣脈道流行自能充膚熱肉二法雖不言治病然治病之旨在其中矣安波按此症雖經治痊如語而童質先稟薄弱已見一斑大約不壽之徵矣葉翰周世侄感證反復狀類內傷曩議和中通腑大便解後痞悶漸舒穀食稍進時候寒暄不常質虛最宜加感以致寒熱愈而復作日來寒象雖除熱猶未淨脈虛近急是屬節外生枝尚非本證變幻特元虧未復腠理空疏起居最宜謹慎若謂此番寒熱不關外感全屬內傷則是陰陽兩虛奇經為病不應急驟至此且內傷之寒熱當在日晡日日如是不能偶然其狀灑淅亦不若此之重據理推詳似當不類現在大便又復旬余未解腹中雖無所苦總覺欠舒呆補惟恐不受所以然者病由濕凝氣滯而起醫藥龐雜胃腑欠和輸化失職故耳淡養胃氣甘益脾陰參以潤腸不至蹭蹬再生自可漸躋蔗境復診便雖半月半圊腹無所苦下不嫌遲毋庸亟亟日前感復寒熱作後至今申刻仍有微潮熱時口渴交戌汗出始退固屬餘波未清但熱久津液必傷商進養陰陰血下潤則便通非徒退熱已也感證反復熱盛陰傷腸枯便結疊進養陰濡液熱退餐加脈急已平神采漸轉據述昨午便圊燥糞依然努掙艱難足見病魔經久元氣受虧津液未充便通猶防復閉按救陽氣當用建中救陰液須投復脈宗千金方法佐以人乳團魚燕窩血肉有情且俟液復虛回胃強脾健再議善後之圖安波按便閉一證病人每有一通為愈之意蓋糞呆物也必藉中氣之迭送故便時努力則易下屢見病後有一二月之久體已復原始得暢然下注可見便閉一途非徒補血潤腸為能事而益氣順氣之助豈可漠然不道乎是以經文中氣不足溲便乃變
